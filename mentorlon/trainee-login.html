<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentor-IT — התחברות מתאמן</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg,#f0fdfa,#ecfeff,#ffffff); color: #0f172a; direction: rtl; min-height: 100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .box { max-width:420px; width:100%; }
  .header { text-align:center; margin-bottom:22px; }
  .logo { width:80px; height:80px; border-radius:20px; background:#ffffff; margin:0 auto 14px; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 24px rgba(20,184,166,0.25); border:2px solid #14b8a6; overflow:hidden; }
  .logo img { width:100%; height:100%; object-fit:cover; }
  h1 { font-size:24px; font-weight:800; background:linear-gradient(135deg,#5eead4,#67e8f9); -webkit-background-clip:text; background-clip:text; color:transparent; margin-bottom:6px; }
  .header p { font-size:13px; color:#475569; }
  .card { background:#ffffff; border:1px solid #ccfbf1; border-radius:18px; padding:24px; box-shadow:0 8px 30px rgba(15,118,110,0.1); }
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:13px; font-weight:700; margin-bottom:6px; color:#334155; }
  .field input { width:100%; padding:12px 14px; border-radius:10px; border:1px solid #e2e8f0; font-family:inherit; font-size:14px; background:#f8fafc; }
  .field input:focus { outline:none; border-color:#14b8a6; background:#ffffff; }
  .btn { width:100%; padding:13px; border-radius:10px; border:none; font-family:inherit; font-weight:700; font-size:15px; cursor:pointer; background:linear-gradient(135deg,#14b8a6,#0891b2); color:#ffffff; }
  .msg { font-size:13px; margin-top:12px; padding:10px; border-radius:9px; display:none; }
  .msg.error { background:rgba(220,38,38,0.08); color:#dc2626; display:block; }
  .footer-note { text-align:center; font-size:12px; color:#94a3b8; margin-top:16px; }
</style>
</head>
<body>
<div class="box">
  <div class="header">
    <div class="logo"><img src="https://base44.app/api/apps/69f63b4536d7a2c6688403df/files/mp/public/69f63b4536d7a2c6688403df/5a451ce5a_ailon_hex_navy2.png" alt="AILON Task"></div>
    <h1>Mentor-IT</h1>
    <p>כניסת מתאמן</p>
  </div>
  <div class="card">
    <div class="field">
      <label>שם משתמש</label>
      <input type="text" id="tUsername" style="direction:ltr;" placeholder="username">
    </div>
    <div class="field">
      <label>סיסמה</label>
      <input type="password" id="tPassword" style="direction:ltr;" placeholder="••••••••">
    </div>
    <button class="btn" onclick="doLogin()">התחבר</button>
    <div class="msg" id="loginMsg"></div>
  </div>
  <div class="footer-note">קיבלת שם משתמש וסיסמה מהמאמן שלך? התחבר כאן כדי לנהל את הכלים שלך.</div>
</div>
<script>
const API = 'https://base44.app/api/apps/69f63b4536d7a2c6688403df/functions/mentorlonApi';
async function doLogin() {
  const username = document.getElementById('tUsername').value.trim().toLowerCase();
  const password = document.getElementById('tPassword').value;
  const msg = document.getElementById('loginMsg');
  msg.className = 'msg'; msg.textContent = '';
  if (!username || !password) { msg.className='msg error'; msg.textContent='נא למלא שם משתמש וסיסמה'; return; }
  try {
    const res = await fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'trainee_login', username, password }) });
    const data = await res.json();
    if (!res.ok) { msg.className='msg error'; msg.textContent = data.error || 'שגיאה'; return; }
    localStorage.setItem('mentorlon_trainee_username', data.username);
    localStorage.setItem('mentorlon_trainee_token', data.token);
    window.location.href = 'trainee-dashboard.html';
  } catch(e) {
    msg.className='msg error'; msg.textContent = 'שגיאת רשת';
  }
}
document.getElementById('tPassword').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
