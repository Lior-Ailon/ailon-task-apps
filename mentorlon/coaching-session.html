<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מודל שיחת אימון | Mentor-IT</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
  min-height: 100vh; color: #e2e8f0; direction: rtl; padding: 16px;
}
body::before {
  content: '';
  position: fixed; top:0; left:0; right:0; bottom:0;
  background:
    radial-gradient(ellipse at 15% 25%, rgba(99,102,241,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 75%, rgba(20,184,166,0.06) 0%, transparent 50%);
  animation: bgShift 12s ease-in-out infinite alternate;
  z-index:0; pointer-events:none;
}
@keyframes bgShift { 0%{opacity:0.6} 100%{opacity:1} }

.wrap { max-width: 560px; margin: 0 auto; position: relative; z-index:1; }

/* HEADER */
.header { text-align:center; padding:20px 0 16px; margin-bottom:20px; border-bottom:1px solid rgba(255,255,255,0.07); }
.logo-row { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:8px; }
.logo-img { width:40px; height:40px; border-radius:9px; object-fit:cover; }
.header h1 { font-size:21px; font-weight:900; color:#a5b4fc; }
.header p { font-size:13px; color:#64748b; margin-top:4px; line-height:1.5; }
.header .subtitle-note {
  display:inline-block; margin-top:8px; background:rgba(99,102,241,0.15);
  border:1px solid rgba(99,102,241,0.3); border-radius:20px;
  padding:4px 14px; font-size:12px; color:#a5b4fc; font-weight:700;
}

/* TRAINEE INFO */
.trainee-box {
  background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
  border-radius:14px; padding:14px 16px; margin-bottom:16px;
}
.trainee-box input {
  width:100%; background:rgba(255,255,255,0.06); border:1px solid #334155;
  color:#e2e8f0; padding:10px 14px; border-radius:10px; font-size:14px;
  font-family:inherit; direction:rtl; margin-bottom:10px;
}
.trainee-box input:last-child { margin-bottom:0; }
.trainee-box input::placeholder { color:#475569; }
.trainee-box input:focus { outline:none; border-color:#818cf8; }

/* PROGRESS */
.progress-wrap { margin-bottom:20px; }
.progress-steps {
  display:flex; gap:4px; margin-bottom:8px;
}
.progress-step {
  flex:1; height:4px; border-radius:10px; background:#1e293b;
  transition: background 0.4s;
}
.progress-step.done { background:#6366f1; }
.progress-step.active { background:#818cf8; animation:stepPulse 1.2s ease-in-out infinite; }
@keyframes stepPulse { 0%,100%{opacity:0.7} 50%{opacity:1} }
.progress-text { font-size:12px; color:#475569; text-align:center; }

/* STAGE CARDS */
.stage-card {
  background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07);
  border-radius:18px; padding:20px; margin-bottom:14px; display:none;
  animation: fadeIn 0.4s ease;
}
.stage-card.visible { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

.stage-header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
.stage-icon {
  width:44px; height:44px; border-radius:12px; display:flex; align-items:center;
  justify-content:center; font-size:20px; flex-shrink:0;
}
.stage-num { font-size:10px; font-weight:700; color:#64748b; margin-bottom:2px; letter-spacing:1px; }
.stage-title { font-size:16px; font-weight:900; }
.stage-desc { font-size:12px; color:#64748b; margin-top:2px; line-height:1.4; }

/* ICON COLORS */
.icon-covenant { background:rgba(99,102,241,0.2); }
.icon-future    { background:rgba(20,184,166,0.2); }
.icon-dream     { background:rgba(245,158,11,0.2); }
.icon-being     { background:rgba(239,68,68,0.2);  }
.icon-goals     { background:rgba(16,185,129,0.2); }
.icon-action    { background:rgba(6,182,212,0.2);  }
.icon-env       { background:rgba(168,85,247,0.2); }
.icon-beliefs   { background:rgba(251,146,60,0.2); }
.icon-summary   { background:rgba(52,211,153,0.2); }

/* QUESTIONS */
.question-block { margin-bottom:14px; }
.q-label { font-size:13px; font-weight:700; color:#cbd5e1; margin-bottom:6px; display:block; line-height:1.4; }
.q-hint { font-size:11px; color:#475569; margin-bottom:6px; font-style:italic; }
textarea.q-input, input.q-input {
  width:100%; background:rgba(255,255,255,0.05); border:1px solid #334155;
  color:#e2e8f0; padding:10px 13px; border-radius:10px; font-size:14px;
  font-family:inherit; direction:rtl; resize:vertical; line-height:1.5;
}
textarea.q-input { min-height:68px; }
textarea.q-input:focus, input.q-input:focus { outline:none; border-color:#818cf8; }
textarea.q-input::placeholder, input.q-input::placeholder { color:#475569; }

/* QUOTE BOX */
.lior-quote {
  background:rgba(99,102,241,0.08); border-right:3px solid #6366f1;
  border-radius:0 10px 10px 0; padding:10px 14px; margin-bottom:16px;
  font-size:13px; color:#94a3b8; font-style:italic; line-height:1.5;
}
.lior-quote span { color:#a5b4fc; font-style:normal; font-weight:700; display:block; margin-bottom:4px; }

/* TIMER */
.timer-bar {
  display:flex; align-items:center; gap:10px; background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07); border-radius:12px;
  padding:10px 16px; margin-bottom:16px;
}
.timer-display { font-size:20px; font-weight:900; color:#818cf8; min-width:60px; }
.timer-display.warning { color:#f87171; }
.timer-label { font-size:12px; color:#64748b; flex:1; }
.timer-btn {
  padding:6px 14px; border-radius:8px; border:1px solid #4f46e5;
  background:rgba(79,70,229,0.15); color:#a5b4fc; font-size:12px; font-weight:700;
  cursor:pointer; font-family:inherit; transition:all 0.2s;
}
.timer-btn:hover { background:rgba(79,70,229,0.3); }

/* NAV BUTTONS */
.nav-row { display:flex; gap:10px; margin-top:16px; }
.btn-prev {
  flex:1; padding:12px; background:rgba(255,255,255,0.05); color:#94a3b8;
  border:1px solid #334155; border-radius:12px; font-size:14px; font-weight:700;
  cursor:pointer; font-family:inherit; transition:all 0.2s;
}
.btn-prev:hover { background:rgba(255,255,255,0.1); color:#e2e8f0; }
.btn-next {
  flex:2; padding:12px;
  background:linear-gradient(135deg,#4f46e5,#6366f1);
  color:white; border:none; border-radius:12px; font-size:14px; font-weight:700;
  cursor:pointer; font-family:inherit; transition:opacity 0.2s;
}
.btn-next:hover { opacity:0.9; }
.btn-finish {
  width:100%; padding:14px;
  background:linear-gradient(135deg,#059669,#10b981);
  color:white; border:none; border-radius:12px; font-size:16px; font-weight:700;
  cursor:pointer; font-family:inherit; margin-top:16px; transition:opacity 0.2s;
}
.btn-finish:hover { opacity:0.9; }

/* SUMMARY */
.summary-card {
  background:rgba(16,185,129,0.08); border:1px solid rgba(16,185,129,0.25);
  border-radius:14px; padding:16px; margin-bottom:12px; display:none;
}
.summary-card h3 { color:#34d399; font-size:15px; margin-bottom:12px; }
.summary-line { margin-bottom:10px; }
.summary-label { font-size:11px; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:3px; }
.summary-val { font-size:13px; color:#e2e8f0; line-height:1.5; }

.back-link { display:inline-flex; align-items:center; gap:6px; color:#64748b; font-size:13px; text-decoration:none; margin-bottom:16px; }
.back-link:hover { color:#818cf8; }

.btn-secondary {
  display:block; width:100%; padding:12px;
  background:rgba(255,255,255,0.05); color:#94a3b8;
  border:1px solid #334155; border-radius:12px; font-size:14px; font-weight:600;
  cursor:pointer; font-family:inherit; margin-bottom:10px; transition:all 0.2s;
}
.btn-secondary:hover { background:rgba(255,255,255,0.1); color:#e2e8f0; }
</style>
</head>
<body>
<div class="wrap">
  <a href="./index.html" class="back-link">← חזרה ל-Mentor-IT</a>

  <div class="header">
    <div class="logo-row">
      <img src="https://base44.app/api/apps/69f63b4536d7a2c6688403df/files/mp/public/69f63b4536d7a2c6688403df/1b0b81977_ailon_header_logo.png" class="logo-img" alt="AILON Task">
      <h1>🤝 מודל שיחת האימון</h1>
    </div>
    <p>הפגישה הראשונה עם המתאמן — מכאן מתחיל המסע</p>
    <div class="subtitle-note">⏱ 30 דקות | מאמן: ליאור סופר</div>
  </div>

  <!-- TRAINEE INFO -->
  <div class="trainee-box">
    <input type="text" id="trainee-name" placeholder="שם המתאמן/ת" />
    <input type="text" id="session-date" placeholder="תאריך הפגישה" />
  </div>

  <!-- TIMER -->
  <div class="timer-bar">
    <div class="timer-display" id="timer-display">30:00</div>
    <div class="timer-label">⏱ זמן הפגישה — נהל אותו בתבונה</div>
    <button class="timer-btn" id="timer-btn" onclick="toggleTimer()">▶ התחל</button>
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrap">
    <div class="progress-steps" id="progress-steps"></div>
    <div class="progress-text" id="progress-text">שלב 1 מתוך 8</div>
  </div>

  <!-- STAGES -->
  <div id="stages-container"></div>

  <!-- SUMMARY -->
  <div class="summary-card" id="summary-card">
    <h3>✅ סיכום הפגישה הראשונה</h3>
    <div id="summary-content"></div>
    <button class="btn-finish" onclick="copySummary()">📋 העתק סיכום לשיתוף</button>
    <button class="btn-secondary" onclick="printSummary()">🖨️ הדפס / שמור PDF</button>
    <button class="btn-secondary" onclick="resetSession()">🔄 פגישה חדשה</button>
  </div>

  <div style="height:40px"></div>
</div>

<script>
const STAGES = [
  {
    id: 'covenant',
    icon: '🤝', iconClass: 'icon-covenant',
    title: 'ברית האימון',
    desc: 'הגדרת מסגרת ומטרת הפגישה',
    quote: 'הברית היא המחויבות ההדדית — המאמן מתחייב להיות שם, המתאמן מתחייב לפעול.',
    questions: [
      { id:'q_topic', label:'מה הנושא עליו תרצה להתאמן?', type:'textarea', placeholder:'תן/י ביטוי חופשי לנושא שמעסיק אותך...' },
      { id:'q_goal_session', label:'מה תהיה התוצאה אותה תרצה לראות בסוף השיחה?', type:'textarea', placeholder:'מה אתה/את רוצה לצאת איתו מהפגישה הזו?' },
    ]
  },
  {
    id: 'future',
    icon: '🔭', iconClass: 'icon-future',
    title: 'עיצוב העתיד — תמונת עתיד',
    desc: 'ראייה לטווח ארוך וחזון אישי',
    quote: 'מנהיגות מתחילה בתמונת עתיד ברורה — כי אם אתה לא יודע לאן אתה הולך, כל דרך תביא אותך לשם.',
    questions: [
      { id:'q_future_vision', label:'איך אתה/את רוצה שהחיים שלך יראו בעוד שנה בנושא הנ"ל?', type:'textarea', placeholder:'תאר/י את החיים האידיאליים בנושא זה...' },
      { id:'q_future_more', label:'וכשזה יקרה — מה תרצה עוד?', type:'textarea', placeholder:'מה מעבר לזה? לאן ממשיך המסע?' },
    ]
  },
  {
    id: 'dream',
    icon: '💎', iconClass: 'icon-dream',
    title: 'חלום וערכים',
    desc: 'מה מניע ומשמעות עמוקה',
    quote: 'Start With Why — הלמה לפני המה. כשאתה יודע את הלמה, כל האיך מתחיל לזרום. (Simon Sinek)',
    questions: [
      { id:'q_why', label:'למה זה חשוב/משמעותי? איזה ערך זה מביא לחייך? לעולם?', type:'textarea', placeholder:'חפש/י את המשמעות העמוקה — לא רק "מה אקבל" אלא "מה אתן"...' },
      { id:'q_purpose', label:'איך זה משרת את ייעודך?', type:'textarea', placeholder:'כיצד הנושא מחובר לשליחות ולייעוד שלך?' },
    ]
  },
  {
    id: 'being',
    icon: '🌟', iconClass: 'icon-being',
    title: 'הוויה',
    desc: 'מי אתה צריך להיות',
    quote: 'לפני שאתה עושה — אתה צריך להיות. הוויה קודמת לפעולה. (ליאור סופר)',
    questions: [
      { id:'q_feel', label:'איך תרגיש/תחוש כשזה יקרה?', type:'textarea', placeholder:'תאר/י את ההרגשה, התחושה הפיזית, מה ישתנה...' },
      { id:'q_who_be', label:'מי אתה/את צריך להיות שזה יקרה?', type:'textarea', placeholder:'איזה גרסה של עצמך צריכה להתעורר?' },
    ]
  },
  {
    id: 'goals',
    icon: '🎯', iconClass: 'icon-goals',
    title: 'מטרות ויעדים',
    desc: 'מדידים, ברורים, עם אבני דרך',
    quote: 'מטרה בלי תאריך היא חלום. מטרה עם תאריך היא תוכנית.',
    questions: [
      { id:'q_annual_goal', label:'מה המטרה שלך השנה?', type:'textarea', placeholder:'נסח/י מטרה ספציפית, מדידה וברורה...' },
      { id:'q_milestones', label:'אילו יעדים מדידים ואבני דרך צריכים להיות מושגים שתגיע למטרה?', type:'textarea', placeholder:'פרק/י לצעדים קטנים — 3, 6, 9 חודשים...' },
    ]
  },
  {
    id: 'action',
    icon: '⚡', iconClass: 'icon-action',
    title: 'הנעה לפעולה — איתגור',
    desc: 'מה קורה כבר השבוע הזה',
    quote: 'ש.ק.ו.פ — שיפורים קטנים ובלתי פוסקים. שאל: מה הצעד הקטן ביותר שאוכל לעשות עוד היום?',
    questions: [
      { id:'q_this_week', label:'מה אתה/את הולך לעשות עוד השבוע שזה יקרה?', type:'textarea', placeholder:'פעולה ספציפית אחת לפחות — עם יום ושעה...' },
      { id:'q_more_action', label:'מה עוד אתה/את יכול לעשות?', type:'textarea', placeholder:'אתגר את עצמך — מה אפשרי שלא חשבת עליו?' },
    ]
  },
  {
    id: 'env',
    icon: '🌿', iconClass: 'icon-env',
    title: 'סביבות מקדמות',
    desc: 'חוזקות, נקודות תורפה, תמיכה',
    quote: 'אל תנסה להיות חזק לבד — צור את הסביבה שתעשה אותך חזק. (ליאור סופר)',
    questions: [
      { id:'q_strengths', label:'מה בחוזקות שלך יכול לסייע לך להצליח?', type:'textarea', placeholder:'אילו כישורים, תכונות, יתרונות יעזרו לך כאן?' },
      { id:'q_weaknesses', label:'מה בנקודות התורפה יכול לעכב? איך תתגבר?', type:'textarea', placeholder:'זהה/י את המכשולים — ואז תכנן/י כיצד לעבור אותם...' },
      { id:'q_support', label:'האם אתה/את צריך מישהו שירתם לעזרתך?', type:'input', placeholder:'שם, תפקיד, כיצד יעזרו...' },
    ]
  },
  {
    id: 'beliefs',
    icon: '🧠', iconClass: 'icon-beliefs',
    title: 'פרדיגמות ואמונות מעכבות',
    desc: 'הקול הפנימי שמעכב — ומה עונים לו',
    quote: '"השד שאתה מכיר עדיף על השד שאתה לא מכיר" — זו אמונה מעכבת. הגיע הזמן לפגוש את השד החדש.',
    questions: [
      { id:'q_blocking_belief', label:'איזו אמונה שלך מעכבת את הביצוע?', type:'textarea', placeholder:'מה אתה/את אומר לעצמך ש"לא יקרה" או ש"לא מסוגל/ת"?' },
      { id:'q_empowering_belief', label:'מהי האמונה שיכולה לשרת את הביצוע?', type:'textarea', placeholder:'מה אמונה חלופית שתאפשר לך לפעול?' },
      { id:'q_inner_voice', label:'איזה קול בתוכך מחליש את המוטיבציה — ומה אתה/את עונה לו?', type:'textarea', placeholder:'תן/י ביטוי לקול הזה, ואז ענה/י לו בחזרה...' },
    ]
  },
  {
    id: 'summary_stage',
    icon: '✅', iconClass: 'icon-summary',
    title: 'סיכום — ברית הביצוע',
    desc: 'מחויבות, אחריות ושלב הבא',
    quote: 'החלטה אמיתית נמדדת בפעולה. אם אין פעולה — לא באמת קיבלת החלטה. (ליאור סופר)',
    questions: [
      { id:'q_commit', label:'מה לקחת על עצמך לבצע?', type:'textarea', placeholder:'פרט/י את ההתחייבות שלך — ספציפי, מדיד, עם תאריך...' },
      { id:'q_environment_set', label:'מה הסביבות שיצרת להבטיח ביצוע?', type:'textarea', placeholder:'מה תעשה/י שזה יקרה — תזכורות, שותף, כלים...' },
      { id:'q_commitment_level', label:'מהי רמת האחריות והמחוייבות שלך למשימה? (1-10)', type:'input', placeholder:'1 = נמוכה, 10 = מוחלטת' },
    ]
  },
];

let currentStage = 0;
let timerInterval = null;
let timerSeconds = 30 * 60;
let timerRunning = false;
const answers = {};

function buildUI() {
  // Progress steps
  const steps = document.getElementById('progress-steps');
  steps.innerHTML = STAGES.map((_,i) => `<div class="progress-step" id="step-${i}"></div>`).join('');

  // Build all stage cards
  const container = document.getElementById('stages-container');
  container.innerHTML = STAGES.map((s, i) => `
    <div class="stage-card ${i===0?'visible':''}" id="stage-card-${i}">
      <div class="stage-header">
        <div class="stage-icon ${s.iconClass}">${s.icon}</div>
        <div>
          <div class="stage-num">שלב ${i+1} מתוך ${STAGES.length}</div>
          <div class="stage-title">${s.title}</div>
          <div class="stage-desc">${s.desc}</div>
        </div>
      </div>
      <div class="lior-quote"><span>💬 תובנה לשלב זה</span>${s.quote}</div>
      ${s.questions.map(q => `
        <div class="question-block">
          <label class="q-label" for="${q.id}">${q.label}</label>
          ${q.type === 'textarea'
            ? `<textarea class="q-input" id="${q.id}" placeholder="${q.placeholder}" rows="3" oninput="saveAnswer('${q.id}',this.value)"></textarea>`
            : `<input class="q-input" type="text" id="${q.id}" placeholder="${q.placeholder}" oninput="saveAnswer('${q.id}',this.value)">`
          }
        </div>
      `).join('')}
      <div class="nav-row">
        ${i > 0 ? `<button class="btn-prev" onclick="goTo(${i-1})">← הקודם</button>` : ''}
        ${i < STAGES.length-1
          ? `<button class="btn-next" onclick="goTo(${i+1})">הבא ←</button>`
          : `<button class="btn-next" style="background:linear-gradient(135deg,#059669,#10b981)" onclick="finishSession()">✅ סיים פגישה</button>`
        }
      </div>
    </div>
  `).join('');

  updateProgress();
}

function saveAnswer(id, val) { answers[id] = val; }

function goTo(idx) {
  document.getElementById(`stage-card-${currentStage}`).classList.remove('visible');
  currentStage = idx;
  document.getElementById(`stage-card-${currentStage}`).classList.add('visible');
  document.getElementById(`stage-card-${currentStage}`).scrollIntoView({behavior:'smooth',block:'start'});
  updateProgress();
}

function updateProgress() {
  STAGES.forEach((_,i) => {
    const el = document.getElementById(`step-${i}`);
    if(i < currentStage) { el.className='progress-step done'; }
    else if(i === currentStage) { el.className='progress-step active'; }
    else { el.className='progress-step'; }
  });
  document.getElementById('progress-text').textContent = `שלב ${currentStage+1} מתוך ${STAGES.length} — ${STAGES[currentStage].title}`;
}

function toggleTimer() {
  if(timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    document.getElementById('timer-btn').textContent = '▶ המשך';
  } else {
    timerRunning = true;
    document.getElementById('timer-btn').textContent = '⏸ השהה';
    timerInterval = setInterval(() => {
      timerSeconds--;
      if(timerSeconds <= 0) { clearInterval(timerInterval); timerSeconds=0; }
      const m = Math.floor(timerSeconds/60);
      const s = timerSeconds % 60;
      const disp = document.getElementById('timer-display');
      disp.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      disp.className = 'timer-display' + (timerSeconds < 300 ? ' warning' : '');
    }, 1000);
  }
}

function finishSession() {
  clearInterval(timerInterval);
  const name = document.getElementById('trainee-name').value || 'המתאמן';
  const date = document.getElementById('session-date').value || new Date().toLocaleDateString('he-IL');

  const summaryCard = document.getElementById('summary-card');
  summaryCard.style.display = 'block';

  const content = document.getElementById('summary-content');
  const sections = [
    {label:'🤝 נושא האימון', key:'q_topic'},
    {label:'🔭 תמונת עתיד', key:'q_future_vision'},
    {label:'💎 למה זה חשוב', key:'q_why'},
    {label:'⚡ מה עושים השבוע', key:'q_this_week'},
    {label:'🧠 אמונה מעכבת', key:'q_blocking_belief'},
    {label:'🧠 אמונה מחזקת', key:'q_empowering_belief'},
    {label:'✅ התחייבות', key:'q_commit'},
    {label:'📊 רמת מחויבות', key:'q_commitment_level'},
  ];

  content.innerHTML = sections.map(s => `
    <div class="summary-line">
      <div class="summary-label">${s.label}</div>
      <div class="summary-val">${answers[s.key] || '—'}</div>
    </div>
  `).join('<div style="height:1px;background:rgba(255,255,255,0.07);margin:8px 0"></div>');

  summaryCard.scrollIntoView({behavior:'smooth'});
}

function copySummary() {
  const name = document.getElementById('trainee-name').value || 'המתאמן';
  const date = document.getElementById('session-date').value || new Date().toLocaleDateString('he-IL');
  let text = `🤝 מודל שיחת אימון — ליאור סופר\n👤 ${name} | 📅 ${date}\n\n`;
  STAGES.forEach(s => {
    text += `═══ ${s.icon} ${s.title} ═══\n`;
    s.questions.forEach(q => {
      const val = answers[q.id];
      if(val) text += `${q.label}\n→ ${val}\n\n`;
    });
  });
  text += `\nנוצר ע"י Mentor-IT | AILON Task`;
  navigator.clipboard.writeText(text).then(()=>alert('✅ הסיכום הועתק!'));
}

function printSummary() { window.print(); }

function resetSession() {
  currentStage = 0;
  timerSeconds = 30*60;
  timerRunning = false;
  clearInterval(timerInterval);
  document.getElementById('timer-display').textContent = '30:00';
  document.getElementById('timer-btn').textContent = '▶ התחל';
  document.getElementById('summary-card').style.display = 'none';
  document.querySelectorAll('.q-input').forEach(el=>el.value='');
  buildUI();
  window.scrollTo({top:0,behavior:'smooth'});
}

// Init
buildUI();
document.getElementById('session-date').value = new Date().toLocaleDateString('he-IL');
</script>
