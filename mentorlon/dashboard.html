<!DOCTYPE html>
<html lang="he" dir="rtl">
<head><!-- v3-fix-buttons -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentor-IT — דשבורד מאמן</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg,#f0fdfa,#ecfeff,#ffffff); color: #0f172a; direction: rtl; min-height: 100vh; }
  .container { max-width: 1000px; margin: 0 auto; padding: 24px 20px 60px; }
  .header { display:flex; align-items:center; justify-content:space-between; margin-bottom: 20px; flex-wrap:wrap; gap:14px; }
  .header .titlebox { display:flex; align-items:center; gap:14px; }
  .logo { display:flex; align-items:center; justify-content:center; width:52px; height:52px; border-radius:14px; background:#ffffff; font-size:24px; box-shadow:0 6px 20px rgba(20,184,166,0.25); border:2px solid #14b8a6; overflow:hidden; }
  .header h1 { font-size:22px; font-weight:800; background:linear-gradient(135deg,#5eead4,#67e8f9); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .header p { font-size:13px; color:#475569; }
  
  .greeting-bar { background: linear-gradient(135deg,#f0fdfa,#ecfeff); border: 1px solid #ccfbf1; border-radius: 14px; padding: 16px 20px; margin-bottom: 18px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
  .greeting-bar .g-text { font-size: 16px; font-weight: 700; color: #0d9488; }
  .greeting-bar .g-sub { font-size: 13px; color: #475569; margin-top: 3px; }
  .quick-share { display:flex; align-items:center; gap:8px; }
  .quick-share-btn { background: linear-gradient(135deg,#14b8a6,#0891b2); color:#fff; border:none; padding:10px 16px; border-radius:10px; cursor:pointer; font-weight:800; font-size:13px; font-family:inherit; }

  .logout-btn { padding:9px 16px; border-radius:10px; border:1px solid #ccfbf1; background:#f0fdfa; color:#0f172a; cursor:pointer; font-family:inherit; font-size:13px; }
  .share-link { background:#f0fdfa; border:1px solid #ccfbf1; border-radius:12px; padding:14px 18px; margin-bottom:20px; font-size:13px; color:#475569; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .share-link code { background:#ffffff; padding:6px 10px; border-radius:8px; color:#0d9488; border:1px solid #ccfbf1; direction:ltr; word-break:break-all; }
  .copy-btn { background:#ffffff; border:1px solid #ccfbf1; color:#0f172a; padding:6px 12px; border-radius:8px; cursor:pointer; font-size:12px; font-family:inherit; }
  .stats { display:grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap:14px; margin-bottom:26px; }
  .stat-card { background:#ffffff; border:1px solid #ccfbf1; border-radius:14px; padding:18px; text-align:center; box-shadow:0 4px 14px rgba(15,118,110,0.08); }
  .stat-card .num { font-size:28px; font-weight:800; color:#0d9488; }
  .stat-card .lbl { font-size:12px; color:#64748b; margin-top:4px; }
  .section-title { font-size:16px; font-weight:800; margin:26px 0 14px; display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .section-title .add-btn { font-size:13px; font-weight:700; background:linear-gradient(135deg,#14b8a6,#0891b2); color:#ffffff; border:none; padding:9px 16px; border-radius:10px; cursor:pointer; font-family:inherit; display:flex; align-items:center; gap:6px; }
  .tools-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap:18px; margin-bottom:10px; }
  .tool-card {
    background:#ffffff;
    border:none;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 6px 28px rgba(15,23,42,0.10);
    transition: transform .22s ease, box-shadow .22s ease;
    position:relative;
  }
  .tool-card:hover { transform:translateY(-4px); box-shadow:0 16px 44px rgba(15,23,42,0.16); }
  .tool-banner {
    height: 130px;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:hidden;
  }
  .tool-banner .banner-icon {
    font-size: 56px;
    z-index:2;
    filter:drop-shadow(0 4px 12px rgba(0,0,0,0.25));
    animation: floatIcon 3s ease-in-out infinite;
  }
  .tool-banner .banner-bg {
    position:absolute; inset:0;
    opacity:0.18;
    background-size:60px 60px;
  }
  .tool-banner .coming-tag {
    position:absolute; top:10px; left:10px;
    background:rgba(255,255,255,0.25);
    backdrop-filter:blur(6px);
    color:#fff;
    font-size:11px; font-weight:700;
    padding:4px 10px; border-radius:20px;
    border:1px solid rgba(255,255,255,0.3);
  }
  .tool-banner .live-tag {
    position:absolute; top:10px; left:10px;
    background:rgba(255,255,255,0.3);
    backdrop-filter:blur(6px);
    color:#fff;
    font-size:11px; font-weight:700;
    padding:4px 10px; border-radius:20px;
    border:1px solid rgba(255,255,255,0.35);
  }
  @keyframes floatIcon {
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-7px);}
  }
  .tool-body { padding:16px 18px 18px; }
  .tool-card .t-name { font-weight:800; font-size:15px; margin-bottom:6px; color:#0f172a; }
  .tool-card .t-desc { font-size:12.5px; color:#64748b; margin-bottom:14px; line-height:1.55; min-height:36px; }
  .tool-card a.open-btn {
    display:block; text-align:center; padding:12px;
    border-radius:11px; color:#ffffff; font-weight:800;
    font-size:14px; text-decoration:none;
    background: linear-gradient(135deg, #0d9488, #0891b2);
    box-shadow: 0 3px 10px rgba(13,148,136,0.35);
    transition: opacity .18s, transform .15s;
    margin-top:4px;
  }
  .tool-card a.open-btn:active { transform:scale(0.97); }
  .tool-card a.open-btn:hover { opacity:0.9; }
  .tool-card .disabled-btn {
    display:block; text-align:center; padding:10px;
    border-radius:11px; background:#f1f5f9; color:#94a3b8;
    font-weight:700; font-size:13px; border:1px solid #e2e8f0;
    cursor:not-allowed;
  }
  .status-live { display:none; }
  .status-soon { display:none; }
  .table-wrap { background:#ffffff; border:1px solid #e2e8f0; border-radius:16px; overflow:hidden; box-shadow:0 4px 14px rgba(15,118,110,0.06); }
  table { width:100%; border-collapse:collapse; }
  th { background:#f0fdfa; padding:14px; font-size:13px; text-align:right; color:#475569; font-weight:700; }
  td { padding:14px; border-top:1px solid #e2e8f0; font-size:14px; color:#0f172a; }
  .badge { display:inline-block; padding:4px 10px; border-radius:20px; font-size:12px; font-weight:700; }
  .badge-yes { background:rgba(13,148,136,0.15); color:#0d9488; }
  .badge-no { background:rgba(148,163,184,0.18); color:#64748b; }
  .tool-tag { display:inline-block; background:#f1f5f9; border:1px solid #e2e8f0; color:#334155; padding:3px 9px; border-radius:8px; font-size:11px; margin-left:4px; margin-bottom:3px; }
  .tool-tag.shared { background:rgba(13,148,136,0.12); border-color:#99f6e4; color:#0d9488; }
  .empty { text-align:center; padding:50px 20px; color:#64748b; }
  .empty .icon { font-size:40px; margin-bottom:12px; }
  @media (max-width:640px) {
    table, thead, tbody, th, td, tr { display:block; }
    thead { display:none; }
    tr { border-top:1px solid #e2e8f0; padding:14px 0; }
    td { border:none; padding:6px 14px; }
    td:before { content: attr(data-label); font-weight:700; color:#64748b; display:block; font-size:11px; margin-bottom:2px; }
  }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(15,23,42,0.55); z-index:100; align-items:center; justify-content:center; padding:20px; }
  .modal-overlay.open { display:flex; }
  .modal { background:#ffffff; border-radius:18px; width:100%; max-width:480px; max-height:88vh; overflow-y:auto; padding:24px; box-shadow:0 20px 60px rgba(15,23,42,0.3); }
  .modal h2 { font-size:18px; margin-bottom:16px; color:#0f172a; }
  .field { margin-bottom:14px; }
  .field label { display:block; font-size:13px; font-weight:700; margin-bottom:6px; color:#334155; }
  .field input { width:100%; padding:11px 13px; border-radius:9px; border:1px solid #e2e8f0; font-family:inherit; font-size:14px; background:#f8fafc; }
  .field input:focus { outline:none; border-color:#14b8a6; background:#ffffff; }
  .tool-checks { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .tool-check { display:flex; align-items:center; gap:8px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:9px; padding:9px 11px; font-size:13px; cursor:pointer; }
  .tool-check.disabled { opacity:0.5; cursor:not-allowed; }
  .tool-check input { width:auto; }
  .modal-actions { display:flex; gap:10px; margin-top:18px; }
  .btn { flex:1; padding:12px; border-radius:10px; border:none; font-family:inherit; font-weight:700; font-size:14px; cursor:pointer; }
  .btn-primary { background:linear-gradient(135deg,#14b8a6,#0891b2); color:#ffffff; }
  .btn-secondary { background:#f1f5f9; color:#334155; }
  .modal-msg { font-size:13px; margin-top:10px; padding:10px; border-radius:9px; display:none; }
  .modal-msg.error { background:rgba(220,38,38,0.08); color:#dc2626; display:block; }
  .modal-msg.success { background:rgba(13,148,136,0.1); color:#0d9488; display:block; }
  .creds-box { background:#f0fdfa; border:1px dashed #14b8a6; border-radius:10px; padding:12px; margin-top:10px; font-size:13px; direction:ltr; text-align:left; }
</style>
</head>
<body>
<div class="container">

  <!-- ציטוט מנהיגות מהמאגר - מציג בדשבורד -->
  <div id="leadership-quote-bar" style="background:linear-gradient(135deg,#0f172a,#1e293b);border:1px solid #334155;border-radius:12px;padding:14px 18px;margin-bottom:16px;text-align:right;direction:rtl;display:flex;align-items:center;gap:12px;">

  </div>
<script>
(function(){

    "תמיד תן את הקרדיט של ההצלחות לצוות שלך, ותמיד קח אחריות על הכשלונות.",
    "מנהיגים מבלים 5% מזמנם במחשבה על הבעיה, ו-95% על הפתרון.",
    "כוח = סכום אפס. השפעה = אש שמתרבה. בחר השפעה.",
    "כשמלך מת — כוחו נגמר. כשנביא מת — השפעתו מתחילה. (הרב יונתן זקס)"
  ];

</script>

  <div class="header">
    <div class="titlebox">
      <div class="logo"><img src="https://base44.app/api/apps/69f63b4536d7a2c6688403df/files/mp/public/69f63b4536d7a2c6688403df/2212f6c08_ailon_hex_final_v3.png" alt="AILON Task" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;"></div>

    <div style="display:flex;gap:8px;">

    </div>

<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h2>➕ הוספת מתאמן חדש</h2>
    <div class="field">
      <label>שם המתאמן</label>
      <input type="text" id="newName" placeholder="לדוגמה: ישראל ישראלי">
    </div>

      <input type="text" id="newPhone" placeholder="05X-XXXXXXX">
    </div>
    <div class="field">
      <label>שם משתמש להתחברות המתאמן</label>
      <input type="text" id="newUsername" placeholder="אותיות אנגלית/מספרים, לדוגמה: yisrael1" style="direction:ltr;">
    </div>
    <div class="field">
      <label>סיסמה למתאמן</label>

    </div>
    <div class="field">
      <label>כלים שהמתאמן יקבל גישה אליהם</label>

    <div class="modal-msg" id="addMsg"></div>

      <button class="btn btn-secondary" onclick="closeAddModal()">ביטול</button>
      <button class="btn btn-primary" id="addSubmitBtn" onclick="submitAddTrainee()">צור מתאמן</button>
    </div>
  </div>
</div>

<script>
const API = 'https://base44.app/api/apps/69f63b4536d7a2c6688403df/functions/mentorlonApi';
const TOOLS = [
  { key:'career_compass', icon:'🧭', name:'מצפן הקריירה', desc:'גלה את המקצוע שמדבר אל הנשמה שלך — מיצוב, כיוון ופוטנציאל', url:'../matpen-kariera/', live:true, color:'#f59e0b,#ef4444', bg:'career' },
  { key:'loaz_shavuai', icon:'📅', name:'לוז שבועי', desc:'ניהול הזמן שלך: מיקוד יומי, מטרות שבועיות ומעקב התקדמות', url:'../loaz-shavuai/', live:true, color:'#0891b2,#14b8a6', bg:'schedule' },
  { key:'shkuf_habits', icon:'🔄', name:'ש.ק.ו.פ — הרגלים', desc:'21 ימים של שינוי אמיתי — שיפורים קטנים שמובילים לתוצאות גדולות', url:'../shkuf-habits/', live:true, color:'#8b5cf6,#06b6d4', bg:'habits' },
  { key:'mind_track', icon:'🧠', name:'MindTrack', desc:'מעקב חכם אחר מצב הרוח, הבריאות והאנרגיה שלך בכל יום', url:'../mindtrack/', live:true, color:'#10b981,#3b82f6', bg:'mind' },
  { key:'decision_making', icon:'⚖️', name:'Exit Strategy AI', desc:'כלי AI לניתוח החלטות — הבן את העבר, תכנן את העתיד', url:'../exit-strategy/', live:true, color:'#6366f1,#8b5cf6', bg:'exit' },
  { key:'positive_thinking', icon:'💭', name:'חשיבה חיובית', desc:'שנה את הדפוסים, שנה את החיים — כלים מבוססי מדע לחשיבה חיובית', url:'#', live:false, color:'#f472b6,#fb923c', bg:'think' },
  { key:'relationships', icon:'❤️', name:'ניהול זוגיות', desc:'כלים מעשיים לתקשורת, חיבור רגשי ובניית קשר עמוק', url:'#', live:false, color:'#f43f5e,#ec4899', bg:'love' },
  { key:'emotions', icon:'😊', name:'ניהול רגשות', desc:'זיהוי, הבנה וויסות רגשי — מבוסס CBT ומיינדפולנס', url:'#', live:false, color:'#f97316,#facc15', bg:'emotion' },
  { key:'parenting', icon:'👨‍👧', name:'חינוך ילדים', desc:'הורות מיטבית — כלים לחיבור, גבולות ויצירת ילדים מאושרים', url:'#', live:false, color:'#22c55e,#84cc16', bg:'parent' },
];

const username = localStorage.getItem('mentorlon_username');
const token = localStorage.getItem('mentorlon_token');
if (!username || !token) window.location.href = 'index.html';

function logout() {
  localStorage.removeItem('mentorlon_username');
  localStorage.removeItem('mentorlon_token');
  localStorage.removeItem('mentorlon_display_name');
  window.location.href = 'index.html';
}

function copyLink() {
  const t = document.getElementById('shareLink').textContent;
  navigator.clipboard.writeText(t).then(()=>{
    const b = event.target; const old = b.textContent; b.textContent='הועתק!'; setTimeout(()=>b.textContent=old, 1500);
  });
}

function renderTools() {
  const grid = document.getElementById('toolsGrid');
  grid.innerHTML = TOOLS.map(t => `
    <div class="tool-card ${t.live?'live':''}">
      <div class="t-icon" style="font-size:32px;margin-bottom:8px;">${t.icon}</div>
      <div class="t-name">${t.name}</div>
      <div class="t-desc">${t.desc}</div>
      <div class="t-status ${t.live?'status-live':'status-soon'}">${t.live?'זמין':'בקרוב'}</div>
      ${t.live ? `<a class="open-btn" href="${t.url}" target="_blank">▶ פתח כלי</a>` : `<div class="disabled-btn">🔜 בפיתוח</div>`}
    </div>
  `).join('');
}

function renderToolChecks() {
  const wrap = document.getElementById('toolChecks');
  wrap.innerHTML = TOOLS.map(t => `
    <label class="tool-check">
      <input type="checkbox" value="${t.key}">
      <span>${t.icon} ${t.name}</span>
    </label>
  `).join('');
}

function openAddModal() {
  document.getElementById('newName').value = '';
  document.getElementById('newPhone').value = '';
  document.getElementById('newUsername').value = '';
  document.getElementById('newPassword').value = '';
  document.getElementById('addMsg').className = 'modal-msg';
  document.getElementById('addMsg').textContent = '';
  document.getElementById('credsBox').style.display = 'none';
  document.getElementById('addSubmitBtn').style.display = 'block';
  renderToolChecks();
  document.getElementById('addModal').classList.add('open');
}
function closeAddModal() { document.getElementById('addModal').classList.remove('open'); }

async function submitAddTrainee() {
  const name = document.getElementById('newName').value.trim();
  const phone = document.getElementById('newPhone').value.trim();
  const trainee_username = document.getElementById('newUsername').value.trim().toLowerCase();
  const trainee_password = document.getElementById('newPassword').value;
  const tools_assigned = Array.from(document.querySelectorAll('#toolChecks input:checked')).map(c=>c.value);
  const msg = document.getElementById('addMsg');
  msg.className = 'modal-msg'; msg.textContent = '';
  if (!name || !trainee_username || !trainee_password) {
    msg.className = 'modal-msg error'; msg.textContent = 'יש למלא שם, שם משתמש וסיסמה'; return;
  }
  try {
    const res = await fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({
      action:'create_trainee', mentor_username: username, mentor_token: token,
      name, phone, trainee_username, trainee_password, tools_assigned
    })});
    const data = await res.json();
    if (!res.ok) { msg.className='modal-msg error'; msg.textContent = data.error || 'שגיאה'; return; }
    msg.className = 'modal-msg success';
    msg.textContent = 'המתאמן נוצר בהצלחה! מסור לו את פרטי ההתחברות:';
    document.getElementById('credsBox').style.display = 'block';
    document.getElementById('credsBox').innerHTML = `שם משתמש: <b>${data.trainee.username}</b><br>סיסמה: <b>${trainee_password}</b><br>כתובת התחברות: ${window.location.origin + window.location.pathname.replace('dashboard.html','trainee-login.html')}`;
    document.getElementById('addSubmitBtn').style.display = 'none';
    loadDashboard();
  } catch(e) {
    msg.className = 'modal-msg error'; msg.textContent = 'שגיאת רשת';
  }
}

async function loadDashboard() {
  document.getElementById('shareLink').textContent = window.location.origin + window.location.pathname.replace('dashboard.html','signup.html') + '?mentor=' + username;
  renderTools();
  try {
    const res = await fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'dashboard', username, token }) });
    const data = await res.json();
    if (!res.ok) {
      if (res.status === 401) { logout(); return; }
      document.getElementById('tableWrap').innerHTML = '<div class="empty"><div class="icon">⚠️</div>' + (data.error||'שגיאה') + '</div>';
      return;
    }
    document.getElementById('mentorLabel').textContent = 'שלום ' + data.mentor.display_name + (data.mentor.business_name ? ' · ' + data.mentor.business_name : '');
    if (data.mentor.is_admin) { document.getElementById('adminBtn').style.display = 'inline-block'; }
    const trainees = data.trainees || [];
    const totalTools = trainees.reduce((s,t)=> s + (t.tools_assigned||[]).length, 0);
    const sharing = trainees.filter(t=>(t.shared_tools||[]).length>0).length;
    document.getElementById('statsRow').innerHTML = `
      <div class="stat-card"><div class="num">${trainees.length}</div><div class="lbl">מתאמנים</div></div>
      <div class="stat-card"><div class="num">${sharing}</div><div class="lbl">משתפים נתונים</div></div>
      <div class="stat-card"><div class="num">${totalTools}</div><div class="lbl">שיוכי כלים</div></div>
    `;
    if (!trainees.length) {
      document.getElementById('tableWrap').innerHTML = '<div class="empty"><div class="icon">👥</div>עדיין אין מתאמנים רשומים.<br>לחץ על "מתאמן חדש" כדי ליצור אחד, או שתף את הקישור למעלה.</div>';
      return;
    }
    const rows = trainees.map(t => {
      const shared = t.shared_tools || [];
      const toolsHtml = (t.tools_assigned||[]).map(k=>{
        const tl = TOOLS.find(x=>x.key===k);
        const isShared = shared.includes(k);
        return `<span class="tool-tag ${isShared?'shared':''}">${tl?tl.icon+' '+tl.name:k}${isShared?' ✓':''}</span>`;
      }).join('') || '—';
      return `
      <tr>
        <td data-label="שם">${t.name}</td>
        <td data-label="שם משתמש">${t.username ? '<span style="direction:ltr;display:inline-block;">'+t.username+'</span>' : '<span style="color:#94a3b8;">רשום עצמאית</span>'}</td>
        <td data-label="כלים ושיתוף">${toolsHtml}</td>
        <td data-label="סטטוס שיתוף"><span class="badge ${shared.length?'badge-yes':'badge-no'}">${shared.length ? '✓ משתף '+shared.length+' כלים' : '✕ אין שיתוף'}</span></td>
      </tr>
    `}).join('');
    document.getElementById('tableWrap').innerHTML = `
      <table>
        <thead><tr><th>שם</th><th>שם משתמש</th><th>כלים ושיתוף</th><th>סטטוס שיתוף</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  } catch(e) {
    document.getElementById('tableWrap').innerHTML = '<div class="empty"><div class="icon">⚠️</div>שגיאת רשת</div>';
  }
}
loadDashboard();

// Greeting
function updateGreeting(displayName, trainees) {
  document.getElementById('greetName').textContent = displayName || 'מאמן';
  const count = trainees ? trainees.length : 0;
  const hour = new Date().getHours();
  const timeGreet = hour < 12 ? 'בוקר טוב' : hour < 17 ? 'צהריים טובים' : 'ערב טוב';
  document.getElementById('greetSub').textContent = timeGreet + ' | ' + count + ' מתאמנים במערכת';
}

</script>
