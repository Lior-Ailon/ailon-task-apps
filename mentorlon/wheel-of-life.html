<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מעגל החיים | Mentor-IT</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f8fafc;
  min-height: 100vh; color: #1e293b; direction: rtl; padding: 16px;
}
.wrap { max-width: 520px; margin: 0 auto; }

/* HEADER */
.header {
  text-align: center; padding: 18px 0 14px;
  border-bottom: 1px solid #e2e8f0; margin-bottom: 18px;
}
.logo-row { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:6px; }
.logo-img { width:38px; height:38px; border-radius:9px; object-fit:cover; }
.header h1 { font-size: 20px; font-weight: 900; color: #0d9488; }
.header p { font-size: 12px; color: #94a3b8; margin-top: 3px; }

/* TRAINEE */
.trainee-box {
  display:flex; gap:8px; margin-bottom:14px;
}
.trainee-box input {
  flex:1; background:#fff; border:1.5px solid #e2e8f0;
  color:#1e293b; padding:9px 13px; border-radius:10px; font-size:13px;
  font-family:inherit; direction:rtl;
}
.trainee-box input:focus { outline:none; border-color:#0d9488; }
.trainee-box input::placeholder { color:#94a3b8; }

/* WHEEL CANVAS */
.wheel-wrap {
  background: #fff; border-radius: 20px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.08);
  padding: 16px; margin-bottom: 18px; text-align:center;
}
canvas#wheel { max-width: 100%; }

/* SCORE SLIDERS */
.scores-grid {
  display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px;
}
.score-row {
  background: #fff; border-radius: 14px;
  box-shadow: 0 1px 8px rgba(0,0,0,0.06);
  padding: 12px 14px;
}
.score-row-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.score-area-name {
  font-size: 13px; font-weight: 700; color: #1e293b; display:flex; align-items:center; gap:5px;
}
.score-val-badge {
  min-width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 900; color: #fff;
  transition: background 0.3s;
}
input[type=range].wheel-slider {
  width: 100%; -webkit-appearance: none; appearance: none;
  height: 5px; border-radius: 10px; outline: none; cursor: pointer;
}
input[type=range].wheel-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 22px; height: 22px;
  background: #0d9488; border-radius: 50%;
  box-shadow: 0 0 0 3px rgba(13,148,136,0.2);
  cursor: pointer; transition: transform 0.15s;
}
input[type=range].wheel-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }

/* RESULTS */
.results-card {
  background: #fff; border-radius: 16px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.07);
  padding: 16px; margin-bottom: 14px; display:none;
}
.results-card h3 { font-size:15px; color:#0d9488; margin-bottom:12px; font-weight:800; }
.bar-row {
  display:flex; align-items:center; gap:8px; margin-bottom:7px;
}
.bar-label { width:120px; font-size:12px; color:#475569; text-align:right; flex-shrink:0; }
.bar-track { flex:1; height:9px; background:#f1f5f9; border-radius:10px; overflow:hidden; }
.bar-fill { height:100%; border-radius:10px; transition: width 0.8s ease; }
.bar-num { width:22px; font-size:12px; font-weight:800; color:#1e293b; }

.insights-list { margin-top:14px; }
.insight-pill {
  display:flex; align-items:flex-start; gap:8px;
  background:#f8fafc; border-radius:10px; padding:10px 12px;
  margin-bottom:8px; font-size:13px; color:#475569; line-height:1.5;
}
.insight-pill strong { color:#1e293b; }

/* AVG BADGE */
.avg-badge {
  display:inline-flex; align-items:center; gap:6px;
  background:linear-gradient(135deg,#0d9488,#14b8a6);
  color:#fff; border-radius:20px; padding:6px 16px;
  font-size:14px; font-weight:800; margin-bottom:14px;
}

/* BUTTONS */
.btn-primary {
  display:block; width:100%; padding:13px;
  background:linear-gradient(135deg,#0d9488,#14b8a6);
  color:white; border:none; border-radius:12px; font-size:15px; font-weight:700;
  cursor:pointer; font-family:inherit; transition:opacity 0.2s; margin-bottom:9px;
}
.btn-primary:hover { opacity:0.9; }
.btn-secondary {
  display:block; width:100%; padding:11px;
  background:#f1f5f9; color:#475569;
  border:1.5px solid #e2e8f0; border-radius:12px; font-size:13px; font-weight:600;
  cursor:pointer; font-family:inherit; transition:all 0.2s; margin-bottom:9px;
}
.btn-secondary:hover { background:#e2e8f0; }
.back-link {
  display:inline-flex; align-items:center; gap:5px;
  color:#94a3b8; font-size:13px; text-decoration:none; margin-bottom:14px;
}
.back-link:hover { color:#0d9488; }

/* CONTINUE BTN */
.continue-wrap { text-align:center; margin-top:10px; }
.btn-continue {
  display:inline-flex; align-items:center; gap:8px;
  background:linear-gradient(135deg,#6366f1,#818cf8);
  color:#fff; border:none; border-radius:12px;
  padding:12px 24px; font-size:14px; font-weight:700;
  cursor:pointer; font-family:inherit; text-decoration:none;
}
</style>
</head>
<body>
<div class="wrap">
  <a href="./index.html" class="back-link">← Mentor-IT</a>

  <div class="header">
    <div class="logo-row">
      <img src="https://base44.app/api/apps/69f63b4536d7a2c6688403df/files/mp/public/69f63b4536d7a2c6688403df/1b0b81977_ailon_header_logo.png" class="logo-img" alt="AILON">
      <h1>🔄 מעגל החיים</h1>
    </div>
    <p>הערכה עצמית ב-10 תחומים — מהיכן מתחילים?</p>
  </div>

  <div class="trainee-box">
    <input type="text" id="trainee-name" placeholder="שם המתאמן/ת" />
    <input type="text" id="session-date" placeholder="תאריך" />
  </div>

  <!-- WHEEL CANVAS -->
  <div class="wheel-wrap">
    <canvas id="wheel" width="320" height="320"></canvas>
  </div>

  <!-- SCORE ROWS -->
  <div class="scores-grid" id="scores-grid"></div>

  <button class="btn-primary" onclick="showResults()">📊 הצג תוצאות ותובנות</button>

  <!-- RESULTS -->
  <div class="results-card" id="results-card">
    <h3>📊 סיכום מעגל החיים</h3>
    <div class="avg-badge" id="avg-badge">📈 ממוצע: —</div>
    <div id="bar-rows"></div>
    <div class="insights-list" id="insights-list"></div>

    <div class="continue-wrap" style="margin-top:14px;">
      <a href="./coaching-session.html" class="btn-continue">
        🤝 המשך לשיחת האימון ←
      </a>
    </div>
  </div>

  <div style="display:none" id="actions">
    <button class="btn-secondary" onclick="copySummary()">📋 העתק סיכום</button>
    <button class="btn-secondary" onclick="window.print()">🖨️ הדפס</button>
    <button class="btn-secondary" onclick="resetAll()">🔄 מעגל חדש</button>
  </div>

  <div style="height:30px"></div>
</div>

<script>
const DOMAINS = [
  { id:'health',   emoji:'🌿', label:'בריאות',             color:'#10b981' },
  { id:'family',   emoji:'🏡', label:'משפחה',             color:'#3b82f6' },
  { id:'money',    emoji:'💰', label:'כסף',               color:'#f59e0b' },
  { id:'environ',  emoji:'🏠', label:'סביבה פיזית',      color:'#8b5cf6' },
  { id:'leisure',  emoji:'🎭', label:'פנאי / בילויים',   color:'#ec4899' },
  { id:'other',    emoji:'✨', label:'אחר',               color:'#64748b' },
  { id:'growth',   emoji:'🌱', label:'צמיחה אישית',      color:'#06b6d4' },
  { id:'career',   emoji:'💼', label:'קריירה',            color:'#f97316' },
  { id:'romance',  emoji:'❤️', label:'משמעות / רומנטיקה',color:'#ef4444' },
  { id:'friends',  emoji:'👥', label:'חברים',             color:'#a855f7' },
];

const scores = {};
DOMAINS.forEach(d => scores[d.id] = 5);

function getScoreColor(s) {
  if(s <= 3) return '#ef4444';
  if(s <= 5) return '#f97316';
  if(s <= 7) return '#eab308';
  return '#10b981';
}

// ---- BUILD SLIDERS ----
function buildSliders() {
  const grid = document.getElementById('scores-grid');
  grid.innerHTML = DOMAINS.map(d => `
    <div class="score-row">
      <div class="score-row-top">
        <div class="score-area-name">${d.emoji} ${d.label}</div>
        <div class="score-val-badge" id="badge-${d.id}" style="background:${getScoreColor(5)}">5</div>
      </div>
      <input type="range" class="wheel-slider" min="1" max="10" value="5" id="slider-${d.id}"
        style="background:linear-gradient(to left, ${d.color} 44.4%, #e2e8f0 44.4%)"
        oninput="onScore('${d.id}', this.value, '${d.color}')"
      />
      <div style="display:flex;justify-content:space-between;font-size:10px;color:#94a3b8;margin-top:4px;">
        <span>1 נמוך</span><span>10 מעולה</span>
      </div>
    </div>
  `).join('');
}

function onScore(id, val, color) {
  val = parseInt(val);
  scores[id] = val;
  const badge = document.getElementById('badge-'+id);
  badge.textContent = val;
  badge.style.background = getScoreColor(val);
  const pct = ((val-1)/9*100).toFixed(1);
  document.getElementById('slider-'+id).style.background =
    `linear-gradient(to left, ${color} ${pct}%, #e2e8f0 ${pct}%)`;
  drawWheel();
}

// ---- DRAW WHEEL ----
function drawWheel() {
  const canvas = document.getElementById('wheel');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2;
  const maxR = 128;
  const n = DOMAINS.length;
  const step = (Math.PI*2)/n;

  ctx.clearRect(0,0,W,H);

  // Background rings
  for(let r=1; r<=10; r++) {
    ctx.beginPath();
    ctx.arc(cx, cy, maxR*r/10, 0, Math.PI*2);
    ctx.strokeStyle = r===10 ? '#cbd5e1' : '#e2e8f0';
    ctx.lineWidth = r===10 ? 1.5 : 0.8;
    ctx.stroke();
  }

  // Spokes + labels
  DOMAINS.forEach((d,i) => {
    const angle = step*i - Math.PI/2;
    const ex = cx + Math.cos(angle)*maxR;
    const ey = cy + Math.sin(angle)*maxR;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(ex,ey);
    ctx.strokeStyle = '#e2e8f0';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Label
    const lx = cx + Math.cos(angle)*(maxR+22);
    const ly = cy + Math.sin(angle)*(maxR+22);
    ctx.font = '10px Segoe UI, Arial';
    ctx.fillStyle = '#475569';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(d.emoji, lx, ly-6);
    ctx.font = 'bold 8.5px Segoe UI, Arial';
    ctx.fillStyle = '#64748b';

    // Wrap label
    const label = d.label;
    if(label.length > 6) {
      const words = label.split(' ');
      ctx.fillText(words[0], lx, ly+4);
      if(words[1]) ctx.fillText(words[1], lx, ly+13);
    } else {
      ctx.fillText(label, lx, ly+5);
    }
  });

  // Filled polygon
  ctx.beginPath();
  DOMAINS.forEach((d,i) => {
    const r = maxR * scores[d.id] / 10;
    const angle = step*i - Math.PI/2;
    const x = cx + Math.cos(angle)*r;
    const y = cy + Math.sin(angle)*r;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.closePath();
  ctx.fillStyle = 'rgba(13,148,136,0.12)';
  ctx.fill();
  ctx.strokeStyle = '#0d9488';
  ctx.lineWidth = 2.5;
  ctx.stroke();

  // Dots
  DOMAINS.forEach((d,i) => {
    const r = maxR * scores[d.id] / 10;
    const angle = step*i - Math.PI/2;
    const x = cx + Math.cos(angle)*r;
    const y = cy + Math.sin(angle)*r;
    ctx.beginPath();
    ctx.arc(x,y,5,0,Math.PI*2);
    ctx.fillStyle = d.color;
    ctx.fill();
    ctx.strokeStyle='#fff';
    ctx.lineWidth=2;
    ctx.stroke();

    // Score on dot
    ctx.font = 'bold 8px Arial';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(scores[d.id], x, y);
  });

  ctx.textAlign = 'start';
  ctx.textBaseline = 'alphabetic';
}

// ---- RESULTS ----
function showResults() {
  const vals = DOMAINS.map(d => scores[d.id]);
  const avg = (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
  const sorted = [...DOMAINS].sort((a,b)=>scores[b.id]-scores[a.id]);
  const highest = sorted[0];
  const lowest = sorted[sorted.length-1];
  const critical = DOMAINS.filter(d=>scores[d.id]<=4);

  document.getElementById('avg-badge').innerHTML = `📈 ממוצע: ${avg}/10`;

  // Bar rows
  document.getElementById('bar-rows').innerHTML = sorted.map(d=>`
    <div class="bar-row">
      <div class="bar-label">${d.emoji} ${d.label}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${scores[d.id]*10}%;background:${getScoreColor(scores[d.id])}"></div>
      </div>
      <div class="bar-num">${scores[d.id]}</div>
    </div>
  `).join('');

  // Insights
  const name = document.getElementById('trainee-name').value || 'המתאמן';
  const insights = [
    { icon:'💪', html:`<strong>החוזקה של ${name}:</strong> ${highest.emoji} ${highest.label} (${scores[highest.id]}/10) — מכאן בונים!` },
    { icon:'🎯', html:`<strong>הזדמנות לצמיחה:</strong> ${lowest.emoji} ${lowest.label} (${scores[lowest.id]}/10) — כאן הפוטנציאל הגדול ביותר` },
    critical.length > 0 && { icon:'🔴', html:`<strong>דורש תשומת לב:</strong> ${critical.map(d=>`${d.emoji} ${d.label}`).join(', ')}` },
    { icon:'🌟', html:`<strong>E+R=O:</strong> המצב הנוכחי הוא נקודת ההתחלה — לא נקודת הסיום. ביחד נבחר את ה-R הנכון!` },
  ].filter(Boolean);

  document.getElementById('insights-list').innerHTML = insights.map(ins=>`
    <div class="insight-pill"><span>${ins.icon}</span><div>${ins.html}</div></div>
  `).join('');

  document.getElementById('results-card').style.display = 'block';
  document.getElementById('actions').style.display = 'block';
  document.getElementById('results-card').scrollIntoView({behavior:'smooth'});
}

function copySummary() {
  const name = document.getElementById('trainee-name').value || 'המתאמן';
  const date = document.getElementById('session-date').value || new Date().toLocaleDateString('he-IL');
  const vals = DOMAINS.map(d => scores[d.id]);
  const avg = (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
  let text = `🔄 מעגל החיים — ${name} | ${date}\n\n`;
  DOMAINS.forEach(d => { text += `${d.emoji} ${d.label}: ${scores[d.id]}/10\n`; });
  text += `\n📈 ממוצע: ${avg}/10\nנוצר ע"י Mentor-IT | AILON Task`;
  navigator.clipboard.writeText(text).then(()=>alert('✅ הועתק!'));
}

function resetAll() {
  DOMAINS.forEach(d=>{ scores[d.id]=5; });
  buildSliders(); drawWheel();
  document.getElementById('results-card').style.display='none';
  document.getElementById('actions').style.display='none';
  window.scrollTo({top:0,behavior:'smooth'});
}

// Init
buildSliders();
drawWheel();
document.getElementById('session-date').value = new Date().toLocaleDateString('he-IL');
</script>
</body>
</html>
