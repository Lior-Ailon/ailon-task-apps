<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לוז שבועי — ניהול מוטיבציה</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  min-height: 100vh;
  padding: 16px;
}
.container { max-width: 1200px; margin: 0 auto; }
h1 {
  text-align: center;
  font-size: 24px;
  margin-bottom: 4px;
  color: #14b8a6;
}
.subtitle {
  text-align: center;
  font-size: 14px;
  color: #64748b;
  margin-bottom: 20px;
}
.header-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 20px;
  background: #1e293b;
  padding: 16px;
  border-radius: 12px;
}
.header-bar input, .header-bar select {
  background: #0f172a;
  border: 1px solid #334155;
  color: #e2e8f0;
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 14px;
}
.header-bar input:focus, .header-bar select:focus {
  outline: none;
  border-color: #14b8a6;
}
.week-nav {
  display: flex;
  align-items: center;
  gap: 12px;
}
.week-nav button {
  background: #1e293b;
  border: 1px solid #334155;
  color: #14b8a6;
  width: 36px;
  height: 36px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 18px;
  transition: all 0.2s;
}
.week-nav button:hover { background: #334155; }
.week-label { font-size: 14px; color: #94a3b8; }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
th {
  position: sticky;
  top: 0;
  background: #1e293b;
  color: #14b8a6;
  padding: 10px 4px;
  font-weight: 600;
  text-align: center;
  border: 1px solid #334155;
  z-index: 10;
}
th:first-child {
  width: 60px;
  color: #64748b;
}
td {
  border: 1px solid #1e293b;
  padding: 0;
  vertical-align: top;
  height: 52px;
  transition: background 0.15s;
}
td:hover { background: #1e293b; }
td:first-child {
  text-align: center;
  color: #64748b;
  font-size: 11px;
  font-weight: 600;
  background: #1e293b;
  vertical-align: middle;
}
.cell-content {
  padding: 4px 6px;
  cursor: pointer;
  min-height: 50px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.cell-task {
  font-size: 11px;
  color: #e2e8f0;
  line-height: 1.3;
  word-break: break-word;
}
.cell-task.empty { color: #475569; font-size: 10px; }
.motivation-bar {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 2px;
}
.motivation-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.motivation-text {
  font-size: 9px;
  color: #64748b;
}
.motivation-color-1 { background: #ef4444; }
.motivation-color-2 { background: #f97316; }
.motivation-color-3 { background: #f97316; }
.motivation-color-4 { background: #eab308; }
.motivation-color-5 { background: #eab308; }
.motivation-color-6 { background: #84cc16; }
.motivation-color-7 { background: #22c55e; }
.motivation-color-8 { background: #14b8a6; }
.motivation-color-9 { background: #06b6d4; }
.motivation-color-10 { background: #0ea5e9; }
.today-header { color: #f59e0b !important; }
.today-col { background: rgba(245, 158, 11, 0.05); }
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  justify-content: center;
  align-items: center;
  padding: 16px;
}
.modal-overlay.active { display: flex; }
.modal {
  background: #1e293b;
  border-radius: 16px;
  padding: 24px;
  max-width: 420px;
  width: 100%;
  box-shadow: 0 25px 50px rgba(0,0,0,0.5);
}
.modal-title {
  font-size: 18px;
  color: #14b8a6;
  margin-bottom: 4px;
}
.modal-subtitle {
  font-size: 13px;
  color: #64748b;
  margin-bottom: 20px;
}
.modal label {
  display: block;
  font-size: 13px;
  color: #94a3b8;
  margin-bottom: 6px;
  margin-top: 16px;
}
.modal textarea {
  width: 100%;
  background: #0f172a;
  border: 1px solid #334155;
  color: #e2e8f0;
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
  resize: vertical;
  min-height: 70px;
}
.modal textarea:focus { outline: none; border-color: #14b8a6; }
.motivation-input {
  display: flex;
  align-items: center;
  gap: 10px;
}
.motivation-input input[type="range"] {
  flex: 1;
  accent-color: #14b8a6;
  height: 6px;
}
.motivation-value {
  font-size: 22px;
  font-weight: 700;
  min-width: 36px;
  text-align: center;
}
.motivation-emoji {
  font-size: 20px;
  margin-left: 4px;
}
.modal-buttons {
  display: flex;
  gap: 10px;
  margin-top: 24px;
}
.btn {
  flex: 1;
  padding: 10px 16px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-save {
  background: #14b8a6;
  color: #0f172a;
  font-weight: 600;
}
.btn-save:hover { background: #0d9488; }
.btn-cancel {
  background: #334155;
  color: #e2e8f0;
}
.btn-cancel:hover { background: #475569; }
.btn-delete {
  background: #7f1d1d;
  color: #fca5a5;
}
.btn-delete:hover { background: #991b1b; }
.stats-bar {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.stat-card {
  background: #1e293b;
  padding: 12px 16px;
  border-radius: 10px;
  flex: 1;
  min-width: 140px;
}
.stat-label { font-size: 11px; color: #64748b; }
.stat-value { font-size: 22px; font-weight: 700; color: #14b8a6; }
.table-wrapper {
  overflow-x: auto;
  border-radius: 12px;
  border: 1px solid #1e293b;
}
@media (max-width: 768px) {
  h1 { font-size: 18px; }
  table { font-size: 10px; }
  th, td { padding: 2px; }
  .cell-content { padding: 3px 4px; min-height: 44px; }
  .cell-task { font-size: 9px; }
  .modal { padding: 16px; }
  .header-bar { flex-direction: column; align-items: stretch; }
  .header-bar input, .header-bar select { width: 100%; }
}
</style>
</head>
<body>
<div class="container">
  <h1>📋 לוז שבועי</h1>
  <div class="subtitle">ניהול לו"ז ומוטיבציה — ראשון עד שישי</div>

  <div class="header-bar">
    <div>
      <input type="text" id="userName" placeholder="הכנס את השם שלך" maxlength="30">
    </div>
    <div class="week-nav">
      <button id="prevWeek">‹</button>
      <span class="week-label" id="weekLabel"></span>
      <button id="nextWeek">›</button>
    </div>
    <div>
      <select id="viewMode">
        <option value="edit">מצב עריכה</option>
        <option value="view">מצב תצוגה</option>
      </select>
    </div>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat-card">
      <div class="stat-label">פעילויות השבוע</div>
      <div class="stat-value" id="statTotal">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">ממוצע מוטיבציה</div>
      <div class="stat-value" id="statAvg">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">נקודות מוטיבציה</div>
      <div class="stat-value" id="statSum">0</div>
    </div>
  </div>

  <div class="table-wrapper">
    <table id="scheduleTable">
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">עריכת פעילות</div>
    <div class="modal-subtitle" id="modalSubtitle"></div>
    <label>מה הלו"ז שלך בשעה הזו?</label>
    <textarea id="taskInput" placeholder="לדוגמה: פגישת עבודה, אימון, זמן משפחה, לימוד..."></textarea>
    <label>מה המוטיבציה שלך לביצוע הלו"ז הזה? (1-10)</label>
    <div class="motivation-input">
      <input type="range" id="motivationInput" min="1" max="10" value="5">
      <span class="motivation-emoji" id="motivationEmoji">😐</span>
      <span class="motivation-value" id="motivationValue">5</span>
    </div>
    <div class="modal-buttons">
      <button class="btn btn-delete" id="deleteBtn" style="display:none">מחק</button>
      <button class="btn btn-cancel" id="cancelBtn">ביטול</button>
      <button class="btn btn-save" id="saveBtn">שמור</button>
    </div>
  </div>
</div>

<script>
const DAYS = ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי'];
const HOURS = [];
for (let h = 8; h <= 23; h++) {
  HOURS.push(h + ':00');
  HOURS.push(h + ':30');
}
HOURS.push('00:00');

const MOTIVATION_EMOJIS = ['😢','😞','😕','😐','🙂','😊','😄','😃','🔥','🚀'];

let currentWeekStart = getWeekStart(new Date());
let selectedCell = null;
let viewMode = 'edit';

function getWeekStart(date) {
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day;
  d.setDate(diff);
  d.setHours(0,0,0,0);
  return d;
}

function formatDate(d) {
  return d.getDate() + '/' + (d.getMonth()+1);
}

function getCellKey(dayIdx, hourIdx) {
  const weekKey = currentWeekStart.toISOString().slice(0,10);
  return 'loaz_' + weekKey + '_' + dayIdx + '_' + hourIdx;
}

function getUserKey() {
  let name = document.getElementById('userName').value.trim();
  if (!name) name = 'משתמש';
  return name;
}

function getCellData(dayIdx, hourIdx) {
  const key = getCellKey(dayIdx, hourIdx);
  const userKey = getUserKey();
  const fullKey = key + '_' + userKey;
  const raw = localStorage.getItem(fullKey);
  if (!raw) return null;
  try { return JSON.parse(raw); } catch(e) { return null; }
}

function setCellData(dayIdx, hourIdx, data) {
  const key = getCellKey(dayIdx, hourIdx);
  const userKey = getUserKey();
  const fullKey = key + '_' + userKey;
  if (data) {
    localStorage.setItem(fullKey, JSON.stringify(data));
  } else {
    localStorage.removeItem(fullKey);
  }
}

function saveUserName() {
  localStorage.setItem('loaz_user_name', document.getElementById('userName').value);
}

function loadUserName() {
  const name = localStorage.getItem('loaz_user_name');
  if (name) document.getElementById('userName').value = name;
}

function isToday(date) {
  const today = new Date();
  return date.getDate() === today.getDate() &&
         date.getMonth() === today.getMonth() &&
         date.getFullYear() === today.getFullYear();
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function renderTable() {
  const table = document.getElementById('scheduleTable');
  const thead = table.querySelector('thead');
  const tbody = table.querySelector('tbody');
  
  let headerHTML = '<tr><th>שעה</th>';
  for (let d = 0; d < 6; d++) {
    const date = new Date(currentWeekStart);
    date.setDate(date.getDate() + d);
    const todayClass = isToday(date) ? 'today-header' : '';
    headerHTML += '<th class="' + todayClass + '">' + DAYS[d] + '<br><span style="font-size:10px;color:#64748b">' + formatDate(date) + '</span></th>';
  }
  headerHTML += '</tr>';
  thead.innerHTML = headerHTML;
  
  let bodyHTML = '';
  for (let h = 0; h < HOURS.length; h++) {
    bodyHTML += '<tr><td>' + HOURS[h] + '</td>';
    for (let d = 0; d < 6; d++) {
      const date = new Date(currentWeekStart);
      date.setDate(date.getDate() + d);
      const todayClass = isToday(date) ? 'today-col' : '';
      const data = getCellData(d, h);
      let cellHTML = '';
      if (data) {
        const motClass = 'motivation-color-' + data.motivation;
        const task = escapeHtml(data.task);
        cellHTML = '<div class="cell-content" onclick="openModal(' + d + ',' + h + ')">' +
          '<div class="cell-task">' + task + '</div>' +
          '<div class="motivation-bar">' +
          '<div class="motivation-dot ' + motClass + '"></div>' +
          '<span class="motivation-text">⭐ ' + data.motivation + '/10</span>' +
          '</div></div>';
      } else {
        cellHTML = '<div class="cell-content" onclick="openModal(' + d + ',' + h + ')">' +
          '<div class="cell-task empty">+ הוסף</div></div>';
      }
      bodyHTML += '<td class="' + todayClass + '">' + cellHTML + '</td>';
    }
    bodyHTML += '</tr>';
  }
  tbody.innerHTML = bodyHTML;
  
  updateStats();
}

function updateStats() {
  let total = 0, sum = 0;
  for (let h = 0; h < HOURS.length; h++) {
    for (let d = 0; d < 6; d++) {
      const data = getCellData(d, h);
      if (data) {
        total++;
        sum += data.motivation;
      }
    }
  }
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statSum').textContent = sum;
  document.getElementById('statAvg').textContent = total > 0 ? (sum/total).toFixed(1) : '—';
}

function renderWeekLabel() {
  const end = new Date(currentWeekStart);
  end.setDate(end.getDate() + 5);
  document.getElementById('weekLabel').textContent = 
    formatDate(currentWeekStart) + ' - ' + formatDate(end);
}

function openModal(dayIdx, hourIdx) {
  if (viewMode === 'view') return;
  selectedCell = { dayIdx, hourIdx };
  const data = getCellData(dayIdx, hourIdx);
  
  const date = new Date(currentWeekStart);
  date.setDate(date.getDate() + dayIdx);
  document.getElementById('modalTitle').textContent = DAYS[dayIdx] + ' ' + formatDate(date) + ' — ' + HOURS[hourIdx];
  document.getElementById('modalSubtitle').textContent = 'שעה ' + HOURS[hourIdx] + ' | ' + DAYS[dayIdx];
  
  document.getElementById('taskInput').value = data ? data.task : '';
  document.getElementById('motivationInput').value = data ? data.motivation : 5;
  updateMotivationDisplay();
  
  document.getElementById('deleteBtn').style.display = data ? 'block' : 'none';
  document.getElementById('modalOverlay').classList.add('active');
  
  setTimeout(function() { document.getElementById('taskInput').focus(); }, 100);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  selectedCell = null;
}

function saveCell() {
  if (!selectedCell) return;
  const task = document.getElementById('taskInput').value.trim();
  const motivation = parseInt(document.getElementById('motivationInput').value);
  
  if (!task) {
    alert('אנא הכנס את הלו"ז שלך');
    return;
  }
  
  setCellData(selectedCell.dayIdx, selectedCell.hourIdx, { task: task, motivation: motivation });
  closeModal();
  renderTable();
}

function deleteCell() {
  if (!selectedCell) return;
  setCellData(selectedCell.dayIdx, selectedCell.hourIdx, null);
  closeModal();
  renderTable();
}

function updateMotivationDisplay() {
  const val = document.getElementById('motivationInput').value;
  document.getElementById('motivationValue').textContent = val;
  document.getElementById('motivationEmoji').textContent = MOTIVATION_EMOJIS[val - 1];
}

// Events
document.getElementById('prevWeek').addEventListener('click', function() {
  currentWeekStart.setDate(currentWeekStart.getDate() - 7);
  renderTable();
  renderWeekLabel();
});
document.getElementById('nextWeek').addEventListener('click', function() {
  currentWeekStart.setDate(currentWeekStart.getDate() + 7);
  renderTable();
  renderWeekLabel();
});
document.getElementById('userName').addEventListener('input', function() {
  saveUserName();
  renderTable();
});
document.getElementById('viewMode').addEventListener('change', function(e) {
  viewMode = e.target.value;
  renderTable();
});
document.getElementById('motivationInput').addEventListener('input', updateMotivationDisplay);
document.getElementById('saveBtn').addEventListener('click', saveCell);
document.getElementById('cancelBtn').addEventListener('click', closeModal);
document.getElementById('deleteBtn').addEventListener('click', deleteCell);
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && document.getElementById('modalOverlay').classList.contains('active')) {
    closeModal();
  }
});

// Init
loadUserName();
renderWeekLabel();
renderTable();
</script>
</body>
</html>
