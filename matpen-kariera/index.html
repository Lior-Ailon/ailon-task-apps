  {id:97,i:"🔐",t:"עורך/ת דין פלילי",d:"ייצוג נאשמים ונפגעים"},
  {id:98,i:"📡",t:"אסטרונאוט/ית",d:"טיסות לחלל, ניסויים מחוץ לאטמוספרה"},
  {id:99,i:"🧑‍🍳",t:"מנהל/ת מסעדה",d:"ניהול מסעדה, שירות לקוחות, תפריט"},
  {id:100,i:"🌺",t:"עיצוב אופנה",d:"תכנון בגדים, מותגי אופנה, תצוגות"}
];

var DB = {};
var ST = {
  screen: 'login',
  mode: 'user',
  user: null,
  friendOwner: null,
  friendName: '',
  idx: 0,
  votes: {}
};

function loadDB() {
  try { DB = JSON.parse(localStorage.getItem('mk_db') || '{}'); } catch(e){ DB={}; }
}
function saveDB() {
  try { localStorage.setItem('mk_db', JSON.stringify(DB)); } catch(e){}
}
function loadST() {
  try { var s = localStorage.getItem('mk_st'); if(s) ST = Object.assign(ST, JSON.parse(s)); } catch(e){}
}
function saveST() {
  try { localStorage.setItem('mk_st', JSON.stringify(ST)); } catch(e){}
}

function show(html) {
  document.getElementById('root').innerHTML = html;
}

function go(screen) {
  ST.screen = screen;
  saveST();
  draw();
}

function draw() {
  if (ST.screen === 'login') drawLogin();
  else if (ST.screen === 'register') drawRegister();
  else if (ST.screen === 'swipe') drawSwipe();
  else if (ST.screen === 'share') drawShare();
  else if (ST.screen === 'results') drawResults();
  else if (ST.screen === 'admin') drawAdmin();
  else if (ST.screen === 'f_intro') drawFriendIntro();
  else if (ST.screen === 'f_swipe') drawFriendSwipe();
  else if (ST.screen === 'f_done') drawFriendDone();
}

/* ===== LOGIN ===== */
function drawLogin() {
  show(
    '<div class="card">' +
    '<div class="stitle">כניסה 🔑</div>' +
    '<div class="ssub">ברוכים הבאים למצפן הקריירה</div>' +
    '<label class="lbl">שם משתמש</label>' +
    '<input id="u" placeholder="שם משתמש" />' +
    '<label class="lbl">סיסמה</label>' +
    '<input id="p" type="password" placeholder="סיסמה" />' +
    '<div id="le" class="err" style="display:none">שם משתמש או סיסמה שגויים</div>' +
    '<button class="btn btn-gold" onclick="doLogin()">כניסה</button>' +
    '<div class="divider"></div>' +
    '<div style="text-align:center;font-size:13px;opacity:0.6;margin-bottom:10px">אין לך חשבון?</div>' +
    '<button class="btn btn-clear" onclick="go(\'register\')">הרשמה חדשה</button>' +
    '</div>'
  );
}

function doLogin() {
  var u = document.getElementById('u').value.trim();
  var p = document.getElementById('p').value.trim();
  if (!DB[u] || DB[u].pw !== p) { document.getElementById('le').style.display='block'; return; }
  ST.user = {un: u, name: DB[u].name, token: DB[u].token};
  ST.votes = DB[u].votes || {};
  ST.idx = DB[u].idx || 0;
  ST.screen = ST.idx >= JOBS.length ? 'results' : 'swipe';
  saveST();
  draw();
}

/* ===== REGISTER ===== */
function drawRegister() {
  show(
    '<div class="card">' +
    '<div class="stitle">הרשמה 🚀</div>' +
    '<div class="ssub">צור חשבון חדש</div>' +
    '<label class="lbl">שם מלא</label>' +
    '<input id="rn" placeholder="שם מלא" />' +
    '<label class="lbl">שם משתמש</label>' +
    '<input id="ru" placeholder="שם משתמש לכניסה" />' +
    '<label class="lbl">סיסמה</label>' +
    '<input id="rp" type="password" placeholder="לפחות 4 תווים" />' +
    '<div id="re" class="err" style="display:none">שגיאה — בדוק שמילאת הכל</div>' +
    '<button class="btn btn-gold" onclick="doRegister()">צור חשבון</button>' +
    '<div class="divider"></div>' +
    '<button class="btn btn-clear" onclick="go(\'login\')">← חזרה לכניסה</button>' +
    '</div>'
  );
}

function doRegister() {
  var n = document.getElementById('rn').value.trim();
  var u = document.getElementById('ru').value.trim();
  var p = document.getElementById('rp').value.trim();
  if (!n || !u || p.length < 4) { document.getElementById('re').style.display='block'; document.getElementById('re').textContent='נא למלא את כל השדות (סיסמה לפחות 4 תווים)'; return; }
  if (DB[u]) { document.getElementById('re').style.display='block'; document.getElementById('re').textContent='שם המשתמש תפוס, בחר אחר'; return; }
  var tok = Math.random().toString(36).substr(2,8).toUpperCase();
  DB[u] = {name:n, pw:p, token:tok, votes:{}, idx:0, friends:{}, fnames:[]};
  saveDB();
  ST.user = {un:u, name:n, token:tok};
  ST.votes = {};
  ST.idx = 0;
  ST.screen = 'swipe';
  saveST();
  draw();
}

/* ===== SWIPE ===== */
function drawSwipe() {
  if (ST.idx >= JOBS.length) { go('share'); return; }
  var job = JOBS[ST.idx];
  var pct = Math.round(ST.idx / JOBS.length * 100);
  show(
    '<div class="prog-wrap"><div class="prog-bar" style="width:'+pct+'%"></div></div>' +
    '<div class="prog-txt">'+ST.idx+' / '+JOBS.length+' | '+pct+'%</div>' +
    '<div class="card">' +
    '<div style="font-size:11px;opacity:0.4;text-align:center;margin-bottom:6px">מקצוע #'+job.id+'</div>' +
    '<div class="job-icon">'+job.i+'</div>' +
    '<div class="job-title">'+job.t+'</div>' +
    '<div class="job-desc">'+job.d+'</div>' +
    '<div class="votes">' +
    '<button class="vbtn vbtn-yes" onclick="vote(\'yes\')">✅ כן!</button>' +
    '<button class="vbtn vbtn-maybe" onclick="vote(\'maybe\')">🤔 אולי</button>' +
    '<button class="vbtn vbtn-no" onclick="vote(\'no\')">❌ לא</button>' +
    '</div>' +
    (ST.idx > 0 ? '<div style="text-align:center"><button class="prev-btn" onclick="prevJob()">← הקודם</button></div>' : '') +
    '</div>' +
    '<div style="text-align:center;font-size:12px;opacity:0.45;margin-top:8px">שלום '+( ST.user ? ST.user.name : '')+'</div>'
  );
}

function vote(v) {
  var job = JOBS[ST.idx];
  ST.votes[job.id] = v;
  ST.idx++;
  if (ST.user && DB[ST.user.un]) {
    DB[ST.user.un].votes = ST.votes;
    DB[ST.user.un].idx = ST.idx;
    saveDB();
  }
  saveST();
  if (ST.idx >= JOBS.length) { go('share'); return; }
  drawSwipe();
}

function prevJob() {
  if (ST.idx > 0) { ST.idx--; saveST(); drawSwipe(); }
}

/* ===== SHARE ===== */
function drawShare() {
  var tok = ST.user ? ST.user.token : '';
  var url = (window.location.protocol === 'file:' ? 'https://base44.app/api/apps/69f63b4536d7a2c6688403df/files/mp/public/69f63b4536d7a2c6688403df/77faff981_matzpen_kariera_final.html' : window.location.origin + window.location.pathname) + '?token=' + tok;
  var yes = Object.values(ST.votes).filter(function(v){return v==='yes';}).length;
  var maybe = Object.values(ST.votes).filter(function(v){return v==='maybe';}).length;
  show(
    '<div class="card">' +
    '<div style="text-align:center;margin-bottom:16px">' +
    '<div style="font-size:44px">🎉</div>' +
    '<div class="stitle">סיימת!</div>' +
    '<div class="ssub">בחרת '+yes+' "כן" ו-'+maybe+' "אולי"</div>' +
    '</div>' +
    '<div class="alert a-blue">שלח/י את הקישור לחברים ובני משפחה שיסמנו מה מתאים לך!</div>' +
    '<label class="lbl">הקישור שלך:</label>' +
    '<input id="surl" value="'+url+'" readonly onclick="this.select();document.execCommand(\'copy\');document.getElementById(\'cp\').style.display=\'block\';setTimeout(function(){document.getElementById(\'cp\').style.display=\'none\'},2000)" style="cursor:pointer;font-size:11px" />' +
    '<div id="cp" class="alert a-green" style="display:none;margin-top:6px">✅ הקישור הועתק!</div>' +
    '<div class="divider"></div>' +
    '<button class="btn btn-gold" onclick="go(\'results\')">ראה תוצאות שלי →</button>' +
    '</div>'
  );
}

/* ===== RESULTS ===== */
function drawResults() {
  var tab = window._rtab || 'mine';
  var myV = ST.votes;
  var fv = {};
  if (ST.user && DB[ST.user.un]) fv = DB[ST.user.un].friends || {};

  var YES = JOBS.filter(function(j){return myV[j.id]==='yes';});
  var MAYBE = JOBS.filter(function(j){return myV[j.id]==='maybe';});
  var fnames = Object.keys(fv);

  // Build scores
  var scores = {};
  JOBS.forEach(function(j) {
    var fy=0,fm=0,fn=0;
    fnames.forEach(function(fn2){ if(fv[fn2][j.id]==='yes')fy++; else if(fv[fn2][j.id]==='maybe')fm++; else if(fv[fn2][j.id]==='no')fn++; });
    scores[j.id] = {fy:fy,fm:fm,fn:fn,tot:fnames.length};
  });

  var strong = JOBS.filter(function(j){ var s=scores[j.id]; return myV[j.id]==='yes' && s.tot>0 && s.fy>=Math.ceil(s.tot/2); });
  var hidden = JOBS.filter(function(j){ var s=scores[j.id]; return myV[j.id]==='maybe' && s.tot>0 && s.fy>=Math.ceil(s.tot/2); });
  var disagree = JOBS.filter(function(j){ var s=scores[j.id]; return myV[j.id]==='yes' && s.tot>0 && s.fn>=Math.ceil(s.tot/2); });

  function jrow(j) {
    var s = scores[j.id];
    return '<div class="rjob"><div class="ri">'+j.i+'</div><div class="rn">'+j.t+'</div>' +
      (s.tot>0 ? '<div style="display:flex;gap:4px">' +
        (s.fy>0?'<span class="pill p-yes">✅'+s.fy+'</span>':'') +
        (s.fm>0?'<span class="pill p-maybe">🤔'+s.fm+'</span>':'') +
        (s.fn>0?'<span class="pill p-no">❌'+s.fn+'</span>':'') +
      '</div>' : '') + '</div>';
  }

  var mineHtml = '<div class="card"><div class="rtitle">✅ אמרת כן ל-'+YES.length+' מקצועות</div>' +
    (YES.length ? YES.map(jrow).join('') : '<p style="opacity:0.5;font-size:13px">לא בחרת כן</p>') + '</div>' +
    '<div class="card"><div class="rtitle">🤔 אמרת אולי ל-'+MAYBE.length+' מקצועות</div>' +
    (MAYBE.length ? MAYBE.slice(0,15).map(jrow).join('') : '<p style="opacity:0.5;font-size:13px">אין</p>') + '</div>';

  var tok = ST.user ? ST.user.token : '';
  var url = (window.location.protocol === 'file:' ? 'https://base44.app/api/apps/69f63b4536d7a2c6688403df/files/mp/public/69f63b4536d7a2c6688403df/77faff981_matzpen_kariera_final.html' : window.location.origin + window.location.pathname) + '?token=' + tok;

  var anaHtml = fnames.length===0 ?
    '<div class="card"><div class="alert a-blue">עדיין אין תגובות מחברים. שלח את הקישור!</div>' +
    '<input value="'+url+'" readonly onclick="this.select();document.execCommand(\'copy\')" style="font-size:11px;cursor:pointer" />' +
    '</div>' :
    (strong.length ? '<div class="card"><div class="rtitle">🌟 הכי מתאים — גם אתה גם החברים אמרו כן!</div>' + strong.map(jrow).join('') + '</div>' : '') +
    (hidden.length ? '<div class="card"><div class="rtitle">💡 אבני חן — החברים ראו בך פוטנציאל!</div>' + hidden.map(jrow).join('') + '</div>' : '') +
    (disagree.length ? '<div class="card"><div class="rtitle">⚡ חילוקי דעות — אתה רוצה, הם פחות בטוחים</div>' + disagree.map(jrow).join('') + '</div>' : '');

  var frHtml = '<div class="card"><div class="rtitle">👥 ענו על השאלון: '+fnames.length+' אנשים</div>' +
    (fnames.length ? fnames.map(function(n){return '<div style="padding:10px;background:rgba(255,255,255,0.05);border-radius:9px;margin-bottom:8px;display:flex;gap:10px;align-items:center"><span style="font-size:18px">👤</span><span>'+n+'</span><span class="badge">ענה ✓</span></div>';}).join('') :
    '<p style="opacity:0.5;font-size:13px">אין עדיין</p>') + '</div>';

  var content = tab==='mine' ? mineHtml : tab==='ana' ? anaHtml : frHtml;

  show(
    '<div class="tabs">' +
    '<div class="tab '+(tab==='mine'?'on':'')+'" onclick="switchRT(\'mine\')">הבחירות שלי</div>' +
    '<div class="tab '+(tab==='ana'?'on':'')+'" onclick="switchRT(\'ana\')">ניתוח השוואתי</div>' +
    '<div class="tab '+(tab==='fr'?'on':'')+'" onclick="switchRT(\'fr\')">חברים ('+fnames.length+')</div>' +
    '</div>' +
    content +
    '<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">' +
    '<button class="btn btn-clear" style="flex:1" onclick="go(\'swipe\')">← ערוך</button>' +
    '<button class="btn btn-clear" style="flex:1" onclick="go(\'share\')">שתף</button>' +
    '<button class="btn btn-clear" style="flex:1" onclick="go(\'admin\')">🛠️ ניהול</button>' +
    '</div>'
  );
}

function switchRT(t) { window._rtab = t; drawResults(); }

/* ===== ADMIN ===== */
function drawAdmin() {
  var users = Object.keys(DB);
  var html = '<div class="card">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">' +
    '<div><div class="stitle">🛠️ ניהול משתמשים</div><div class="ssub">'+users.length+' משתמשים</div></div>' +
    '<button class="btn-clear" style="padding:8px 14px;border-radius:9px;border:1px solid rgba(255,255,255,0.2);color:#fff;cursor:pointer" onclick="go(\'results\')">← חזרה</button>' +
    '</div>';
  users.forEach(function(un) {
    var u = DB[un];
    var y = Object.values(u.votes||{}).filter(function(v){return v==='yes';}).length;
    var m = Object.values(u.votes||{}).filter(function(v){return v==='maybe';}).length;
    var n = Object.values(u.votes||{}).filter(function(v){return v==='no';}).length;
    var pct = Math.round((u.idx||0)/100*100);
    var fc = Object.keys(u.friends||{}).length;
    html += '<div class="ucard">' +
      '<div style="display:flex;justify-content:space-between;margin-bottom:8px">' +
      '<div><strong>'+u.name+'</strong><div style="font-size:11px;opacity:0.5">@'+un+'</div></div>' +
      '<span class="badge">'+pct+'%</span></div>' +
      '<div style="display:flex;gap:6px;flex-wrap:wrap;font-size:12px;margin-bottom:8px">' +
      '<span class="pill p-yes">✅ '+y+'</span>' +
      '<span class="pill p-maybe">🤔 '+m+'</span>' +
      '<span class="pill p-no">❌ '+n+'</span>' +
      '<span class="pill p-blue">👥 '+fc+' חברים</span>' +
      '</div>' +
      '<div class="prog-wrap"><div class="prog-bar" style="width:'+pct+'%"></div></div>' +
      '</div>';
  });
  if (!users.length) html += '<p style="opacity:0.5;text-align:center;padding:20px">אין משתמשים</p>';
  html += '</div>';
  show(html);
}

/* ===== FRIEND MODE ===== */
function drawFriendIntro() {
  var owner = ST.friendOwner ? DB[ST.friendOwner] : null;
  var oname = owner ? owner.name : '?';
  show(
    '<div class="card" style="text-align:center">' +
    '<div style="font-size:44px">👋</div>' +
    '<div class="stitle">שלום!</div>' +
    '<div class="ssub">'+oname+' שלח/ה לך קישור — עזור/י לו/לה לגלות את הקריירה</div>' +
    '<label class="lbl" style="text-align:right">מה שמך?</label>' +
    '<input id="fn" placeholder="שמך" />' +
    '<button class="btn btn-gold" onclick="startFriend()">בוא נתחיל! →</button>' +
    '</div>'
  );
}

function startFriend() {
  var n = document.getElementById('fn').value.trim();
  if (!n) return;
  ST.friendName = n;
  ST.votes = {};
  ST.idx = 0;
  ST.screen = 'f_swipe';
  saveST();
  draw();
}

function drawFriendSwipe() {
  if (ST.idx >= JOBS.length) { saveFriendVotes(); go('f_done'); return; }
  var job = JOBS[ST.idx];
  var pct = Math.round(ST.idx / JOBS.length * 100);
  var owner = ST.friendOwner ? DB[ST.friendOwner] : null;
  var oname = owner ? owner.name : '';
  show(
    '<div class="alert a-blue" style="margin-bottom:12px">אתה מסמן עבור: <strong>'+oname+'</strong></div>' +
    '<div class="prog-wrap"><div class="prog-bar" style="width:'+pct+'%"></div></div>' +
    '<div class="prog-txt">'+ST.idx+' / '+JOBS.length+'</div>' +
    '<div class="card">' +
    '<div class="job-icon">'+job.i+'</div>' +
    '<div class="job-title">'+job.t+'</div>' +
    '<div class="job-desc">'+job.d+'</div>' +
    '<p style="font-size:12px;opacity:0.55;text-align:center;margin-bottom:14px">האם לדעתך זה מתאים ל-'+oname+'?</p>' +
    '<div class="votes">' +
    '<button class="vbtn vbtn-yes" onclick="voteF(\'yes\')">✅ מתאים!</button>' +
    '<button class="vbtn vbtn-maybe" onclick="voteF(\'maybe\')">🤔 אולי</button>' +
    '<button class="vbtn vbtn-no" onclick="voteF(\'no\')">❌ לא</button>' +
    '</div>' +
    (ST.idx > 0 ? '<div style="text-align:center"><button class="prev-btn" onclick="prevFJob()">← הקודם</button></div>' : '') +
    '</div>'
  );
}

function voteF(v) {
  var job = JOBS[ST.idx];
  ST.votes[job.id] = v;
  ST.idx++;
  saveST();
  if (ST.idx >= JOBS.length) { saveFriendVotes(); go('f_done'); return; }
  drawFriendSwipe();
}

function prevFJob() { if (ST.idx>0){ST.idx--;saveST();drawFriendSwipe();} }

function saveFriendVotes() {
  if (!ST.friendOwner || !DB[ST.friendOwner]) return;
  if (!DB[ST.friendOwner].friends) DB[ST.friendOwner].friends = {};
  DB[ST.friendOwner].friends[ST.friendName] = ST.votes;
  saveDB();
}

function drawFriendDone() {
  var owner = ST.friendOwner ? DB[ST.friendOwner] : null;
  show(
    '<div class="card" style="text-align:center">' +
    '<div style="font-size:52px">🎊</div>' +
    '<div class="stitle">תודה רבה!</div>' +
    '<div class="ssub">המשוב שלך נשמר ויעזור ל-'+(owner?owner.name:'')+'</div>' +
    '<div class="alert a-green" style="margin-top:16px">כל הבחירות נשמרו ✅</div>' +
    '</div>'
  );
}

/* ===== INIT ===== */
loadDB();
loadST();

var urlTok = new URLSearchParams(window.location.search).get('token');
if (urlTok) {
  var ownerKey = null;
  Object.keys(DB).forEach(function(k){ if(DB[k].token===urlTok) ownerKey=k; });
  if (ownerKey) {
    ST.mode = 'friend';
    ST.friendOwner = ownerKey;
    ST.votes = {};
    ST.idx = 0;
    ST.screen = 'f_intro';
    saveST();
    draw();
  } else {
    show('<div class="card" style="text-align:center"><div style="font-size:40px">😕</div><div class="stitle">קישור לא תקין</div></div>');
  }
} else {
  if (ST.mode === 'user' && ST.user) {
    draw();
  } else {
    ST.screen = 'login';
    saveST();
    draw();
  }
}
</script>
</body>
</html>
