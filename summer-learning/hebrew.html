<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>קיץ חכם - עברית</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Heebo:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--c1:#FF6B6B;--c2:#4ECDC4;--c3:#FFE66D;--c5:#C7A6FF;--c7:#6BCB77;--c8:#FFA45B;--bg:#F5F0FF;--text:#2D3047;--success:#6BCB77;--error:#FF6B6B}
body{font-family:'Heebo','Fredoka',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;min-height:100vh}
.screen{display:none;min-height:100vh;padding:20px 16px}
.screen.active{display:block;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.hdr{text-align:center;padding:16px 0}
.hdr h1{font-family:'Fredoka',sans-serif;font-size:2rem;color:#9B7AE0}
.score-bar{display:flex;align-items:center;justify-content:center;gap:12px;margin:8px auto;padding:8px 20px;border-radius:50px;background:#fff;box-shadow:0 4px 15px rgba(0,0,0,.08);width:fit-content}
.score-bar .badge{font-weight:700;font-size:1rem;display:flex;gap:4px;align-items:center}
.dc-mini{max-width:450px;margin:12px auto;padding:12px 16px;border-radius:16px;text-align:center;background:linear-gradient(135deg,#FF6B6B,#FFA45B);color:#fff;box-shadow:0 4px 15px rgba(255,107,107,.2);cursor:pointer}
.dc-mini.done{background:linear-gradient(135deg,#6BCB77,#4ECDC4)}
.dc-mini .dc-bar{width:100%;height:6px;border-radius:10px;background:rgba(255,255,255,.3);margin-top:8px;overflow:hidden}
.dc-mini .dc-fill{height:100%;border-radius:10px;background:#fff}
.back-btn{position:fixed;top:16px;right:16px;z-index:100;width:44px;height:44px;border-radius:50%;border:none;background:#fff;box-shadow:0 4px 15px rgba(0,0,0,.1);font-size:1.3rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.game-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;max-width:500px;margin:16px auto}
.game-card{background:#fff;border-radius:20px;padding:20px 12px;text-align:center;box-shadow:0 6px 20px rgba(0,0,0,.08);cursor:pointer;transition:all .3s;border:3px solid transparent}
.game-card:active{transform:scale(.95)}
.game-card .icon{font-size:2.8rem;display:block;margin-bottom:8px}
.game-card .name{font-weight:700;font-size:1rem}
.game-card .desc{font-size:.78rem;color:#999;margin-top:4px}
.g-area{max-width:500px;margin:0 auto;text-align:center}
.g-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;max-width:500px;margin:0 auto 16px}
.g-hdr .prog{font-size:.9rem;color:#888}
.g-hdr .scr{font-weight:700;color:var(--c1)}
.q-card{background:#fff;border-radius:20px;padding:30px 20px;box-shadow:0 6px 20px rgba(0,0,0,.08);margin:16px 0;text-align:center}
.ans-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:400px;margin:16px auto}
.ans-btn{padding:16px;border-radius:16px;border:2px solid transparent;font-size:1.2rem;font-weight:700;background:#fff;cursor:pointer;transition:all .2s;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.ans-btn:active{transform:scale(.95)}
.ans-btn.correct{background:var(--success);color:#fff}
.ans-btn.wrong{background:var(--error);color:#fff;animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.scramble-letters{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:20px auto}
.scramble-tile{width:52px;height:52px;border-radius:12px;border:none;font-size:1.5rem;font-weight:700;background:#fff;color:var(--text);cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,.1);transition:all .2s}
.scramble-tile:active{transform:scale(.9)}
.scramble-tile.used{opacity:.2;pointer-events:none}
.scramble-answer{display:flex;gap:6px;justify-content:center;min-height:60px;align-items:center;margin:16px auto;padding:12px;border-radius:16px;background:rgba(255,255,255,.5)}
.scramble-slot{width:48px;height:48px;border-radius:12px;border:2px dashed #ccc;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700}
.scramble-slot.filled{background:var(--c2);color:#fff;border-color:var(--c2)}
.btn{margin-top:16px;padding:14px 40px;border-radius:30px;border:none;background:var(--c2);color:#fff;font-size:1.1rem;font-weight:700;cursor:pointer;box-shadow:0 4px 15px rgba(78,205,196,.3)}
.btn:active{transform:scale(.95)}
.next-btn{margin-top:20px;padding:14px 36px;border-radius:30px;border:none;background:#9B7AE0;color:#fff;font-size:1.1rem;font-weight:700;cursor:pointer;box-shadow:0 4px 15px rgba(155,122,224,.3);display:none}
.next-btn.show{display:inline-block}
.encourage{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:#fff;padding:30px 40px;border-radius:24px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2);z-index:200;transition:transform .3s}
.encourage.show{transform:translate(-50%,-50%) scale(1)}
.encourage .emoji{font-size:4rem}
.encourage .text{font-size:1.4rem;font-weight:700;margin-top:8px;color:#9B7AE0}
.encourage .coins{font-size:1.2rem;color:#E8A317;margin-top:8px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--text);color:#fff;padding:14px 24px;border-radius:30px;font-weight:700;z-index:300;transition:transform .3s;font-size:.95rem}
.toast.show{transform:translateX(-50%) translateY(0)}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px auto;max-width:500px}
.match-item{padding:14px 12px;border-radius:16px;text-align:center;cursor:pointer;font-weight:700;font-size:1.1rem;transition:all .2s;min-height:60px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.match-item.selected{outline:4px solid var(--c1);outline-offset:2px}
.match-item.matched{opacity:.3;pointer-events:none}
.match-item.left{background:#FFE66D}
.match-item.right{background:#C7A6FF;color:#fff}
.q-big{font-family:'Fredoka',sans-serif;font-size:2rem;font-weight:700;margin:12px 0}
.q-prompt{font-size:1.2rem;color:#888;margin-bottom:12px}
.fill-input{width:100%;max-width:300px;padding:16px;border-radius:16px;border:3px solid #C7A6FF;font-size:1.4rem;text-align:center;outline:none}
.fill-input:focus{border-color:#9B7AE0}
</style>
</head>
<body>

<div class="screen active" id="screen-home">
  <button class="back-btn" onclick="goBack()">←</button>
  <div class="hdr"><h1>📖 עברית</h1><p style="color:#888">כיתה ו'</p></div>
  <div class="dc-mini" id="dc-mini" onclick="toggleDc()">
    <div id="dc-mini-text">🎯 אתגר יומי — 30 דקות</div>
    <div class="dc-bar"><div class="dc-fill" id="dc-mini-fill" style="width:0%"></div></div>
  </div>
  <div class="game-grid">
    <div class="game-card" style="border-color:rgba(199,166,255,.4)" onclick="startGame('scramble')"><span class="icon">🔤</span><div class="name">סידור אותיות</div><div class="desc">בנה מילה מאותיות</div></div>
    <div class="game-card" style="border-color:rgba(255,107,107,.3)" onclick="startGame('synonyms')"><span class="icon">🔗</span><div class="name">מילים נרדפות</div><div class="desc">חבר מילה למשמעות</div></div>
    <div class="game-card" style="border-color:rgba(78,205,196,.3)" onclick="startGame('antonyms')"><span class="icon">↔️</span><div class="name">הפכים</div><div class="desc">מצא את ההיפך</div></div>
    <div class="game-card" style="border-color:rgba(255,230,109,.4)" onclick="startGame('idioms')"><span class="icon">💡</span><div class="name">פתגמים</div><div class="desc">השלם את הפתגם</div></div>
    <div class="game-card" style="border-color:rgba(107,203,119,.4)" onclick="startGame('grammar')"><span class="icon">📐</span><div class="name">דקדוק</div><div class="desc">זיהוי חלקי דיבור</div></div>
    <div class="game-card" style="border-color:rgba(255,164,91,.4)" onclick="startGame('spelling')"><span class="icon">✏️</span><div class="name">איות נכון</div><div class="desc">מצא את השגיאה</div></div>
    <div class="game-card" style="border-color:rgba(255,183,178,.5)" onclick="startGame('plura')"><span class="icon">🔢</span><div class="name">יחיד ורבים</div><div class="desc">המר לרבים</div></div>
    <div class="game-card" style="border-color:rgba(149,225,211,.4)" onclick="startGame('reading')"><span class="icon">📚</span><div class="name">הבנת הנקרא</div><div class="desc">קרא וענה</div></div>
  </div>
</div>

<div class="screen" id="screen-game">
  <button class="back-btn" onclick="goBack()">←</button>
  <div class="g-hdr"><span class="prog" id="g-prog"></span><span class="scr">⭐ <span id="g-score">0</span></span></div>
  <div class="g-area" id="g-content"></div>
  <button class="next-btn" id="next-btn" onclick="nextRound()">הבא ➡</button>
</div>

<div class="encourage" id="encourage"><div class="emoji" id="enc-emoji"></div><div class="text" id="enc-text"></div><div class="coins" id="enc-coins"></div></div>
<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY="summer_learning_data";
const DAILY_GOAL_MIN=30;const DAILY_REWARD=10;
const API_URL="https://base44.app/api/apps/69f63b4536d7a2c6688403df/functions/reportSummerChallenge";

let state={coins:0,stars:0,dailyChallenge:{lastCompletedDate:null,todayTimeMs:0,todayDate:null,totalEarned:0,completedDays:[],active:false},subjectStats:{english:{gamesPlayed:0,score:0},math:{gamesPlayed:0,score:0},hebrew:{gamesPlayed:0,score:0}},childName:"ילד"};
function loadState(){try{const s=localStorage.getItem(STORAGE_KEY);if(s){Object.assign(state,JSON.parse(s))}}catch(e){}}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function getTodayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function checkDailyReset(){const t=getTodayStr();if(state.dailyChallenge.todayDate!==t){state.dailyChallenge.todayDate=t;state.dailyChallenge.todayTimeMs=0;state.dailyChallenge.active=false;saveState()}}

let currentGame=null,questions=[],qIndex=0,gameScore=0,roundData=null;
const ENCOURAGEMENTS=[{emoji:"🌟",text:"מדהים!"},{emoji:"🎉",text:"כל הכבוד!"},{emoji:"👏",text:"מעולה!"},{emoji:"🚀",text:"איזה כוכב!"},{emoji:"🏆",text:"אלוף!"},{emoji:"💪",text:"חזק!"},{emoji:"✨",text:"פנטסטי!"},{emoji:"🥳",text:"נהדר!"}];

function showEncourage(correct){const p=document.getElementById('encourage');if(correct){const e=ENCOURAGEMENTS[Math.floor(Math.random()*ENCOURAGEMENTS.length)];state.coins+=5+Math.floor(Math.random()*10);document.getElementById('enc-emoji').textContent=e.emoji;document.getElementById('enc-text').textContent=e.text;document.getElementById('enc-coins').textContent='+'+(5+Math.floor(Math.random()*10))+' 🪙'}else{document.getElementById('enc-emoji').textContent="💪";document.getElementById('enc-text').textContent="נסה שוב!";document.getElementById('enc-coins').textContent="אתה יכול!"}p.classList.add('show');setTimeout(()=>p.classList.remove('show'),1500);saveState()}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function goBack(){stopDcTimer();window.location.href="index.html"}
function toggleDc(){checkDailyReset();if(state.dailyChallenge.lastCompletedDate===getTodayStr()){showToast('סיימת היום! 🎉');return}if(state.dailyChallenge.active){showToast('כבר פעיל! 🎮');return}state.dailyChallenge.active=true;saveState();updateDcMini();showToast('האתגר התחיל! 30 דקות 🎯')}

let dcTimer=null;
function startDcTimer(){stopDcTimer();dcTimer=setInterval(()=>{if(state.dailyChallenge.active){state.dailyChallenge.todayTimeMs+=5000;saveState();updateDcMini();if(state.dailyChallenge.todayTimeMs/60000>=DAILY_GOAL_MIN)completeDailyChallenge()}},5000)}
function stopDcTimer(){if(dcTimer){clearInterval(dcTimer);dcTimer=null}}

function updateDcMini(){checkDailyReset();const done=state.dailyChallenge.lastCompletedDate===getTodayStr();const m=document.getElementById('dc-mini');if(!m)return;if(done){m.classList.add('done');document.getElementById('dc-mini-text').textContent='✅ אתגר הושלם!';document.getElementById('dc-mini-fill').style.width='100%'}else{const min=Math.floor(state.dailyChallenge.todayTimeMs/60000);document.getElementById('dc-mini-text').textContent=state.dailyChallenge.active?`🎯 ${min}/${DAILY_GOAL_MIN} דקות`:'🎯 אתגר יומי — 30 דקות';document.getElementById('dc-mini-fill').style.width=Math.min(100,(min/DAILY_GOAL_MIN)*100)+'%'}}

function completeDailyChallenge(){stopDcTimer();const t=getTodayStr();if(state.dailyChallenge.lastCompletedDate===t)return;state.dailyChallenge.lastCompletedDate=t;state.dailyChallenge.totalEarned+=DAILY_REWARD;if(!state.dailyChallenge.completedDays.includes(t))state.dailyChallenge.completedDays.push(t);state.dailyChallenge.active=false;saveState();showToast('🎉 סיימת את האתגר! +10 ₪! 🎉');try{fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({child_name:state.childName,subject:"עברית",date:t,time_spent_minutes:Math.round(state.dailyChallenge.todayTimeMs/60000),reward_amount:DAILY_REWARD,total_earned:state.dailyChallenge.totalEarned})}).catch(e=>console.log('pending'))}catch(e){}updateDcMini()}

function shuffle(a){return[...a].sort(()=>Math.random()-0.5)}

// Hebrew word banks
const SCRAMBLE_WORDS=["שלום","ספר","חבר","בית","ספריה","מחברת","עיפרון","מחק","שולחן","כיסא","חלון","דלת","אור","שמש","ירח","כוכב","ענן","גשם","שלג","רוח","פרח","עץ","דשא","יער","הר","נהר","ים","חוף","חול","אבן","סלע","מדבר","גבעה","עמק","אי","נחל","מעיין","באר","אגם","שדה","גן","זרע","שורש","עלה","פרי","זית","תאנה","גפן","רימון","תמר","שקד","אורן","ארז","אלון","דקל","שיטה","ורד","חבצלת","שושן","כלנית","רקפת","שמיים","ארץ","מים","אש","רוח","אבן","חול","ברק","רעם","קשת","ענן","אדמה","חול","אבק","טיט","חימר","מלח","סוכר","דבש","חלב","לחם","מים","יין","שמן","בשר","דג","עוף","ביצה","גבינה","חמאה","קמח","קפה","תה","מרק","סלט","פרי","ירק","תפוח","בננה","ענב","תמר","תאנה","רימון"];
const SYNONYMS=[["גדול","עצום"],["שמח","שש"],["יפה","מרהיב"],["מהר","מיהר"],["חזק","איתן"],["זקן","קשיש"],["קטן","קט"],["עני","מרוד"],["חכם","נבון"],["טוב","מצוין"],["יפה","נאה"],["אומץ","גבורה"],["קר","צונן"],["חם","לוהט"],["זריז","מהיר"],["אמיץ","גיבור"],["זהיר","זריז"],["קל","קליל"],["כבד","מכביד"],["ישן","עתיק"],["חדש","מחודש"],["עשיר","מוכסף"],["עצוב","זועף"],["כעוס","זועם"],["שקט","רגוע"],["רועש","קולני"],["נמוך","שפל"],["גבוה","תלול"],["רחב","מרווח"],["צר","צפוף"],["מורה","מלמד"],["תלמיד","לומד"],["ספר","כתב"],["קרא","דרש"],["אמר","סיפר"],["כתב","חיבר"],["ראה","הביט"],["שמע","האזין"],["דיבר","שוחח"],["אכל","זלל"],["שתה","לגם"],["ישן","נם"],["קם","הקיץ"],["ישב","נח"],["עמד","התייצב"],["הלך","צעד"],["רץ","מהר"],["טיפס","עלה"],["ירד","נחת"],["נכנס","הגיע"]];
const ANTONYMS=[["גדול","קטן"],["שמח","עצוב"],["חם","קר"],["יום","לילה"],["מעלה","מטה"],["אור","חושך"],["חזק","חלש"],["מהר","לאט"],["עשיר","עני"],["חכם","טיפש"],["ארוך","קצר"],["ישן","חדש"],["יבש","רטוב"],["קל","כבד"],["רחב","צר"],["גבוה","נמוך"],["יפה","מכוער"],["צעיר","זקן"],["קל","קשה"],["מתחיל","מסיים"],["אוהב","שונא"],["פותח","סוגר"],["עולה","יורד"],["נכנס","יוצא"],["לוקח","נותן"],["קונה","מוכר"],["מנצח","מפסיד"],["שותה","אוכל"],["ישן","ער"],["אמת","שקר"],["חי","מת"],["מלא","ריק"],["קדימה","אחורה"],["מעט","הרבה"],["זול","יקר"],["מתוק","מר"],["נקי","מלוכלך"],["חלק","מחוספס"],["שלם","שבור"],["זכר","נקבה"],["בנוי","הרוס"],["שומן","רזה"],["חילוני","דתי"],["חכם","טיפש"],["סבלן","כעסן"],["צנוע","גאוותן"],["רך","קשה"],["ערירי","כפרי"],["ישר","עקום"],["בריא","חולה"]];
const IDIOMS=[["עשה לי טובה...","בבקשה"],["פתחתי פה ל...","התחלתי"],["יצאתי מ...","התרגשתי"],["זה לא...","לא נכון"],["אין לי...","איני יכול"],["בסדר...","הכל תקין"]];
const IDIOMS_FILL=[
  {start:"העיניים שלי",end:"שמיים",answer:"ב"},
  {start:"לך על",end:"בטוח",answer:"יד"},
  {start:"זה היה באמצע",end:"סערה",answer:"של"},
  {start:"אני על",end:"שלי",answer:"גג"},
  {start:"זה נפל",end:"על הרצפה",answer:"מ"},
  {start:"אין לי",end:"מה לעשות",answer:"מושג"},
  {start:"נפלתי מה",end:"",answer:"סוס"},
  {start:"יש לי",end:"בבטן",answer:"פרפרים"},
  {start:"יצאתי מה",end:"",answer:"כלים"},
  {start:"הוא חי ב",end:"עננים",answer:"על"},
  {start:"זה נכנס לי ל",end:"",answer:"דם"},
  {start:"יש לו ראש",end:"טוב",answer:"גדול"},
  {start:"היא על קצה ה",end:"",answer:"צוק"},
  {start:"זה פיל",end:"בחנות",answer:"ב"},
  {start:"נפל לי ה",end:"מהשמיים",answer:"אסימון"},
  {start:"הוא שם את ה",end:"על השולחן",answer:"כל"},
  {start:"יש לי",end:"בעיניים",answer:"עשן"},
  {start:"זה היה קורן",end:"באוזן",answer:"צמר"},
  {start:"הוא עלה ל",end:"הגדול",answer:"מגדל"},
  {start:"יצאת מ",end:"העיניים",answer:"ל"}
];
const GRAMMAR=[
  {word:"רץ",type:"פועל"},{word:"ספר",type:"שם עצם"},{word:"יפה",type:"תואר"},{word:"שמח",type:"תואר"},{word:"קנה",type:"פועל"},{word:"בית",type:"שם עצם"},{word:"גבוה",type:"תואר"},{word:"כתב",type:"פועל"},{word:"חתול",type:"שם עצם"},{word:"מהר",type:"תואר"},{word:"שיר",type:"שם עצם"},{word:"קפץ",type:"פועל"},{word:"חכם",type:"תואר"},{word:"חלון",type:"שם עצם"},{word:"אכל",type:"פועל"},
  {word:"כלב",type:"שם עצם"},{word:"גדול",type:"תואר"},{word:"שיחק",type:"פועל"},{word:"שולחן",type:"שם עצם"},{word:"חם",type:"תואר"},{word:"ישן",type:"פועל"},{word:"חבר",type:"שם עצם"},{word:"טוב",type:"תואר"},{word:"למד",type:"פועל"},{word:"עץ",type:"שם עצם"},{word:"קר",type:"תואר"},{word:"הלך",type:"פועל"},{word:"דלת",type:"שם עצם"},{word:"חזק",type:"תואר"},{word:"צחק",type:"פועל"},
  {word:"פרח",type:"שם עצם"},{word:"רע",type:"תואר"},{word:"דיבר",type:"פועל"},{word:"ירח",type:"שם עצם"},{word:"מהר",type:"תואר"},{word:"קרא",type:"פועל"},{word:"אור",type:"שם עצם"},{word:"ישן",type:"תואר"},{word:"בנה",type:"פועל"},{word:"ספסל",type:"שם עצם"},
  {word:"מכונית",type:"שם עצם"},{word:"נהג",type:"פועל"},{word:"טעים",type:"תואר"},{word:"עוגה",type:"שם עצם"},{word:"בישל",type:"פועל"},{word:"טוב",type:"תואר"},{word:"מטוס",type:"שם עצם"},{word:"טס",type:"פועל"},{word:"חולה",type:"תואר"},{word:"רופא",type:"שם עצם"},{word:"ריפא",type:"פועל"},{word:"מהר",type:"תואר"},{word:"ספינה",type:"שם עצם"},{word:"שט",type:"פועל"},{word:"יפה",type:"תואר"},{word:"ציור",type:"שם עצם"},{word:"צייר",type:"פועל"},{word:"חם",type:"תואר"},{word:"שמש",type:"שם עצם"},{word:"זרח",type:"פועל"}
];
const SPELLING_WRONG=[
  {wrong:"ירושליים",correct:"ירושלים"},{wrong:"ספריה",correct:"ספרייה"},{wrong:"מכונית",correct:"מכונית"},{wrong:"ארבעה",correct:"ארבע"},
  {wrong:"אפס",correct:"אפס"},{wrong:"מספריים",correct:"מספריים"},{wrong:"תפוזים",correct:"תפוזים"},{wrong:"קיבוצי",correct:"קיבוצי"},
  {wrong:"גברת",correct:"גברת"},{wrong:"נרתיק",correct:"נרתיק"},{wrong:"פרטי",correct:"פרטי"},{wrong:"שמחה",correct:"שמחה"},
  {wrong:"יפה",correct:"יפה"},{wrong:"משפחה",correct:"משפחה"},{wrong:"תוכנית",correct:"תוכנית"},{wrong:"מדעית",correct:"מדעית"},
  {wrong:"כיתה",correct:"כיתה"},{wrong:"מנהלת",correct:"מנהלת"},{wrong:"שערה",correct:"שערה"},{wrong:"בעיה",correct:"בעיה"}
];
const PLURAL_PAIRS=[
  {singular:"ספר",plural:"ספרים"},{singular:"ילד",plural:"ילדים"},{singular:"חתול",plural:"חתולים"},{singular:"בית",plural:"בתים"},
  {singular:"שולחן",plural:"שולחנות"},{singular:"פרח",plural:"פרחים"},{singular:"מחברת",plural:"מחברות"},{singular:"עיפרון",plural:"עיפרונות"},
  {singular:"חבר",plural:"חברים"},{singular:"חלון",plural:"חלונות"},{singular:"כלב",plural:"כלבים"},{singular:"דלת",plural:"דלתות"},
  {singular:"מורה",plural:"מורים"},{singular:"שיר",plural:"שירים"},{singular:"עץ",plural:"עצים"},{singular:"חודש",plural:"חודשים"},
  {singular:"מקל",plural:"מקלות"},{singular:"גבעה",plural:"גבעות"},{singular:"כיסא",plural:"כיסאות"},{singular:"מחבר",plural:"מחברים"},
  {singular:"רגל",plural:"רגליים"},{singular:"יד",plural:"ידיים"},{singular:"עין",plural:"עיניים"},{singular:"אוזן",plural:"אוזניים"},
  {singular:"שן",plural:"שיניים"},{singular:"בית ספר",plural:"בתי ספר"},{singular:"לילה",plural:"לילות"},{singular:"יום",plural:"ימים"},
  {singular:"מילה",plural:"מילים"},{singular:"סוס",plural:"סוסים"},{singular:"פרה",plural:"פרות"},{singular:"תרנגול",plural:"תרנגולים"},
  {singular:"שמלה",plural:"שמלות"},{singular:"חולצה",plural:"חולצות"},{singular:"נעל",plural:"נעליים"},{singular:"גרב",plural:"גרביים"},
  {singular:"מפתח",plural:"מפתחות"},{singular:"כוס",plural:"כוסות"},{singular:"צלחת",plural:"צלחות"},{singular:"כפית",plural:"כפיות"},
  {singular:"סכין",plural:"סכינים"},{singular:"כרית",plural:"כריות"},{singular:"שמיכה",plural:"שמיכות"},{singular:"מגבת",plural:"מגבות"},
  {singular:"חברה",plural:"חברות"},{singular:"גבר",plural:"גברים"},{singular:"אשה",plural:"נשים"}
];
const READING_PASSAGES=[
  {text:"דני הלך לפארק עם חברו תום. הם שיחקו במחבוא ובכדור. דני הסתתר מאחורי עץ גדול, אבל תום מצא אותו מהר. הם צחקו ושיחקו עד הערב. אז חזרו הביתה שמחים ועייפים.",questions:[
    {q:"לאן הלך דני?",options:["לפארק","לבית ספר","לחוף הים","לקניון"],answer:0},
    {q:"עם מי הלך דני?",options:["לבד","עם אמא","עם תום","עם דני"],answer:2},
    {q:"מה הם שיחקו?",options:["כדורגל","מחבוא וכדור","שחמט","משחקי קופסה"],answer:1},
    {q:"איך הם חזרו הביתה?",options:["עצובים","שמחים ועייפים","כועסים","מפוחדים"],answer:1}
  ]},
  {text:"ביום שישי אמא הכינה עוגת שוקולד. כל המשפחה עזרה. דני ערבב את הבלילה. ליאני שפכה את השוקולד. אבא הכניס את העוגה לתנור. כשהעוגה הייתה מוכנה, כולם אכלו ואמרו 'כל הכבוד! העוגה טעימה מאוד!'",questions:[
    {q:"מה אמא הכינה?",options:["עוגת גבינה","עוגת שוקולד","קוגל","פאי"],answer:1},
    {q:"מי ערבב את הבלילה?",options:["דני","ליאני","אבא","אמא"],answer:0},
    {q:"מי הכניס לתנור?",options:["אמא","דני","אבא","ליאני"],answer:2},
    {q:"מה אמרו כולם?",options:["תודה רבה","כל הכבוד טעימה","לא טעים","עוד פעם"],answer:1}
  ]}
];

const GAME_NAMES={scramble:'סידור אותיות',synonyms:'מילים נרדפות',antonyms:'הפכים',idioms:'פתגמים',grammar:'דקדוק',spelling:'איות נכון',plura:'יחיד ורבים',reading:'הבנת הנקרא'};

let seenItems={scramble:[],synonyms:[],antonyms:[],idioms:[],grammar:[],spelling:[],plura:[]};
function pickUnique(arr,key){const seen=seenItems[key]||[];let available=arr.map((_,i)=>i).filter(i=>!seen.includes(i));if(available.length===0){seenItems[key]=[];available=arr.map((_,i)=>i);}const idx=available[Math.floor(Math.random()*available.length)];seenItems[key].push(idx);return arr[idx];}
function genScramble(){const w=pickUnique(SCRAMBLE_WORDS,'scramble');return{type:'scramble',answer:w,hebrew:w}}
function genSynonym(){const idx=SYNONYMS.indexOf(pickUnique(SYNONYMS,'synonyms'));const p=SYNONYMS[idx];const distractors=SCRAMBLE_WORDS.filter(w=>w!==p[0]&&w!==p[1]);const d1=distractors[Math.floor(Math.random()*distractors.length)];let d2=distractors[Math.floor(Math.random()*distractors.length)];if(d2===d1)d2=distractors[(distractors.indexOf(d1)+1)%distractors.length];return{type:'choice',q:`מה המילה הנרדפת ל"${p[0]}"?`,answer:p[1],options:shuffle([p[1],p[0],d1,d2])}}
function genAntonym(){const idx=ANTONYMS.indexOf(pickUnique(ANTONYMS,'antonyms'));const p=ANTONYMS[idx];const distractors=SCRAMBLE_WORDS.filter(w=>w!==p[0]&&w!==p[1]);const d1=distractors[Math.floor(Math.random()*distractors.length)];let d2=distractors[Math.floor(Math.random()*distractors.length)];if(d2===d1)d2=distractors[(distractors.indexOf(d1)+1)%distractors.length];return{type:'choice',q:`מה ההיפך של "${p[0]}"?`,answer:p[1],options:shuffle([p[1],p[0],d1,d2])}}
function genIdiom(){const p=pickUnique(IDIOMS_FILL,'idioms');const opts=[p.answer,p.answer+'ת',p.answer+'ו',p.answer+'י'];return{type:'choice',q:`השלם: ${p.start} ___ ${p.end}`,answer:p.answer,options:shuffle([...new Set(opts)])}}
function genGrammar(){const g=pickUnique(GRAMMAR,'grammar');const all=['שם עצם','פועל','תואר'];return{type:'choice',q:`מה חלק הדיבור של "${g.word}"?`,answer:g.type,options:shuffle(all)}}
function genSpelling(){const w=pickUnique(SCRAMBLE_WORDS,'spelling');return{type:'input',q:`אייתו את המילה: ${w}`,answer:w}}
function genPlural(){const p=pickUnique(PLURAL_PAIRS,'plura');const wrongs=PLURAL_PAIRS.filter(x=>x!==p).map(x=>x.plural);shuffle(wrongs);return{type:'choice',q:`מה הרבים של "${p.singular}"?`,answer:p.plural,options:shuffle([p.plural,wrongs[0],wrongs[1],wrongs[2]])}}
function genReading(){const p=READING_PASSAGES[Math.floor(Math.random()*READING_PASSAGES.length)];return{type:'reading',text:p.text,questions:p.questions}}

const GENERATORS={scramble:genScramble,synonyms:genSynonym,antonyms:genAntonym,idioms:genIdiom,grammar:genGrammar,spelling:genSpelling,plura:genPlural,reading:genReading};

function startGame(type){
  currentGame=type;questions=[];seenItems={scramble:[],synonyms:[],antonyms:[],idioms:[],grammar:[],spelling:[],plura:[]};
  if(type==='reading'){
    const r=genReading();
    questions=[{...r,qIndex:0}];
  }else{
    for(let i=0;i<10;i++)questions.push(GENERATORS[type]());
  }
  qIndex=0;gameScore=0;
  showScreen('screen-game');
  document.getElementById('next-btn').classList.remove('show');
  if(state.dailyChallenge.active)startDcTimer();
  renderQuestion();
}

function updateGameHeader(){document.getElementById('g-prog').textContent=`שאלה ${qIndex+1} / ${questions.length}`;document.getElementById('g-score').textContent=gameScore}

function nextRound(){qIndex++;if(qIndex>=questions.length){endGame();return}document.getElementById('next-btn').classList.remove('show');renderQuestion()}

function endGame(){
  if(!state.subjectStats.hebrew)state.subjectStats.hebrew={gamesPlayed:0,score:0};
  state.subjectStats.hebrew.gamesPlayed++;state.subjectStats.hebrew.score+=gameScore;state.stars+=gameScore;saveState();
  const passed=gameScore>=6;
  document.getElementById('g-content').innerHTML=`<div style="padding:40px 20px;text-align:center;"><div style="font-size:5rem;">${passed?'🏆':'💪'}</div><h2 style="font-size:1.6rem;margin:16px 0;color:${passed?'#6BCB77':'#FF6B6B'};">${passed?'סיימת בהצלחה!':'כמעט! נסה שוב'}</h2><div style="font-size:1.2rem;margin:12px 0;">ענית נכון על <b>${gameScore}</b> מתוך <b>${questions.length}</b></div><div style="font-size:3rem;margin:16px 0;">${'⭐'.repeat(Math.max(1,Math.ceil(gameScore/3.3)))}</div><div style="margin-top:24px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;"><button onclick="startGame('${currentGame}')" style="padding:14px 30px;border-radius:30px;border:none;background:#4ECDC4;color:#fff;font-size:1.1rem;font-weight:700;cursor:pointer;">🔄 שחק שוב</button><button onclick="goBack()" style="padding:14px 30px;border-radius:30px;border:none;background:#9B7AE0;color:#fff;font-size:1.1rem;font-weight:700;cursor:pointer;">🏠 תפריט</button></div></div>`;
  document.getElementById('g-prog').textContent='סיום!';document.getElementById('next-btn').classList.remove('show');
}

function renderQuestion(){
  updateGameHeader();const c=document.getElementById('g-content');const q=questions[qIndex];
  if(q.type==='choice'){
    const unique=[...new Set(q.options.map(String))];
    c.innerHTML=`<div class="q-card"><div class="q-prompt">${GAME_NAMES[currentGame]}</div><div style="font-size:1.4rem;margin:12px 0;">${q.q}</div><div class="ans-grid">${unique.map(o=>`<button class="ans-btn" onclick="checkChoice(this,'${o}','${q.answer}')">${o}</button>`).join('')}</div></div>`;
  }else if(q.type==='input'){
    c.innerHTML=`<div class="q-card"><div class="q-prompt">${GAME_NAMES[currentGame]}</div><div style="font-size:1.4rem;margin:12px 0;">${q.q}</div><input type="text" class="fill-input" id="txt-input" autocomplete="off" onkeyup="if(event.key==='Enter')checkTextInput('${q.answer}')"><button class="btn" style="background:#9B7AE0" onclick="checkTextInput('${q.answer}')">בדוק ✓</button></div>`;
    document.getElementById('txt-input').focus();
  }else if(q.type==='scramble'){
    const letters=q.answer.split('');
    const shuffled=shuffle(letters);
    roundData={answer:q.answer,placed:[],shuffled,done:false};
    c.innerHTML=`<div class="q-card"><div class="q-prompt">${GAME_NAMES[currentGame]}</div><div style="font-size:1.1rem;color:#888;margin:8px;">סדר את האותיות</div><div class="scramble-answer" id="scramble-answer"></div><div class="scramble-letters" id="scramble-letters">${shuffled.map((l,i)=>`<button class="scramble-tile" data-i="${i}" onclick="placeLetter(${i})">${l}</button>`).join('')}</div><button class="btn" style="background:#C7A6FF" onclick="clearScramble()">🔄 נקה</button></div>`;
    renderScrambleAnswer();
  }else if(q.type==='reading'){
    const subQ=q.questions[q.qIndex||0];
    c.innerHTML=`<div class="q-card"><div class="q-prompt">📖 ${GAME_NAMES[currentGame]} (שאלה ${(q.qIndex||0)+1}/${q.questions.length})</div><div style="background:#f9f9f9;border-radius:12px;padding:16px;margin:12px 0;font-size:1.1rem;line-height:1.8;text-align:right;">${q.text}</div><div style="font-size:1.2rem;margin:12px 0;">${subQ.q}</div><div class="ans-grid">${subQ.options.map((o,i)=>`<button class="ans-btn" onclick="checkReading(${i},${subQ.answer})">${o}</button>`).join('')}</div></div>`;
  }
}

function checkChoice(btn,picked,correct){
  document.querySelectorAll('.ans-btn').forEach(b=>b.style.pointerEvents='none');
  if(String(picked)===String(correct)){gameScore++;showEncourage(true);btn.classList.add('correct')}
  else{btn.classList.add('wrong');showEncourage(false);document.querySelectorAll('.ans-btn').forEach(b=>{if(b.textContent===String(correct))b.classList.add('correct')})}
  updateGameHeader();document.getElementById('next-btn').classList.add('show');
}

function checkTextInput(answer){
  const input=document.getElementById('txt-input');const val=input.value.trim();
  if(val===answer){input.style.borderColor='#6BCB77';input.style.color='#6BCB77';gameScore++;showEncourage(true)}
  else{input.style.borderColor='#FF6B6B';input.style.color='#FF6B6B';showToast('התשובה: '+answer);showEncourage(false)}
  updateGameHeader();document.getElementById('next-btn').classList.add('show');
}

function checkReading(picked,correct){
  document.querySelectorAll('.ans-btn').forEach(b=>b.style.pointerEvents='none');
  if(picked===correct){gameScore++;showEncourage(true);document.querySelectorAll('.ans-btn')[correct].classList.add('correct')}
  else{document.querySelectorAll('.ans-btn')[picked].classList.add('wrong');document.querySelectorAll('.ans-btn')[correct].classList.add('correct');showEncourage(false)}
  updateGameHeader();
  const q=questions[qIndex];
  q.qIndex=(q.qIndex||0)+1;
  if(q.qIndex>=q.questions.length){document.getElementById('next-btn').classList.add('show')}
  else{setTimeout(()=>renderQuestion(),1500)}
}

function renderScrambleAnswer(){
  const c=document.getElementById('scramble-answer');
  if(!c||!roundData)return;
  c.innerHTML=roundData.answer.split('').map((_,i)=>{if(roundData.placed[i])return`<div class="scramble-slot filled">${roundData.placed[i].letter}</div>`;return`<div class="scramble-slot"></div>`}).join('');
}

function placeLetter(i){
  if(roundData.done)return;
  const tile=document.querySelector(`#scramble-letters [data-i="${i}"]`);
  if(tile.classList.contains('used'))return;
  const pos=roundData.placed.filter(p=>p).length;
  roundData.placed[pos]={letter:tile.textContent,tileIdx:i};
  tile.classList.add('used');
  renderScrambleAnswer();
  if(pos+1>=roundData.answer.length)checkScramble();
}

function clearScramble(){if(roundData.done)return;roundData.placed=[];document.querySelectorAll('#scramble-letters .scramble-tile').forEach(t=>t.classList.remove('used'));renderScrambleAnswer()}

function checkScramble(){
  const answer=roundData.placed.map(p=>p.letter).join('');
  if(answer===roundData.answer){roundData.done=true;gameScore++;showEncourage(true);updateGameHeader();document.getElementById('next-btn').classList.add('show')}
  else{showEncourage(false);setTimeout(()=>clearScramble(),1000)}
}

loadState();checkDailyReset();updateDcMini();
</script>
