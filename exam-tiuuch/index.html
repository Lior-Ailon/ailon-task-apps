<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מבחן רישוי תיווך נדל"ן</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; color: #1a1a2e; direction: rtl; }
  .container { max-width: 800px; margin: 0 auto; padding: 20px; }
  
  /* Header */
  .header { background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; padding: 30px; border-radius: 16px; text-align: center; margin-bottom: 24px; }
  .header h1 { font-size: 26px; margin-bottom: 8px; }
  .header p { font-size: 15px; opacity: 0.85; }
  
  /* Progress */
  .progress-bar { background: #e2e8f0; border-radius: 10px; height: 12px; margin-bottom: 8px; overflow: hidden; }
  .progress-fill { background: linear-gradient(90deg, #0f3460, #e94560); height: 100%; border-radius: 10px; transition: width 0.4s ease; }
  .progress-text { font-size: 13px; color: #666; margin-bottom: 20px; text-align: center; }
  
  /* Question card */
  .card { background: white; border-radius: 16px; padding: 28px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 20px; }
  .law-badge { display: inline-block; background: #e8f4fd; color: #0f3460; font-size: 12px; padding: 4px 12px; border-radius: 20px; margin-bottom: 14px; font-weight: 600; }
  .question-text { font-size: 19px; font-weight: 700; line-height: 1.6; margin-bottom: 20px; }
  .question-num { font-size: 13px; color: #999; margin-bottom: 6px; }
  
  /* Options */
  .options { display: flex; flex-direction: column; gap: 12px; }
  .option-btn { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 12px; padding: 14px 18px; font-size: 16px; text-align: right; cursor: pointer; transition: all 0.2s; font-family: inherit; direction: rtl; width: 100%; }
  .option-btn:hover:not(:disabled) { background: #e8f4fd; border-color: #0f3460; }
  .option-btn.correct { background: #d1fae5; border-color: #059669; color: #065f46; font-weight: 700; }
  .option-btn.wrong { background: #fee2e2; border-color: #dc2626; color: #991b1b; }
  .option-btn:disabled { cursor: default; }
  
  /* Explanation */
  .explanation { margin-top: 16px; background: #f0fdf4; border-right: 4px solid #059669; padding: 14px 16px; border-radius: 8px; font-size: 14px; line-height: 1.6; display: none; }
  .explanation.show { display: block; }
  .explanation.wrong-exp { background: #fff7ed; border-color: #f97316; }
  
  /* Next btn */
  .next-btn { background: linear-gradient(135deg, #0f3460, #e94560); color: white; border: none; padding: 14px 32px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 16px; width: 100%; display: none; font-family: inherit; transition: opacity 0.2s; }
  .next-btn:hover { opacity: 0.9; }
  .next-btn.show { display: block; }
  
  /* Results */
  .results { background: white; border-radius: 16px; padding: 32px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  .score-circle { width: 150px; height: 150px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 20px auto; font-size: 42px; font-weight: 900; }
  .pass { background: #d1fae5; color: #065f46; border: 6px solid #059669; }
  .fail { background: #fee2e2; color: #991b1b; border: 6px solid #dc2626; }
  .result-title { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
  .result-subtitle { font-size: 16px; color: #666; margin-bottom: 24px; }
  
  /* Mistakes review */
  .mistakes-section { text-align: right; margin-top: 28px; }
  .mistakes-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; color: #1a1a2e; }
  .mistake-item { background: #fff7ed; border: 1px solid #fed7aa; border-radius: 12px; padding: 16px; margin-bottom: 14px; }
  .mistake-q { font-weight: 700; margin-bottom: 8px; font-size: 15px; }
  .mistake-your { color: #dc2626; font-size: 14px; margin-bottom: 4px; }
  .mistake-correct { color: #059669; font-size: 14px; margin-bottom: 6px; font-weight: 700; }
  .mistake-explain { font-size: 13px; color: #555; background: #fff; padding: 8px; border-radius: 8px; line-height: 1.6; }
  
  /* Retry btn */
  .retry-btn { background: linear-gradient(135deg, #0f3460, #e94560); color: white; border: none; padding: 16px 40px; border-radius: 12px; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 24px; font-family: inherit; }
  .retry-btn:hover { opacity: 0.9; }
  
  /* Start screen */
  .start-screen { background: white; border-radius: 16px; padding: 40px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  .start-screen h2 { font-size: 22px; margin-bottom: 16px; }
  .start-screen p { color: #555; margin-bottom: 10px; line-height: 1.7; }
  .start-btn { background: linear-gradient(135deg, #0f3460, #e94560); color: white; border: none; padding: 18px 50px; border-radius: 14px; font-size: 20px; font-weight: 700; cursor: pointer; margin-top: 24px; font-family: inherit; }
  
  @media (max-width: 480px) {
    .question-text { font-size: 16px; }
    .option-btn { font-size: 14px; padding: 12px 14px; }
    .header h1 { font-size: 20px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🏠 מבחן רישוי תיווך נדל"ן</h1>
    <p>25 שאלות אקראיות | ציון עובר: 60 | בסגנון מבחן רשם המתווכים</p>
  </div>
  
  <div id="app"></div>
</div>

<script>
const ALL_QUESTIONS = [

// ==================== ינואר 2023 ====================
{ id:"jan23_1", source:"ינואר 2023", law:"רישום מקרקעין", q:"רחלי ויון מכרו את דירת מגוריהם. עורך הדין המייצג את הקונים ביקש 'אישורי העברה לטאבו'. מהו המסמך המתואר?", opts:["מסמך בחתימת יד של המוכרים המסכים להעברת הדירה","אישור רשות המסים שהקונים שילמו מס רכישה","אישור עירייה על היעדר חובות ואישור רשות המסים על היעדר חובות במיסוי מקרקעין","אישורי העברה בנקאית על תשלום מלוא התמורה"], correct:2, explain:"אישורי העברה לטאבו = אישור עירייה על היעדר חובות ארנונה + אישור מרשות המסים (מיסוי מקרקעין) — שניהם נדרשים לצורך ביצוע הרישום." },

{ id:"jan23_2", source:"ינואר 2023", law:"בתים משותפים", q:"רועי גר בקומה האחרונה. מי הגשמים גורמים לרטיבות מהגג לדירתו. יתר הדיירים דוחים בקשתו לתיקון. כיצד יפעל רועי?", opts:["יפנה לממונה על פניות הציבור ברשות מקרקעי ישראל","יתקן בעצמו — כי דירתו בקומה האחרונה","יתקן בעצמו וידרוש מהדיירים השתתפות","יגיש תביעה שתתנהל בפני המפקח על הבתים המשותפים שיורה על תיקון הגג"], correct:3, explain:"הגג הוא רכוש משותף. המפקח על הבתים המשותפים הוא הגורם המוסמך לחייב את בעלי הדירות לתקן רכוש משותף." },

{ id:"jan23_3", source:"ינואר 2023", law:"רישום מקרקעין", q:"סמדר רכשה דירה מקבלן. הבניין טרם נרשם כבית משותף. הבנק רוצה לרשום שיעבוד על זכויותיה. מה הכלל?", opts:["ניתן לרשום משכנתא אם שילמה 65% מהתמורה","הבנק לא יוכל לרשום שיעבוד כי הדירה אינה בטאבו","הבנק ירשום משכון ברשם המשכונות על זכויותיה וכן התחייבות לרישום משכנתא בספרי החברה המשכנת","לא ניתן לרשום שיעבוד כלל"], correct:2, explain:"כשהדירה אינה בטאבו — הבנק רושם משכון ברשם המשכונות על הזכויות החוזיות + התחייבות בספרי חברה המשכנת." },

{ id:"jan23_4", source:"ינואר 2023", law:"רישום מקרקעין", q:"אביתר רכש דירה חדשה באזור יהודה ושומרון. היכן יירשמו זכויותיו?", opts:["בלשכת רישום המקרקעין בירושלים","בפנקס הבתים המשותפים","אצל הממונה על הרכוש הממשלתי ביו\"ש או במשרדי רישום המקרקעין במינהל האזרחי","לא ניתן לרשום זכויות ביו\"ש"], correct:2, explain:"רישום מקרקעין ביהודה ושומרון מתנהל אצל הממונה על הרכוש הממשלתי / מינהל האזרחי — לא בלשכות הרגילות." },

{ id:"jan23_5", source:"ינואר 2023", law:"שיתוף במקרקעין", q:"אלעד וערן רכשו מגרש וחתמו על הסכם שיתוף. כעבור שנתיים, אלעד רוצה לפרק את השיתוף. האם רשאי?", opts:["לא, לא עברו 3 שנים מהסכם","כן, רק בהסכמת ערן","כן, רשאי להגיש תביעה לפירוק השיתוף","לא, כי לא בית משותף"], correct:2, explain:"כל שותף במקרקעין רשאי לדרוש פירוק שיתוף בכל עת — זוהי זכות מוקנית בחוק המקרקעין." },

{ id:"jan23_6", source:"ינואר 2023", law:"הערת אזהרה", q:"האם ניתן לרשום הערת אזהרה לטובת הקונה גם כשהמוכר לא חתם על הבקשה?", opts:["לא, העסקה טרם הסתיימה","לא, ניתן לרשום רק לאחר השלמת העסקה","כן, בתנאי שיצורף מכתב הסבר מדוע המוכר לא חתם","כן, בתנאי שיוכח לרשם שבעל המקרקעין התחייב בכתב לבצע את העסקה"], correct:3, explain:"ניתן לרשום הערת אזהרה ללא חתימת המוכר — בתנאי שתוכח בפני הרשם התחייבות בכתב לעסקה." },

{ id:"jan23_7", source:"ינואר 2023", law:"מיסוי מקרקעין", q:"בגין מה מהבאים ניתן לגבות היטל השבחה?", opts:["תוכנית חדשה המקנה זכויות בנייה נוספות","עליית מחירים כללית בשוק","שיפור תשתיות לנכס","מס שבח מקרקעין"], correct:0, explain:"היטל השבחה נגבה בגין אישור תוכנית, הקלה או שימוש חורג שהשביחו את הנכס." },

{ id:"jan23_8", source:"ינואר 2023", law:"חוק המתווכים", q:"שירן החתימה את אבנר המתווך לפעולת תיווך. בנו דיאל הוצג כקונה. האם המתווך רשאי לתווך?", opts:["לא יתווך בעסקה שיש לו עניין אישי, לרבות לבנו","לא יתווך עם עניין אישי של קרובו — אלא אם גילה ללקוח ובכתב קיבל הסכמתו","לא יתווך עם עניין אישי של קרובו — גם אם גילה ולא קיבל תשלום","רשאי לתווך עם עניין אישי וללא חובת עדכון"], correct:1, explain:"עניין אישי של קרוב המתווך — מותר בתנאי גילוי מלא ללקוח + הסכמתו בכתב." },

{ id:"jan23_9", source:"ינואר 2023", law:"חוק החוזים", q:"גדעון לא שילם תשלום רביעי בחוזה מכר. חלף חודש. אין סעיף ביטול. שרון רוצה לבטל. מה הדין?", opts:["שרון לא יכולה לבטל מיד — עליה לתת אורכה לתיקון ההפרה בזמן סביר","שרון לא יכולה לבטל ואין צורך באורכה","שרון יכולה לבטל ללא אורכה","שרון יכולה לבטל כי חלף חודש"], correct:0, explain:"הפרה שאיננה יסודית — חובה לתת אורכה סבירה לתיקון לפי חוק החוזים (תרופות)." },

{ id:"jan23_10", source:"ינואר 2023", law:"הערת אזהרה", q:"פנינה רכשה מאברהם דירה בטאבו נקי ורשמה הערת אזהרה. לאחר מכן הוטל עיקול מנושה של אברהם. האם העיקול פוגע בזכויות פנינה?", opts:["לא — הערת האזהרה מגינה עליה","כן — הדירה טרם נרשמה על שמה","לא — אלא אם המעקל ידע","כן — הערת האזהרה אינה מגינה מפני עיקול מאוחר"], correct:0, explain:"הערת אזהרה שנרשמה לפני העיקול מגינה על רוכש שפעל בתום לב ובתמורה." },

{ id:"jan23_11", source:"ינואר 2023", law:"בתים משותפים", q:"גילה רכשה דירה עם מחסן מוצמד. בחוזה נקבע שהמחסן יישאר אצל משה. האם ניתן?", opts:["לא, אלא אם למשה יש דירה אחרת בבניין","כן, אם הצדדים הסכימו","המחסן אינו חלק מהדירה ותמיד ניתן להפרידו","לא, כי המחסן צמוד ללא מרווח"], correct:0, explain:"ניתן לנתק צמידות רק אם לבעלים המקורי יש דירה אחרת בבית המשותף שאליה יוצמד החלק המנותק." },

{ id:"jan23_12", source:"ינואר 2023", law:"זכות קדימה", q:"יעקב ורחל נשואים ובעלי דירה משותפת. יעקב מכר את חלקו ליצחק ללא הצעה מוקדמת לרחל. מה הדין?", opts:["יעקב רשאי — רחל תישאר דיירת מוגנת","יעקב חייב להציע לרחל תחילה","יעקב חייב להציע לרחל רק בשנתיים הראשונות","יעקב רשאי, אלא אם סוכם אחרת בעל פה"], correct:1, explain:"בדירת מגורים משותפת של בני זוג — לאחד זכות קדימה לרכוש חלקו של האחר לפני הצעה לצד שלישי." },

{ id:"jan23_13", source:"ינואר 2023", law:"חוזי שכירות", q:"יונה שכר חנות ל-3 שנים עם אופציה ל-1.5 שנים נוספות. האם עיסקת השכירות חייבת להיות בכתב?", opts:["כן, כי האופציה מאריכה מעל 4.5 שנים","לא, שכירות קצרה מ-5 שנים","לא, הסכם שכירות מחייב כתב","לא, שכירות לא מחייבת כתב לכל משכה"], correct:1, explain:"חוק המקרקעין מחייב כתב בשכירות מעל 5 שנים. 3+1.5=4.5 שנים — אינה מחייבת כתב מדין מקרקעין." },

{ id:"jan23_14", source:"ינואר 2023", law:"מיסוי מקרקעין", q:"איציק ואפרת רכשו דירה ב-1.3 מיליון ₪ עם משכנתא 300,000 ₪. שמאי העריך ב-900,000 ₪. מהו שווי המכירה למיסוי?", opts:["1,000,000 ₪","1,300,000 ₪","900,000 ₪","1,200,000 ₪"], correct:0, explain:"שאלה זו בוטלה בבחינה הרשמית — כל התשובות מתקבלות. הכלל: שווי המכירה = מחיר העסקה בפועל כפי שנקבע בחוזה." },

{ id:"jan23_15", source:"ינואר 2023", law:"חוק המתווכים", q:"איזו עבירה תגרור עונש מאסר למתווך?", opts:["אי מסירת מידע מהותי ללקוח","גילוי ידיעה אישית של לקוח לצד שני","אי גילוי עניין אישי","העסקת אדם ללא רישיון תיווך"], correct:3, explain:"העסקת מי שאינו בעל רישיון תיווך = עבירה פלילית הצפויה למאסר לפי סעיף 20 לחוק המתווכים." },

{ id:"jan23_16", source:"ינואר 2023", law:"תכנון ובנייה", q:"יוסי בעל חלקה א' (מגורים) וחלקה ב' (חקלאית) במושב. האם רשאי לבנות צימרים בחלקה ב'?", opts:["לא — חלקה ב' מיועדת לחקלאות ואסורה בבנייה","לא — מותרים מגורים בלבד","כן — חלקה ב' מיועדת למסחר","כן — שייכת ליוסי ורשאי לעשות כל שימוש"], correct:0, explain:"חלקה ב' מיועדת לעיבוד חקלאי. בנייה לאירוח כפרי מחייבת שינוי ייעוד — אינה מותרת כברירת מחדל." },

{ id:"jan23_17", source:"ינואר 2023", law:"חוק המתווכים", q:"מתווכת חי החתימה לקוח רז על הזמנה כללית לבניין (ללא מספר דירה) ולא מסרה עותק. כעבור 3 חודשים שכר דירה אחרת בבניין ישירות. האם חי זכאית לעמלה? (כהן נ' גולן)", opts:["כן — חתם על הזמנה כללית","לא — לא קיבל עותק, לא פורטו פרטים, וחי לא הייתה גורם יעיל","לא — הבעלים פרסם עצמאית","כן — מגיעה מחצית עמלה"], correct:1, explain:"לפי כהן נ' גולן: אי מסירת עותק + אי פירוט פרטי הדירה + אי היותה גורם יעיל — שוללים את הזכות לעמלה." },

{ id:"jan23_18", source:"ינואר 2023", law:"חוק המתווכים", q:"רוית חתמה עם אפרת (ממשרד איציק) על הזמנת תיווך — ללא שם אפרת. אפרת לא ניהלה משא ומתן. רוית קנתה דרך מתווך אחר. האם איציק/אפרת זכאים? (ב.פ. השיא)", opts:["כן — אפרת החתימה והראתה ראשונה","כן — מחצית עמלה","לא — לרוית זכות לבחור מתווך","לא — אפרת לא ניהלה משא ומתן ולא הייתה גורם יעיל"], correct:3, explain:"הגורם היעיל הוא המתווך שסגר את העסקה. אפרת לא עמדה בתנאי זה — אינה זכאית לעמלה." },

{ id:"jan23_19", source:"ינואר 2023", law:"חוק המתווכים", q:"האם מתווך חייב לגלות ללקוח את שמו ומספר זהותו כשמציע לכרות חוזה?", opts:["כן, בכל הצעה לכריתת חוזה","לא, רק בטופס בלעדיות","כן, אלא אם כתב מספר רישיון","לא, עוסק לא מחויב למסור שמו"], correct:0, explain:"חוק הגנת הצרכן מחייב עוסק לגלות את שמו ומספר זהותו בכל הצעה לכריתת חוזה עם לקוח." },

{ id:"jan23_20", source:"ינואר 2023", law:"ניהול עיזבון", q:"האם מנהל עיזבון חייב להגיש דו\"ח לאפוטרופוס הכללי?", opts:["כן, לפחות אחת לשנה ובעת פקיעת משרתו","לא, רק לבית המשפט","כן, אך רק בעת סיום תפקידו","לא, אלא אם חויב ע\"י בית המשפט"], correct:3, explain:"מנהל עיזבון חייב בדין וחשבון לאפוטרופוס הכללי אחת לשנה ובעת פקיעת משרתו." },

{ id:"jan23_21", source:"ינואר 2023", law:"הגנת הדייר", q:"תהילה שוכרת חנות בדמי מפתח ואינה משלמת 10 שנים. עבור איזו תקופה זכאי בעל הנכס לתבוע?", opts:["שנה אחרונה","3 שנים אחרונות","7 שנים אחרונות","מלוא התקופה"], correct:1, explain:"לפי מפתח הבחינה הרשמי — תשובה ב' (3 שנים אחרונות). בפועל חוק ההתיישנות קובע 7 שנים, אך המפתח הרשמי ציין ב'." },

{ id:"jan23_22", source:"ינואר 2023", law:"תכנון ובנייה", q:"למי נתונה הסמכות לאשר מקרקעין כ'שיכון ציבורי'?", opts:["לשר הבינוי והשיכון","לוועדה המחוזית","לשר האוצר","לוועדה המקומית"], correct:0, explain:"הסמכות לאשר נכסים כ'שיכון ציבורי' נתונה לשר הבינוי והשיכון." },

{ id:"jan23_23", source:"ינואר 2023", law:"תכנון ובנייה", q:"מהו 'שימוש חורג' בקרקע או בבניין?", opts:["שימוש שונה מהתוכנית החלה במקום או מהיתר הבנייה","שינוי הוראות בנייה/עיצוב אדריכלי","שינוי חלוקת שטחי בנייה בתוכנית מחוזית","הגדלת יחידות דיור ללא הגדלת שטח"], correct:0, explain:"שימוש חורג = שימוש שונה מזה שנקבע בתוכנית החלה על המקום, או שונה מהיתר הבנייה." },

{ id:"jan23_24", source:"ינואר 2023", law:"חוק המתווכים", q:"משה מתווך צירף לקוחות למאגר בתשלום ללא הסכמתם המפורשת. האם רשאי?", opts:["כן, מדובר בהטבה","כן, פעולת תיווך מותרת","לא, לא יכול למסור פרטים לאחרים","לא, לא יכול לצרף לקוח לשירות בתשלום ללא הסכמתו המפורשת"], correct:3, explain:"מתווך לא רשאי לצרף לקוח לשירות בתשלום ללא הסכמתו המפורשת — גם לא תחת כיסוי של 'חודש ראשון חינם'." },

{ id:"jan23_25", source:"ינואר 2023", law:"ניהול עיזבון", q:"מנהל עיזבון רוצה למכור דירה שבעיזבון. מי מוסמך לאשר?", opts:["מנהל העיזבון ללא תנאי","מנהל העיזבון לאחר אישור בית המשפט","המפקח על הבתים המשותפים","רשם המקרקעין"], correct:1, explain:"מנהל עיזבון חייב בקבלת אישור בית המשפט לפני מכירת נכסי עיזבון." },

// ==================== מאי 2023 ====================
{ id:"may23_1", source:"מאי 2023", law:"זיקת הנאה", q:"יון שכן עבר בחצר של בימין 30 שנה וטוען לזיקת הנאה. האם זכות המעבר יכולה להירשם?", opts:["כן, זכות מעבר ניתנת לרישום כזיקת הנאה","לא, אינה יכולה להירשם כי לא שיעבוד","לא, הרישום לא נעשה בתמורה ובתום לב","כן, רק אם השביל מגודר ומסומן"], correct:0, explain:"זכות מעבר היא זכות במקרקעין הניתנת לרישום כזיקת הנאה. שימוש רצוף של 30 שנה עשוי ליצור זיקת הנאה." },

{ id:"may23_2", source:"מאי 2023", law:"מיסוי מקרקעין", q:"קונה עצמאי רוצה לקזז מע\"מ על רכישת דירת מגורים פרטית. האם רשאי?", opts:["כן, מע\"מ 17% חל בכל עסקה","לא, מע\"מ אינו חל על דירת מגורים שאינה מלאי עסקי","כן, בחישוב ליניארי","לא, לא עסקת אקראי"], correct:1, explain:"מכירת דירת מגורים פרטית אינה חייבת במע\"מ. לכן אין מה לקזז." },

{ id:"may23_3", source:"מאי 2023", law:"חוק המקרקעין", q:"מהי 'חכירה לדורות'?", opts:["שכירות להחזקה ושימוש במשק חקלאי","זכות שכירות לדורות הבאים","שכירות לתקופה של 25 שנה לפחות","שכירות למשך כל חיי הדייר"], correct:2, explain:"חכירה לדורות = שכירות לתקופה של 25 שנה ומעלה — מקנה מעמד של זכות קניינית לפי חוק המקרקעין." },

{ id:"may23_4", source:"מאי 2023", law:"שיתוף במקרקעין", q:"דני ויומית הם בעלים במושע. האם ניתן לרשום חלק מסוים על שם דני?", opts:["יש לנקוט הליך 'פירוק שיתוף' בבית משפט או הסכם פירוק שיתוף בינם","לדני יש חלק — אין צורך בצעד נוסף","בעלות במושע אינה ניתנת לפירוק","דרוש אישור רשות המסים"], correct:0, explain:"רישום חלק מסוים ממקרקעין מחייב פירוק שיתוף — דרך בית משפט או הסכם פירוק שיתוף." },

{ id:"may23_5", source:"מאי 2023", law:"בתים משותפים", q:"כיצד מחושבת חלקה של כל דירה בהוצאות ההחזקה השוטפת של הרכוש המשותף?", opts:["לפי החלטת הקבלן","רק קומות עליונות נושאות בעלות","לפי יחס שטח רצפת הדירה אל שטח כל הדירות בבניין","לפי יחס שטח הדירה אל שטח הרכוש המשותף"], correct:2, explain:"חוק הבתים המשותפים: כל דירה נושאת בהוצאות ההחזקה לפי יחס שטח רצפתה לסך שטחי כל הדירות בבניין." },

{ id:"may23_6", source:"מאי 2023", law:"חוק המתווכים", q:"בן מתווך הראה דירה לשכירות — לא ציין מספר דירה ולא מסר עותק. הלקוח שכר דירה אחרת באותו בניין. האם בן זכאי? (כהן נ' גולן)", opts:["כן, הלקוח חתם","לא, לא מסר עותק + לא ציין מספר דירה + לא היה גורם יעיל","כן, הכיר ללקוח את הבניין","לא, לא החתים על בלעדיות"], correct:1, explain:"שלושת התנאים לא התקיימו (עותק, פרטי דירה ספציפית, גורם יעיל) — אינו זכאי לעמלה." },

{ id:"may23_7", source:"מאי 2023", law:"חוק המתווכים", q:"ליה מתווכת ובעלת שליטה בחברה המוכרת דירה. האם רשאית לתווך?", opts:["לא, יש לה עניין אישי","כן, אם היא מצאה את הקונה","כן, אך מחצית עמלה בלבד","לא, כי יש לה עניין אישי — אלא אם עדכנה לקוחות וקיבלה הסכמתם בכתב"], correct:3, explain:"עניין אישי (כולל שליטה בחברה המוכרת) — מחייב גילוי ללקוח + הסכמתו בכתב. ללא זה — אסור לתווך." },

{ id:"may23_8", source:"מאי 2023", law:"רשות מקרקעי ישראל", q:"מהו 'הסכם משבצת'?", opts:["הסכם שיבוץ דירות בעסקת קומבינציה","הסכם חלוקת אזורים שווים בתוכנית","הסכם שטחים משותפים בין רשות מקומית ליזם","הסכם חכירה בין רמ\"י לאגודה שיתופית המגדיר שטח קרקע מוחכר"], correct:3, explain:"הסכם משבצת = הסכם חכירה בין רמ\"י לאגודה שיתופית, המגדיר שטח קרקע מוחכר לאגודה." },

{ id:"may23_9", source:"מאי 2023", law:"מיסוי מקרקעין", q:"אודי מוכר את דירתו. אילו הוצאות רשאי לנכות ממס השבח?", opts:["שכ\"ט עו\"ד ברכישה ובמכירה — עד 2%","אגרות לרשם המקרקעין + דמי תיווך עד 2% ברכישה + שכ\"ט שמאי","שכ\"ט עו\"ד ברכישה ובמכירה + תיווך עד 3%","שכ\"ט עו\"ד ברכישה בלבד"], correct:1, explain:"הוצאות מוכרות למס שבח: אגרות רשם + דמי תיווך עד 2% ברכישה + שכר טרחת שמאי." },

{ id:"may23_10", source:"מאי 2023", law:"מיסוי מקרקעין", q:"ילי וגדעון בעלי חכירה ל-99 שנה, מפעילים בחדרי הדירה מכון יופי ומשרד. האם הדירה 'דירת מגורים מזכה'?", opts:["כן, שימשה בעיקרה למגורים","לא, 50% שימש לעסק","לא, יש להם חכירה בלבד","כן, אך אינם 'יחיד'"], correct:0, explain:"דירה המשמשת בעיקרה למגורים — גם אם חדר אחד לעסק — עשויה להיות 'דירת מגורים מזכה'." },

{ id:"may23_11", source:"מאי 2023", law:"חוק המתווכים", q:"מי מהבאים אינו רשאי לקבל רישיון תיווך?", opts:["מי שטרם מלאו לו 21","מי שריצה מאסר בששת החודשים שקדמו לבקשה","מי שנפתחו נגדו 5 תיקי הוצל\"פ ומעלה","מי שנכשל בבחינה יותר מ-4 פעמים"], correct:1, explain:"מי שריצה מאסר בפועל בששת החודשים שקדמו לבקשת הרישיון — פסול לרישיון תיווך." },

{ id:"may23_12", source:"מאי 2023", law:"חוק המתווכים", q:"מתווך עם בלעדיות שביצע פעולות שיווק. הדירה נמכרה שלא באמצעותו. האם המוכר חייב לשלם? (שמואלי נ' סמוכה)", opts:["לא, המתווך לא היה גורם יעיל","כן, אך לא יותר מ-70%","לא, לא ניתן לקבוע בלעדיות","כן, קיימת חזקה שהמתווך היה גורם יעיל בתקופת הבלעדיות"], correct:3, explain:"בלעדיות תקפה + פעולות שיווק כדין = חזקה שהמתווך הוא הגורם היעיל. המוכר חייב לשלם." },

{ id:"may23_13", source:"מאי 2023", law:"מיסוי מקרקעין", q:"דינה ירשה קרקע חקלאית של המדינה ורוצה להפשיר לבנייה. מה תשלם ולמי?", opts:["דמי הסכמה לרמ\"י","דמי היוון לרמ\"י","דמי היתר לרמ\"י + היטל השבחה לוועדה המקומית (50% מהשבחה)","מס שבח 25% לרשות המסים"], correct:2, explain:"שינוי ייעוד קרקע חקלאית של המדינה: דמי היתר לרמ\"י + היטל השבחה לוועדה המקומית (50% מערך ההשבחה)." },

{ id:"may23_14", source:"מאי 2023", law:"חוק מכר דירות", q:"מה נדרש כדי שקבלן יגבה מעל 7% ממחיר הדירה?", opts:["ערבות בנקאית / פוליסת ביטוח / שיעבוד / הערת אזהרה","מסירת מפתח הדירה","מסירת מפתח + הערת אזהרה","ערבות אישית מהקבלן"], correct:0, explain:"חוק מכר דירות (הבטחת השקעות): גביה מעל 7% מחייבת ערבות בנקאית, פוליסת ביטוח, שיעבוד, או הערת אזהרה." },

{ id:"may23_15", source:"מאי 2023", law:"מיסוי מקרקעין", q:"יסמין תקבל ירושת דירת מגורים מאמה אסתר. כמה מס תשלם?", opts:["חייבת במס שבח ובמס רכישה","ירושה אינה מכירה — אין חבות במס בעת ההורשה","חבות במס שבח לפי שווי הדירה","לא ניתן פטור ממס שבח בדירת ירושה"], correct:1, explain:"ירושה אינה 'מכירה' — אין חבות במס שבח ובמס רכישה בעת קבלת נכס בירושה." },

{ id:"may23_16", source:"מאי 2023", law:"הערת אזהרה", q:"עמית מכר דירה למשה ב-2010 בלי הערת אזהרה. ב-2023 מכר שוב לחיים שרשם הערת אזהרה ראשון. מי זוכה? (גץ נ' בריטיש קולוניאל)", opts:["משה — ראשון בזמן","חיים — השני בזמן גובר תמיד","משה — כל עוד חיים לא רשם בעלות","חיים — קנה בתמורה ובתום לב ורשם הערת אזהרה ראשון"], correct:3, explain:"לפי גץ נ' בריטיש קולוניאל: רוכש בתמורה ובתום לב שרשם הערת אזהרה גובר על עסקה קודמת שלא הוגנה." },

{ id:"may23_17", source:"מאי 2023", law:"מיסוי מקרקעין", q:"איזה גוף מוסמך לגבות היטל השבחה?", opts:["רשות המסים","ועדה מקומית לתכנון ובנייה","משרד האוצר","עיריות מעל 25,000 תושבים"], correct:1, explain:"היטל השבחה נגבה על ידי הוועדה המקומית לתכנון ובנייה — לא על ידי רשות המסים." },

{ id:"may23_18", source:"מאי 2023", law:"חוק המתווכים", q:"לקוח ביקש ממתווך להכין דו\"ח שומה בתשלום להגשה לבית משפט. האם רשאי?", opts:["כן, אך רק לדירות באזור עיסוקו","כן, כחלק מעבודתו","כן, אך לא להגשה לבית משפט","לא, אסור למתווך להכין שומה בתשלום המוגשת לבית משפט"], correct:3, explain:"שומה לבית משפט היא מסמך משפטי רשמי. מתווך אינו שמאי מוסמך — אסור לו להכינה להגשה לבית משפט." },

{ id:"may23_19", source:"מאי 2023", law:"חוק המתווכים", q:"האם מתווך חייב לגלות ללקוח מידע מהותי על הנכס? (שמעון נ' סמיקון)", opts:["כן, חובת הנאמנות מחייבת גילוי מידע מהותי","לא, נסח הוא מסמך משפטי ואסור למתווך לעסוק בו","כן, אך רק אם יש עיקולים","לא, אינו חלק מתפקיד המתווך"], correct:0, explain:"לפי שמעון נ' סמיקון: חובת הנאמנות של המתווך כוללת גילוי מידע מהותי על הנכס ללקוח." },

{ id:"may23_20", source:"מאי 2023", law:"ניהול עיזבון", q:"האם מנהל עיזבון חייב בדו\"ח לאפוטרופוס הכללי?", opts:["כן, לפחות אחת לשנה ובעת פקיעת משרתו","לא, רק לבית המשפט","כן, אך רק בסיום תפקידו","לא, אלא אם חויב ע\"י בית המשפט"], correct:0, explain:"מנהל עיזבון חייב דין וחשבון לאפוטרופוס הכללי אחת לשנה ובעת פקיעת משרתו." },

{ id:"may23_21", source:"מאי 2023", law:"הגנת הדייר", q:"תהילה שוכרת חנות בדמי מפתח ואינה משלמת 10 שנים. עבור איזו תקופה זכאי בעל הנכס לתבוע?", opts:["שנה אחרונה","3 שנים אחרונות","7 שנים אחרונות","מלוא התקופה"], correct:0, explain:"לפי מפתח הבחינה הרשמי — תשובה א'. (הכלל הכללי: התיישנות 7 שנים, אך המפתח הרשמי ציין א'.)" },

{ id:"may23_22", source:"מאי 2023", law:"תכנון ובנייה", q:"למי הסמכות לאשר מקרקעין כ'שיכון ציבורי'?", opts:["לשר הבינוי והשיכון","לוועדה המחוזית","לשר האוצר","לוועדה המקומית"], correct:0, explain:"שר הבינוי והשיכון הוא שמאשר מקרקעין כ'שיכון ציבורי'." },

{ id:"may23_23", source:"מאי 2023", law:"חוק המתווכים", q:"בני הזוג מאיר גילו שמחצית הדירה נבנתה ללא היתר וביטלו את החוזה. האם המתווכת זכאית לדמי תיווך? (מאיר נ' שושן)", opts:["כן, הגיעה לצדדים להסכם מחייב","לא, החוזה בוטל","לא, מידע מהותי שחייבה לגלות לא גולה","כן, אין באחריותה לבדוק היתרים"], correct:2, explain:"לפי מאיר נ' שושן: בנייה ללא היתר היא מידע מהותי שהמתווכת חייבת לבדוק ולגלות. לא עשתה כן — אינה זכאית." },

{ id:"may23_24", source:"מאי 2023", law:"תכנון ובנייה", q:"מי מהבאים אינו בעל דעה מייעצת בוועדה המקומית?", opts:["נציג רשות מקרקעי ישראל","נציג השר לאיכות הסביבה","נציג לשכת רישום המקרקעין","נציג שר התחבורה"], correct:2, explain:"לשכת רישום המקרקעין אינה מיוצגת בוועדה המקומית — אינה בעלת דעה מייעצת." },

{ id:"may23_25", source:"מאי 2023", law:"בתים משותפים", q:"האם ניתן לייחד חנייה קיימת לדירה מסוימת (שדייר עם מוגבלות גר בה) ומהו הרוב הדרוש?", opts:["לא ניתן, שטח משותף","ברוב 100%","ברוב 75%","ברוב 60%"], correct:3, explain:"לפי חוק הבתים המשותפים: ניתן לייחד חנייה לאדם עם מוגבלות ברוב של 60% מבעלי הדירות." },

// ==================== יולי 2023 ====================
{ id:"jul23_1", source:"יולי 2023", law:"מיסוי מקרקעין", q:"ראובן מכר דירה (לא יחידה) ב-50% תשלום במועד חתימה ו-50% תוך 8 חודשים. מתי חייב לשלם מס שבח?", opts:["תוך 6 חודשים מחתימת ההסכם","תוך 8 חודשים מהתשלום הראשון","במועד קבלת התשלום הראשון","רק עם קבלת מלוא התשלום"], correct:0, explain:"שאלה זו בוטלה בבחינה (כל התשובות מתקבלות). הכלל: יש לדווח ולשלם מס שבח תוך 60 יום ממועד העסקה (חתימת ההסכם)." },

{ id:"jul23_2", source:"יולי 2023", law:"מיסוי מקרקעין", q:"שמואל רכש דירה נוספת מקבלן ומכר את הדירה הראשונה תוך 10 חודשים מקבלת החזקה בנוספת. האם הנוספת 'דירה יחידה' לצורך מס רכישה?", opts:["כן — בסופו של דבר נותרה דירה אחת","לא — הנוספת הפכה לנוספת בעת הרכישה","כן — מכר את הדירה הישנה תוך שנה מקבלת החזקה","לא — דירה מקבלן אינה 'דירה יחידה'"], correct:2, explain:"אם מכר את הדירה הישנה תוך שנה מקבלת החזקה בחדשה — ייחשב כרוכש 'דירה יחידה' לצורך מס רכישה." },

{ id:"jul23_3", source:"יולי 2023", law:"מיסוי מקרקעין", q:"גילה ולילי ירשו דירה וחולקות אחרת מצו הירושה, ללא תשלום ביניהן. האם חייבות במס שבח?", opts:["תמיד חייבות — כל העברה בירושה","כל עסקה במקרקעין חייבת","אין מס שבח בחלוקה ראשונה של נכסי עיזבון בין יורשים","רק לילי חייבת כי קיבלה חלק גדול יותר"], correct:2, explain:"חלוקת נכסי עיזבון ראשונה בין יורשים ללא תמורה חיצונית — אינה נחשבת מכירה ופטורה ממס שבח." },

{ id:"jul23_4", source:"יולי 2023", law:"חוק החוזים", q:"משה ויוסי חתמו על זיכרון דברים מפורט עם כל תנאי העסקה. יוסי שילם מקדמה. משה לא הגיע לחתימה הסופית ואמר שמישהו הציע יותר. האם משה יכול לחזור? (רביאי נ' מן השקד)", opts:["כן, לא נחתם הסכם מכר רשמי","לא, זיכרון דברים מפורט עם כל הפרטים המהותיים הוא חוזה מחייב","כן, ניתן לחזור בו בגלל מחיר גבוה יותר","לא, כי הצדדים עוד לא דיווחו לרשויות המס"], correct:1, explain:"לפי רביאי נ' מן השקד: זיכרון דברים עם כל פרטי העסקה = חוזה מחייב. משה לא יכול לחזור בו." },

{ id:"jul23_5", source:"יולי 2023", law:"חוק החוזים", q:"ראובן הציע למכור דירה לשמעון ב-1.6 מיליון ₪ ונתן 14 ימים להחליט. לאחר 10 ימים הודיע שאינו מעוניין עוד. האם רשאי?", opts:["לא — ניתנה בכתב ולא ניתן לבטל","לא — נקבע זמן קבלה ולכן אינו יכול לחזור בו","כן — רשאי בכל עת","כן — בתנאי שנתן הודעה בכתב לשמעון"], correct:1, explain:"הצעה שנקבע לה זמן קבלה — לא ניתן לחזור ממנה לפני תום הזמן שנקבע." },

{ id:"jul23_6", source:"יולי 2023", law:"הערת אזהרה", q:"לאה ומשה חתמו על הסכם מכר, משה שילם 10% ורשמה הערת אזהרה. למחרת לאה חתמה עם ליאורה שהציעה 200,000 ₪ יותר. מי גוברת?", opts:["ליאורה — חתמה לאחר בסכום גבוה יותר","לאה — עדיין בעלים כי משה לא שילם מלוא התמורה","משה — חתם ראשון, שילם מקדמה, ורשמה הערת אזהרה","לאה יכולה למכור למי שרוצה כי משה לא רשם בטאבו"], correct:2, explain:"משה חתם ראשון, שילם מקדמה ורשמה הערת אזהרה — זכויותיו מוגנות וגוברות על עסקת ליאורה המאוחרת." },

{ id:"jul23_7", source:"יולי 2023", law:"חוק המתווכים", q:"חנה מתווכת גילתה שהמוכר האמיתי הוא יהודה ולא ראובן. המשיכה לחתם את שמעון על הסכם תיווך. האם חייבת לגלות לשמעון?", opts:["כן — יהודה אינו לקוחה","לא — מחויבת בסודיות כלפי ראובן","לא — מדובר בייעוץ משפטי שאינו בסמכותה","כן — אי גילוי מידע מהותי זה מהווה הפרת חובת תום הלב כלפי שמעון"], correct:3, explain:"מידע שמוכר הנכס כלל אינו הבעלים הוא מידע מהותי ביותר — חובת המתווכת לגלותו לשמעון." },

{ id:"jul23_8", source:"יולי 2023", law:"חוק המתווכים", q:"האם מתווך חייב לגלות ללקוח שהמוכר נמצא בפשיטת רגל?", opts:["כן — מידע מהותי שיש לגלות","כן — רק אם המוכר הוא גם לקוחו","לא — עניין סודי ומשפטי","לא — גילויו יפגע במחיר הנכס"], correct:0, explain:"פשיטת רגל של המוכר היא מידע מהותי המשפיע על ביצוע העסקה — חובת המתווך לגלותו ללקוח." },

{ id:"jul23_9", source:"יולי 2023", law:"בתים משותפים", q:"ועד הבית רוצה לקבוע בתקנון חדש שחלק מהרכוש המשותף יוצמד לדירת הגן. האם אפשרי?", opts:["אפשרי בהחלטת כל בעלי הדירות","לא אפשרי — אסור להצמיד רכוש משותף","אפשרי ברוב שני שלישים מהדירות שיש להם שני שלישים מהרכוש","אפשרי ברוב שני שלישים מבעלי הדירות"], correct:0, explain:"הצמדת חלק מהרכוש המשותף לדירה ספציפית דורשת הסכמת כל בעלי הדירות." },

{ id:"jul23_10", source:"יולי 2023", law:"בתים משותפים", q:"מי יכול להגיש בקשה לתיקון צו רישום בית משותף ולמי?", opts:["אחד מבעלי הדירות / בעל זכות — לבית משפט השלום","כל אחד מבעלי הדירות / בעל זכות בדירה — למפקח על הבתים המשותפים","בעלים של שני שלישים מהרכוש — לבית משפט השלום או למפקח","בעלים של שני שלישים — למפקח בלבד"], correct:1, explain:"כל אחד מבעלי הדירות או כל בעל זכות בדירה יכול להגיש בקשה לתיקון צו הרישום — למפקח על הבתים המשותפים." },

{ id:"jul23_11", source:"יולי 2023", law:"בתים משותפים", q:"פרויקט חיזוק בית משותף (תמ\"א 38). כל הדיירים הסכימו חוץ מחנה קשישה צמודה לביתה. הקבלן לא מציע דיור חלופי. האם ניתן לאשר?", opts:["לא — דרוש הסכמת כל הדיירים","המפקח יכול לאשר ברוב 2/3","לא, המפקח לא יאשר אלא אם הוצעו לחנה מגורים חלופיים לתקופת הבנייה","המפקח חייב לאשר"], correct:2, explain:"המפקח יכול להתגבר על התנגדות דייר מבוגר — רק אם הוצע לו דיור חלופי לתקופת הבנייה. ללא הצעה — לא יאשר." },

{ id:"jul23_12", source:"יולי 2023", law:"חוק המתווכים", q:"מוכרים חתמו בלעדיות עם מתווך א' שביצע פעולות שיווק. מתווך ב' הביא קונה ונחתמה עסקה. מי זכאי? (נסכס נ' שמלצר)", opts:["מתווך א' בלבד — חתמו על בלעדיות","מתווך ב' בלבד — הוא הגורם היעיל","שני המתווכים — כל אחד לפי הסכמתו","שני המתווכים — עליהם לחלק"], correct:0, explain:"לפי נסכס נ' שמלצר: מתווך עם בלעדיות תקפה שביצע פעולות שיווק — זכאי לדמי תיווך גם אם מתווך אחר מצא את הקונה." },

{ id:"jul23_13", source:"יולי 2023", law:"חוק המתווכים", q:"משכיר חתם על בלעדיות ללא הגבלת זמן להשכרת חנות. כעבור חודשיים ביקש לבטל. האם רשאי?", opts:["כן — בלעדיות ללא הגבלת זמן חסרת תוקף","יכול לבטל רק לאחר 9 חודשים","יכול לבטל לאחר חודשיים","אם בוצעו 2 פעולות שיווק — לא ניתן לבטל"], correct:1, explain:"בלעדיות ללא הגבלת זמן תוגבל ל-9 חודשים (תקופת הבלעדיות המרבית לנכסים שאינם דירת מגורים)." },

{ id:"jul23_14", source:"יולי 2023", law:"חוק המתווכים", q:"לפי שמעון נ' סמיקון, האם מתווך חייב להציג ללקוח נסח טאבו של הנכס?", opts:["כן — חלק מחובת הנאמנות ומסירת מידע מהותי","לא — נסח הוא מסמך משפטי ואסור למתווך לעסוק בו","כן — אך רק אם יש עיקולים","לא — אינו חלק מתפקיד המתווך"], correct:0, explain:"לפי שמעון נ' סמיקון: הצגת נסח עדכני ללקוח היא חלק מחובת הנאמנות וגילוי המידע המהותי של המתווך." },

{ id:"jul23_15", source:"יולי 2023", law:"זיקת הנאה", q:"על חלקתה של ליאת רשומה זיקת הנאה לטובת חלקתה של דנה, ללא קביעת תקופה. מה תוקף הזיקה?", opts:["תקפה כל עוד לא נמחקה","תקפה לזמן סביר","תקפה עד שדנה תמכור","ללא תקופה — חסרת תוקף"], correct:0, explain:"זיקת הנאה שנרשמה כדין ללא קביעת תקופה — היא לצמיתות ותקפה כל עוד לא נמחקה מרישום המקרקעין." },

{ id:"jul23_16", source:"יולי 2023", law:"שיעבוד", q:"מה ההבדל בין משכנתא לאשכנתא?", opts:["אשכנתא = שעבוד נכסים; משכנתא = שעבוד זכויות","אשכנתא = הלוואה לדירה; משכנתא = הלוואה לרכב","ניתן לרשום אשכנתא רק אם הנכס לא בטאבו; משכנתא — רק אם כן","אין הבדל"], correct:0, explain:"אשכנתא = שעבוד על נכסים שאינם מקרקעין. משכנתא = שעבוד על מקרקעין הרשום בלשכת רישום המקרקעין." },

{ id:"jul23_17", source:"יולי 2023", law:"תכנון ובנייה", q:"מה מהבאים אינו יכול להיכלל בתוכנית בניין עיר (תב\"ע)?", opts:["תקנון","תשריט","נספח שמירה על הסביבה","גרמושקה (בקשה להיתר בנייה)"], correct:3, explain:"גרמושקה = בקשה פרטית לקבלת היתר בנייה. אינה חלק מתוכנית בניין עיר (תב\"ע)." },

{ id:"jul23_18", source:"יולי 2023", law:"רשות מקרקעי ישראל", q:"האם 'בר רשות' חקלאי יכול להגדיל את שטח יחידת המגורים שלו?", opts:["לא — לא יכול להגדיל","כן — ללא תנאי","לא — ניתן להפנותו מהקרקע בכל עת","כן — לפי ההסכמים והזכויות החלים על הקרקע"], correct:3, explain:"'בר רשות' יכול להגדיל את יחידת המגורים בהתאם להסכמים ולזכויות שחלים על אותה קרקע." },

{ id:"jul23_19", source:"יולי 2023", law:"חוק המתווכים", q:"צביקה (בעל מלון) עם הסכם תיווך עם יוסי. יוסי לא הצליח עם 'איתמר'. שנה לאחר מכן, נציג הבעלים סגר עם 'איתמר'. האם יוסי זכאי? (מוסקוביץ נ' ביר)", opts:["לא — לא טיפל עד הסוף","לא — לא סיים את המשא ומתן","כן — הסכם התיווך תקף שנה","כן — נציג הבעלים הוא 'גורם מתערב' שאינו שולל את זכאות יוסי"], correct:3, explain:"לפי מוסקוביץ נ' ביר: נציג שנשלח על ידי הבעלים לסיים עסקה שהמתווך התחיל — הוא 'גורם מתערב' שאינו שולל זכות המתווך." },

{ id:"jul23_20", source:"יולי 2023", law:"תכנון ובנייה", q:"תמ\"א 38/2 — מה התנאי המחייב להכנסת הבניין?", opts:["שאין התנגדויות","לפני יישום — יש להסב שימושים לדיור","תחול על מבנה ציבורי בלבד","החיזוק המבוקש ישתלב ויסתמך על התשתית הקיימת"], correct:3, explain:"תמ\"א 38/2 מתנה את החיזוק בכך שהמבוקש ישתלב בתשתית הקיימת של הבניין." },

];

let currentQuestions = [];
let currentIndex = 0;
let score = 0;
let mistakes = [];
let answered = false;

function shuffle(a) {
  const arr = [...a];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startExam() {
  currentQuestions = shuffle(ALL_QUESTIONS).slice(0, 25);
  currentIndex = 0;
  score = 0;
  mistakes = [];
  answered = false;
  renderQuestion();
}

function renderStart() {
  document.getElementById('app').innerHTML = `
    <div class="start-screen">
      <h2>🎓 ברוכים הבאים למבחן ההכנה</h2>
      <p>המבחן מכיל <strong>25 שאלות אקראיות</strong> מתוך בנק של <strong>75 שאלות ממבחנים רשמיים</strong>.</p>
      <p>המקורות: ינואר 2023, מאי 2023, יולי 2023 — שאלות ותשובות אמיתיות של רשם המתווכים.</p>
      <p>ציון עובר: <strong>60 ומעלה</strong> (15 שאלות נכונות).</p>
      <p>בסוף המבחן — סיכום הטעויות עם הסבר לכל שאלה.</p>
      <button class="start-btn" onclick="startExam()">🚀 התחל מבחן</button>
    </div>
  `;
}

function renderQuestion() {
  const q = currentQuestions[currentIndex];
  const progress = ((currentIndex) / 25) * 100;
  const shuffledOpts = shuffle(q.opts.map((o, i) => ({ text: o, origIdx: i })));

  document.getElementById('app').innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div class="progress-text">שאלה ${currentIndex + 1} מתוך 25 | ✓ נכון עד כה: ${score} | 📁 ${q.source}</div>
    <div class="card">
      <div class="question-num">שאלה ${currentIndex + 1}</div>
      <div class="law-badge">📋 ${q.law}</div>
      <div class="question-text">${q.q}</div>
      <div class="options" id="options">
        ${shuffledOpts.map((o, i) => `
          <button class="option-btn" onclick="selectAnswer(${o.origIdx}, this, ${JSON.stringify(shuffledOpts).replace(/"/g,'&quot;')})" data-idx="${i}">
            ${'אבגד'[i]}. ${o.text}
          </button>
        `).join('')}
      </div>
      <div class="explanation" id="explanation"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
        ${currentIndex < 24 ? 'שאלה הבאה ←' : 'סיים מבחן ✓'}
      </button>
    </div>
  `;
}

function selectAnswer(origIdx, btn, shuffledOpts) {
  if (answered) return;
  answered = true;
  const q = currentQuestions[currentIndex];
  const isCorrect = origIdx === q.correct;

  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => {
    b.disabled = true;
    const bOrigIdx = shuffledOpts[parseInt(b.dataset.idx)].origIdx;
    if (bOrigIdx === q.correct) b.classList.add('correct');
  });

  if (!isCorrect) {
    btn.classList.add('wrong');
    mistakes.push({ q: q.q, law: q.law, source: q.source, yourAnswer: q.opts[origIdx], correctAnswer: q.opts[q.correct], explain: q.explain });
  } else {
    score++;
  }

  const expEl = document.getElementById('explanation');
  expEl.innerHTML = `<strong>${isCorrect ? '✅ נכון!' : '❌ לא נכון'}</strong> — ${q.explain}`;
  expEl.classList.add('show');
  if (!isCorrect) expEl.classList.add('wrong-exp');

  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  currentIndex++;
  answered = false;
  if (currentIndex >= 25) {
    renderResults();
  } else {
    renderQuestion();
  }
}

function renderResults() {
  const percent = Math.round((score / 25) * 100);
  const passed = percent >= 60;

  const mistakesHtml = mistakes.length > 0 ? `
    <div class="mistakes-section">
      <div class="mistakes-title">📝 ניתוח הטעויות שלך (${mistakes.length} שאלות):</div>
      ${mistakes.map((m, i) => `
        <div class="mistake-item">
          <div class="mistake-q">${i+1}. ${m.q}</div>
          <div class="law-badge" style="margin-bottom:8px">📋 ${m.law} | 📁 ${m.source}</div>
          <div class="mistake-your">❌ התשובה שלך: ${m.yourAnswer}</div>
          <div class="mistake-correct">✅ התשובה הנכונה: ${m.correctAnswer}</div>
          <div class="mistake-explain">💡 הסבר: ${m.explain}</div>
        </div>
      `).join('')}
    </div>
  ` : '<p style="color:#059669;font-weight:700;font-size:18px;margin-top:16px">🎉 מושלם! לא עשית אף טעות!</p>';

  document.getElementById('app').innerHTML = `
    <div class="results">
      <div class="score-circle ${passed ? 'pass' : 'fail'}">${percent}%</div>
      <div class="result-title">${passed ? '🎉 עברת את המבחן!' : '😔 לא עברת הפעם'}</div>
      <div class="result-subtitle">
        ${score} מתוך 25 נכון | ציון: ${percent}% | ${passed ? 'מעל 60% ✓' : 'נדרש 60% לפחות'}
      </div>
      ${mistakesHtml}
      <button class="retry-btn" onclick="startExam()">
        ${passed ? '🔄 מבחן חדש' : '🔄 נסה שוב — שאלות חדשות!'}
      </button>
    </div>
  `;
}

renderStart();
</script>
</body>
</html>
