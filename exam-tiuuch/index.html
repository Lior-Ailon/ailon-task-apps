<script>
const ALL_QUESTIONS = [

{ id:"jan23_1", source:"ינואר 2023", law:"רישום מקרקעין", q:"רחלי ויון מכרו את דירת מגוריהם. עורך הדין המייצג את הקונים ביקש 'אישורי העברה לטאבו'. מהו המסמך המתואר?", opts:["מסמך בחתימת יד של המוכרים המסכים להעברת הדירה","אישור רשות המסים שהקונים שילמו מס רכישה","אישור עירייה על היעדר חובות ואישור רשות המסים על היעדר חובות במיסוי מקרקעין","אישורי העברה בנקאית על תשלום מלוא התמורה"], correct:2, explain:"אישורי העברה לטאבו = אישור עירייה על היעדר חובות ארנונה + אישור מרשות המסים (מיסוי מקרקעין) — שניהם נדרשים לצורך ביצוע הרישום." },

{ id:"jan23_2", source:"ינואר 2023", law:"בתים משותפים", q:"רועי גר בקומה האחרונה. מי הגשמים גורמים לרטיבות מהגג לדירתו. יתר הדיירים דוחים בקשתו לתיקון. כיצד יפעל רועי?", opts:["יפנה לממונה על פניות הציבור ברשות מקרקעי ישראל","יתקן בעצמו — כי דירתו בקומה האחרונה","יתקן בעצמו וידרוש מהדיירים השתתפות","יגיש תביעה שתתנהל בפני המפקח על הבתים המשותפים שיורה על תיקון הגג"], correct:3, explain:"הגג הוא רכוש משותף. המפקח על הבתים המשותפים הוא הגורם המוסמך לחייב את בעלי הדירות לתקן רכוש משותף." },

{ id:"jan23_3", source:"ינואר 2023", law:"רישום מקרקעין", q:"סמדר רכשה דירה מקבלן. הבניין טרם נרשם כבית משותף. הבנק רוצה לרשום שיעבוד על זכויותיה. מה הכלל?", opts:["ניתן לרשום משכנתא אם שילמה 65% מהתמורה","הבנק לא יוכל לרשום שיעבוד כי הדירה אינה בטאבו","הבנק ירשום משכון ברשם המשכונות על זכויותיה וכן התחייבות לרישום משכנתא בספרי החברה המשכנת","לא ניתן לרשום שיעבוד כלל"], correct:2, explain:"כשהדירה אינה בטאבו — הבנק רושם משכון ברשם המשכונות על הזכויות החוזיות + התחייבות בספרי חברה המשכנת." },

{ id:"jan23_4", source:"ינואר 2023", law:"רישום מקרקעין", q:"אביתר רכש דירה חדשה באזור יהודה ושומרון. היכן יירשמו זכויותיו?", opts:["בלשכת רישום המקרקעין בירושלים","בפנקס הבתים המשותפים","אצל הממונה על הרכוש הממשלתי ביו\"ש או במשרדי רישום המקרקעין במינהל האזרחי","לא ניתן לרשום זכויות ביו\"ש"], correct:2, explain:"רישום מקרקעין ביהודה ושומרון מתנהל אצל הממונה על הרכוש הממשלתי / מינהל האזרחי — לא בלשכות הרגילות." },

{ id:"jan23_5", source:"ינואר 2023", law:"שיתוף במקרקעין", q:"אלעד וערן רכשו מגרש וחתמו על הסכם שיתוף. כעבור שנתיים, אלעד רוצה לפרק את השיתוף. האם רשאי?", opts:["לא, לא עברו 3 שנים מהסכם","כן, רק בהסכמת ערן","כן, רשאי להגיש תביעה לפירוק השיתוף","לא, כי לא בית משותף"], correct:2, explain:"כל שותף במקרקעין רשאי לדרוש פירוק שיתוף בכל עת — זוהי זכות מוקנית בחוק המקרקעין." },

{ id:"jan23_6", source:"ינואר 2023", law:"הערת אזהרה", q:"האם ניתן לרשום הערת אזהרה לטובת הקונה גם כשהמוכר לא חתם על הבקשה?", opts:["לא, העסקה טרם הסתיימה","לא, ניתן לרשום רק לאחר השלמת העסקה","כן, בתנאי שיצורף מכתב הסבר מדוע המוכר לא חתם","כן, בתנאי שיוכח לרשם שבעל המקרקעין התחייב בכתב לבצע את העסקה"], correct:3, explain:"ניתן לרשום הערת אזהרה ללא חתימת המוכר — בתנאי שתוכח בפני הרשם התחייבות בכתב לעסקה." },

{ id:"jan23_7", source:"ינואר 2023", law:"מיסוי מקרקעין", q:"בגין מה מהבאים ניתן לגבות היטל השבחה?", opts:["תוכנית חדשה המקנה זכויות בנייה נוספות","עליית מחירים כללית בשוק","שיפור תשתיות לנכס","מס שבח מקרקעין"], correct:0, explain:"היטל השבחה נגבה בגין אישור תוכנית, הקלה או שימוש חורג שהשביחו את הנכס." },

{ id:"jan23_8", source:"ינואר 2023", law:"חוק המתווכים", q:"שירן החתימה את אבנר המתווך לפעולת תיווך. בנו דיאל הוצג כקונה. האם המתווך רשאי לתווך?", opts:["לא יתווך בעסקה שיש לו עניין אישי, לרבות לבנו","לא יתווך עם עניין אישי של קרובו — אלא אם גילה ללקוח ובכתב קיבל הסכמתו","לא יתווך עם עניין אישי של קרובו — גם אם גילה ולא קיבל תשלום","רשאי לתווך עם עניין אישי וללא חובת עדכון"], correct:1, explain:"עניין אישי של קרוב המתווך — מותר בתנאי גילוי מלא ללקוח + הסכמתו בכתב." },

{ id:"jan23_9", source:"ינואר 2023", law:"חוק החוזים", q:"גדעון לא שילם תשלום רביעי בחוזה מכר. חלף חודש. אין סעיף ביטול. שרון רוצה לבטל. מה הדין?", opts:["שרון לא יכולה לבטל מיד — עליה לתת אורכה לתיקון ההפרה בזמן סביר","שרון לא יכולה לבטל ואין צורך באורכה","שרון יכולה לבטל ללא אורכה","שרון יכולה לבטל כי חלף חודש"], correct:0, explain:"הפרה שאיננה יסודית — חובה לתת אורכה סבירה לתיקון לפי חוק החוזים (תרופות)." },

{ id:"jan23_10", source:"ינואר 2023", law:"הערת אזהרה", q:"פנינה רכשה מאברהם דירה בטאבו נקי ורשמה הערת אזהרה. לאחר מכן הוטל עיקול מנושה של אברהם. האם העיקול פוגע בזכויות פנינה?", opts:["לא — הערת האזהרה מגינה עליה","כן — הדירה טרם נרשמה על שמה","לא — אלא אם המעקל ידע","כן — הערת האזהרה אינה מגינה מפני עיקול מאוחר"], correct:0, explain:"הערת אזהרה שנרשמה לפני העיקול מגינה על רוכש שפעל בתום לב ובתמורה." },

{ id:"jan23_11", source:"ינואר 2023", law:"בתים משותפים", q:"גילה רכשה דירה עם מחסן מוצמד. בחוזה נקבע שהמחסן יישאר אצל משה. האם ניתן?", opts:["לא, אלא אם למשה יש דירה אחרת בבניין","כן, אם הצדדים הסכימו","המחסן אינו חלק מהדירה ותמיד ניתן להפרידו","לא, כי המחסן צמוד ללא מרווח"], correct:0, explain:"ניתן לנתק צמידות רק אם לבעלים המקורי יש דירה אחרת בבית המשותף שאליה יוצמד החלק המנותק." },

{ id:"jan23_12", source:"ינואר 2023", law:"זכות קדימה", q:"יעקב ורחל נשואים ובעלי דירה משותפת. יעקב מכר את חלקו ליצחק ללא הצעה מוקדמת לרחל. מה הדין?", opts:["יעקב רשאי — רחל תישאר דיירת מוגנת","יעקב חייב להציע לרחל תחילה","יעקב חייב להציע לרחל רק בשנתיים הראשונות","יעקב רשאי, אלא אם סוכם אחרת בעל פה"], correct:1, explain:"בדירת מגורים משותפת של בני זוג — לאחד זכות קדימה לרכוש חלקו של האחר לפני הצעה לצד שלישי." },

{ id:"jan23_13", source:"ינואר 2023", law:"חוזי שכירות", q:"יונה שכר חנות ל-3 שנים עם אופציה ל-1.5 שנים נוספות. האם עיסקת השכירות חייבת להיות בכתב?", opts:["כן, כי האופציה מאריכה מעל 4.5 שנים","לא, שכירות קצרה מ-5 שנים","לא, הסכם שכירות מחייב כתב","לא, שכירות לא מחייבת כתב לכל משכה"], correct:1, explain:"חוק המקרקעין מחייב כתב בשכירות מעל 5 שנים. 3+1.5=4.5 שנים — אינה מחייבת כתב מדין מקרקעין." },

{ id:"jan23_14", source:"ינואר 2023", law:"מיסוי מקרקעין", q:"איציק ואפרת רכשו דירה ב-1.3 מיליון ₪ עם משכנתא 300,000 ₪. שמאי העריך ב-900,000 ₪. מהו שווי המכירה למיסוי?", opts:["1,000,000 ₪","1,300,000 ₪","900,000 ₪","1,200,000 ₪"], correct:0, explain:"שאלה זו בוטלה בבחינה הרשמית — כל התשובות מתקבלות. הכלל: שווי המכירה = מחיר העסקה בפועל כפי שנקבע בחוזה." },

{ id:"jan23_15", source:"ינואר 2023", law:"חוק המתווכים", q:"איזו עבירה תגרור עונש מאסר למתווך?", opts:["אי מסירת מידע מהותי ללקוח","גילוי ידיעה אישית של לקוח לצד שני","אי גילוי עניין אישי","העסקת אדם ללא רישיון תיווך"], correct:3, explain:"העסקת מי שאינו בעל רישיון תיווך = עבירה פלילית הצפויה למאסר לפי סעיף 20 לחוק המתווכים." },

{ id:"jan23_16", source:"ינואר 2023", law:"תכנון ובנייה", q:"יוסי בעל חלקה א' (מגורים) וחלקה ב' (חקלאית) במושב. האם רשאי לבנות צימרים בחלקה ב'?", opts:["לא — חלקה ב' מיועדת לחקלאות ואסורה בבנייה","לא — מותרים מגורים בלבד","כן — חלקה ב' מיועדת למסחר","כן — שייכת ליוסי ורשאי לעשות כל שימוש"], correct:0, explain:"חלקה ב' מיועדת לעיבוד חקלאי. בנייה לאירוח כפרי מחייבת שינוי ייעוד — אינה מותרת כברירת מחדל." },

{ id:"jan23_17", source:"ינואר 2023", law:"חוק המתווכים", q:"מתווכת חי החתימה לקוח רז על הזמנה כללית לבניין (ללא מספר דירה) ולא מסרה עותק. כעבור 3 חודשים שכר דירה אחרת בבניין ישירות. האם חי זכאית לעמלה? (כהן נ' גולן)", opts:["כן — חתם על הזמנה כללית","לא — לא קיבל עותק, לא פורטו פרטים, וחי לא הייתה גורם יעיל","לא — הבעלים פרסם עצמאית","כן — מגיעה מחצית עמלה"], correct:1, explain:"לפי כהן נ' גולן: אי מסירת עותק + אי פירוט פרטי הדירה + אי היותה גורם יעיל — שוללים את הזכות לעמלה." },

{ id:"jan23_18", source:"ינואר 2023", law:"חוק המתווכים", q:"רוית חתמה עם אפרת (ממשרד איציק) על הזמנת תיווך — ללא שם אפרת. אפרת לא ניהלה משא ומתן. רוית קנתה דרך מתווך אחר. האם איציק/אפרת זכאים? (ב.פ. השיא)", opts:["כן — אפרת החתימה והראתה ראשונה","כן — מחצית עמלה","לא — לרוית זכות לבחור מתווך","לא — אפרת לא ניהלה משא ומתן ולא הייתה גורם יעיל"], correct:3, explain:"הגורם היעיל הוא המתווך שסגר את העסקה. אפרת לא עמדה בתנאי זה — אינה זכאית לעמלה." },

{ id:"jan23_19", source:"ינואר 2023", law:"חוק המתווכים", q:"האם מתווך חייב לגלות ללקוח את שמו ומספר זהותו כשמציע לכרות חוזה?", opts:["כן, בכל הצעה לכריתת חוזה","לא, רק בטופס בלעדיות","כן, אלא אם כתב מספר רישיון","לא, עוסק לא מחויב למסור שמו"], correct:0, explain:"חוק הגנת הצרכן מחייב עוסק לגלות את שמו ומספר זהותו בכל הצעה לכריתת חוזה עם לקוח." },

{ id:"jan23_20", source:"ינואר 2023", law:"ניהול עיזבון", q:"האם מנהל עיזבון חייב להגיש דו\"ח לאפוטרופוס הכללי?", opts:["כן, לפחות אחת לשנה ובעת פקיעת משרתו","לא, רק לבית המשפט","כן, אך רק בעת סיום תפקידו","לא, אלא אם חויב ע\"י בית המשפט"], correct:3, explain:"מנהל עיזבון חייב בדין וחשבון לאפוטרופוס הכללי אחת לשנה ובעת פקיעת משרתו." },

{ id:"jan23_21", source:"ינואר 2023", law:"הגנת הדייר", q:"תהילה שוכרת חנות בדמי מפתח ואינה משלמת 10 שנים. עבור איזו תקופה זכאי בעל הנכס לתבוע?", opts:["שנה אחרונה","3 שנים אחרונות","7 שנים אחרונות","מלוא התקופה"], correct:1, explain:"לפי מפתח הבחינה הרשמי — תשובה ב' (3 שנים אחרונות). בפועל חוק ההתיישנות קובע 7 שנים, אך המפתח הרשמי ציין ב'." },

{ id:"jan23_22", source:"ינואר 2023", law:"תכנון ובנייה", q:"למי נתונה הסמכות לאשר מקרקעין כ'שיכון ציבורי'?", opts:["לשר הבינוי והשיכון","לוועדה המחוזית","לשר האוצר","לוועדה המקומית"], correct:0, explain:"הסמכות לאשר נכסים כ'שיכון ציבורי' נתונה לשר הבינוי והשיכון." },

{ id:"jan23_23", source:"ינואר 2023", law:"תכנון ובנייה", q:"מהו 'שימוש חורג' בקרקע או בבניין?", opts:["שימוש שונה מהתוכנית החלה במקום או מהיתר הבנייה","שינוי הוראות בנייה/עיצוב אדריכלי","שינוי חלוקת שטחי בנייה בתוכנית מחוזית","הגדלת יחידות דיור ללא הגדלת שטח"], correct:0, explain:"שימוש חורג = שימוש שונה מזה שנקבע בתוכנית החלה על המקום, או שונה מהיתר הבנייה." },

{ id:"jan23_24", source:"ינואר 2023", law:"חוק המתווכים", q:"משה מתווך צירף לקוחות למאגר בתשלום ללא הסכמתם המפורשת. האם רשאי?", opts:["כן, מדובר בהטבה","כן, פעולת תיווך מותרת","לא, לא יכול למסור פרטים לאחרים","לא, לא יכול לצרף לקוח לשירות בתשלום ללא הסכמתו המפורשת"], correct:3, explain:"מתווך לא רשאי לצרף לקוח לשירות בתשלום ללא הסכמתו המפורשת — גם לא תחת כיסוי של 'חודש ראשון חינם'." },

{ id:"jan23_25", source:"ינואר 2023", law:"ניהול עיזבון", q:"מנהל עיזבון רוצה למכור דירה שבעיזבון. מי מוסמך לאשר?", opts:["מנהל העיזבון ללא תנאי","מנהל העיזבון לאחר אישור בית המשפט","המפקח על הבתים המשותפים","רשם המקרקעין"], correct:1, explain:"מנהל עיזבון חייב בקבלת אישור בית המשפט לפני מכירת נכסי עיזבון." },

{ id:"may23_1", source:"מאי 2023", law:"זיקת הנאה", q:"יון שכן עבר בחצר של בימין 30 שנה וטוען לזיקת הנאה. האם זכות המעבר יכולה להירשם?", opts:["כן, זכות מעבר ניתנת לרישום כזיקת הנאה","לא, אינה יכולה להירשם כי לא שיעבוד","לא, הרישום לא נעשה בתמורה ובתום לב","כן, רק אם השביל מגודר ומסומן"], correct:0, explain:"זכות מעבר היא זכות במקרקעין הניתנת לרישום כזיקת הנאה. שימוש רצוף של 30 שנה עשוי ליצור זיקת הנאה." },

{ id:"may23_2", source:"מאי 2023", law:"מיסוי מקרקעין", q:"קונה עצמאי רוצה לקזז מע\"מ על רכישת דירת מגורים פרטית. האם רשאי?", opts:["כן, מע\"מ 17% חל בכל עסקה","לא, מע\"מ אינו חל על דירת מגורים שאינה מלאי עסקי","כן, בחישוב ליניארי","לא, לא עסקת אקראי"], correct:1, explain:"מכירת דירת מגורים פרטית אינה חייבת במע\"מ. לכן אין מה לקזז." },

{ id:"may23_3", source:"מאי 2023", law:"חוק המקרקעין", q:"מהי 'חכירה לדורות'?", opts:["שכירות להחזקה ושימוש במשק חקלאי","זכות שכירות לדורות הבאים","שכירות לתקופה של 25 שנה לפחות","שכירות למשך כל חיי הדייר"], correct:2, explain:"חכירה לדורות = שכירות לתקופה של 25 שנה ומעלה — מקנה מעמד של זכות קניינית לפי חוק המקרקעין." },

{ id:"may23_4", source:"מאי 2023", law:"שיתוף במקרקעין", q:"דני ויומית הם בעלים במושע. האם ניתן לרשום חלק מסוים על שם דני?", opts:["יש לנקוט הליך 'פירוק שיתוף' בבית משפט או הסכם פירוק שיתוף בינם","לדני יש חלק — אין צורך בצעד נוסף","בעלות במושע אינה ניתנת לפירוק","דרוש אישור רשות המסים"], correct:0, explain:"רישום חלק מסוים ממקרקעין מחייב פירוק שיתוף — דרך בית משפט או הסכם פירוק שיתוף." },

{ id:"may23_5", source:"מאי 2023", law:"בתים משותפים", q:"כיצד מחושבת חלקה של כל דירה בהוצאות ההחזקה השוטפת של הרכוש המשותף?", opts:["לפי החלטת הקבלן","רק קומות עליונות נושאות בעלות","לפי יחס שטח רצפת הדירה אל שטח כל הדירות בבניין","לפי יחס שטח הדירה אל שטח הרכוש המשותף"], correct:2, explain:"חוק הבתים המשותפים: כל דירה נושאת בהוצאות ההחזקה לפי יחס שטח רצפתה לסך שטחי כל הדירות בבניין." },

{ id:"may23_6", source:"מאי 2023", law:"חוק המתווכים", q:"בן מתווך הראה דירה לשכירות — לא ציין מספר דירה ולא מסר עותק. הלקוח שכר דירה אחרת באותו בניין. האם בן זכאי? (כהן נ' גולן)", opts:["כן, הלקוח חתם","לא, לא מסר עותק + לא ציין מספר דירה + לא היה גורם יעיל","כן, הכיר ללקוח את הבניין","לא, לא החתים על בלעדיות"], correct:1, explain:"שלושת התנאים לא התקיימו (עותק, פרטי דירה ספציפית, גורם יעיל) — אינו זכאי לעמלה." },

{ id:"may23_7", source:"מאי 2023", law:"חוק המתווכים", q:"ליה מתווכת ובעלת שליטה בחברה המוכרת דירה. האם רשאית לתווך?", opts:["לא, יש לה עניין אישי","כן, אם היא מצאה את הקונה","כן, אך מחצית עמלה בלבד","לא, כי יש לה עניין אישי — אלא אם עדכנה לקוחות וקיבלה הסכמתם בכתב"], correct:3, explain:"עניין אישי (כולל שליטה בחברה המוכרת) — מחייב גילוי ללקוח + הסכמתו בכתב. ללא זה — אסור לתווך." },

{ id:"may23_8", source:"מאי 2023", law:"רשות מקרקעי ישראל", q:"מהו 'הסכם משבצת'?", opts:["הסכם שיבוץ דירות בעסקת קומבינציה","הסכם חלוקת אזורים שווים בתוכנית","הסכם שטחים משותפים בין רשות מקומית ליזם","הסכם חכירה בין רמ\"י לאגודה שיתופית המגדיר שטח קרקע מוחכר"], correct:3, explain:"הסכם משבצת = הסכם חכירה בין רמ\"י לאגודה שיתופית, המגדיר שטח קרקע מוחכר לאגודה." },

{ id:"may23_9", source:"מאי 2023", law:"מיסוי מקרקעין", q:"אודי מוכר את דירתו. אילו הוצאות רשאי לנכות ממס השבח?", opts:["שכ\"ט עו\"ד ברכישה ובמכירה — עד 2%","אגרות לרשם המקרקעין + דמי תיווך עד 2% ברכישה + שכ\"ט שמאי","שכ\"ט עו\"ד ברכישה ובמכירה + תיווך עד 3%","שכ\"ט עו\"ד ברכישה בלבד"], correct:1, explain:"הוצאות מוכרות למס שבח: אגרות רשם + דמי תיווך עד 2% ברכישה + שכר טרחת שמאי." },

{ id:"may23_10", source:"מאי 2023", law:"מיסוי מקרקעין", q:"ילי וגדעון בעלי חכירה ל-99 שנה, מפעילים בחדרי הדירה מכון יופי ומשרד. האם הדירה 'דירת מגורים מזכה'?", opts:["כן, שימשה בעיקרה למגורים","לא, 50% שימש לעסק","לא, יש להם חכירה בלבד","כן, אך אינם 'יחיד'"], correct:0, explain:"דירה המשמשת בעיקרה למגורים — גם אם חדר אחד לעסק — עשויה להיות 'דירת מגורים מזכה'." },

{ id:"may23_11", source:"מאי 2023", law:"חוק המתווכים", q:"מי מהבאים אינו רשאי לקבל רישיון תיווך?", opts:["מי שטרם מלאו לו 21","מי שריצה מאסר בששת החודשים שקדמו לבקשה","מי שנפתחו נגדו 5 תיקי הוצל\"פ ומעלה","מי שנכשל בבחינה יותר מ-4 פעמים"], correct:1, explain:"מי שריצה מאסר בפועל בששת החודשים שקדמו לבקשת הרישיון — פסול לרישיון תיווך." },

{ id:"may23_12", source:"מאי 2023", law:"חוק המתווכים", q:"מתווך עם בלעדיות שביצע פעולות שיווק. הדירה נמכרה שלא באמצעותו. האם המוכר חייב לשלם? (שמואלי נ' סמוכה)", opts:["לא, המתווך לא היה גורם יעיל","כן, אך לא יותר מ-70%","לא, לא ניתן לקבוע בלעדיות","כן, קיימת חזקה שהמתווך היה גורם יעיל בתקופת הבלעדיות"], correct:3, explain:"בלעדיות תקפה + פעולות שיווק כדין = חזקה שהמתווך הוא הגורם היעיל. המוכר חייב לשלם." },

{ id:"may23_13", source:"מאי 2023", law:"מיסוי מקרקעין", q:"דינה ירשה קרקע חקלאית של המדינה ורוצה להפשיר לבנייה. מה תשלם ולמי?", opts:["דמי הסכמה לרמ\"י","דמי היוון לרמ\"י","דמי היתר לרמ\"י + היטל השבחה לוועדה המקומית (50% מהשבחה)","מס שבח 25% לרשות המסים"], correct:2, explain:"שינוי ייעוד קרקע חקלאית של המדינה: דמי היתר לרמ\"י + היטל השבחה לוועדה המקומית (50% מערך ההשבחה)." },

{ id:"may23_14", source:"מאי 2023", law:"חוק מכר דירות", q:"מה נדרש כדי שקבלן יגבה מעל 7% ממחיר הדירה?", opts:["ערבות בנקאית / פוליסת ביטוח / שיעבוד / הערת אזהרה","מסירת מפתח הדירה","מסירת מפתח + הערת אזהרה","ערבות אישית מהקבלן"], correct:0, explain:"חוק מכר דירות (הבטחת השקעות): גביה מעל 7% מחייבת ערבות בנקאית, פוליסת ביטוח, שיעבוד, או הערת אזהרה." },

{ id:"may23_15", source:"מאי 2023", law:"מיסוי מקרקעין", q:"יסמין תקבל ירושת דירת מגורים מאמה אסתר. כמה מס תשלם?", opts:["חייבת במס שבח ובמס רכישה","ירושה אינה מכירה — אין חבות במס בעת ההורשה","חבות במס שבח לפי שווי הדירה","לא ניתן פטור ממס שבח בדירת ירושה"], correct:1, explain:"ירושה אינה 'מכירה' — אין חבות במס שבח ובמס רכישה בעת קבלת נכס בירושה." },

{ id:"may23_16", source:"מאי 2023", law:"הערת אזהרה", q:"עמית מכר דירה למשה ב-2010 בלי הערת אזהרה. ב-2023 מכר שוב לחיים שרשם הערת אזהרה ראשון. מי זוכה? (גץ נ' בריטיש קולוניאל)", opts:["משה — ראשון בזמן","חיים — השני בזמן גובר תמיד","משה — כל עוד חיים לא רשם בעלות","חיים — קנה בתמורה ובתום לב ורשם הערת אזהרה ראשון"], correct:3, explain:"לפי גץ נ' בריטיש קולוניאל: רוכש בתמורה ובתום לב שרשם הערת אזהרה גובר על עסקה קודמת שלא הוגנה." },

{ id:"may23_17", source:"מאי 2023", law:"מיסוי מקרקעין", q:"איזה גוף מוסמך לגבות היטל השבחה?", opts:["רשות המסים","ועדה מקומית לתכנון ובנייה","משרד האוצר","עיריות מעל 25,000 תושבים"], correct:1, explain:"היטל השבחה נגבה על ידי הוועדה המקומית לתכנון ובנייה — לא על ידי רשות המסים." },

{ id:"may23_18", source:"מאי 2023", law:"חוק המתווכים", q:"לקוח ביקש ממתווך להכין דו\"ח שומה בתשלום להגשה לבית משפט. האם רשאי?", opts:["כן, אך רק לדירות באזור עיסוקו","כן, כחלק מעבודתו","כן, אך לא להגשה לבית משפט","לא, אסור למתווך להכין שומה בתשלום המוגשת לבית משפט"], correct:3, explain:"שומה לבית משפט היא מסמך משפטי רשמי. מתווך אינו שמאי מוסמך — אסור לו להכינה להגשה לבית משפט." },

{ id:"may23_19", source:"מאי 2023", law:"חוק המתווכים", q:"האם מתווך חייב לגלות ללקוח מידע מהותי על הנכס? (שמעון נ' סמיקון)", opts:["כן, חובת הנאמנות מחייבת גילוי מידע מהותי","לא, נסח הוא מסמך משפטי ואסור למתווך לעסוק בו","כן, אך רק אם יש עיקולים","לא, אינו חלק מתפקיד המתווך"], correct:0, explain:"לפי שמעון נ' סמיקון: חובת הנאמנות של המתווך כוללת גילוי מידע מהותי על הנכס ללקוח." },

{ id:"may23_20", source:"מאי 2023", law:"ניהול עיזבון", q:"האם מנהל עיזבון חייב בדו\"ח לאפוטרופוס הכללי?", opts:["כן, לפחות אחת לשנה ובעת פקיעת משרתו","לא, רק לבית המשפט","כן, אך רק בסיום תפקידו","לא, אלא אם חויב ע\"י בית המשפט"], correct:0, explain:"מנהל עיזבון חייב דין וחשבון לאפוטרופוס הכללי אחת לשנה ובעת פקיעת משרתו." },

{ id:"may23_21", source:"מאי 2023", law:"הגנת הדייר", q:"תהילה שוכרת חנות בדמי מפתח ואינה משלמת 10 שנים. עבור איזו תקופה זכאי בעל הנכס לתבוע?", opts:["שנה אחרונה","3 שנים אחרונות","7 שנים אחרונות","מלוא התקופה"], correct:0, explain:"לפי מפתח הבחינה הרשמי — תשובה א'. (הכלל הכללי: התיישנות 7 שנים, אך המפתח הרשמי ציין א'.)" },

{ id:"may23_22", source:"מאי 2023", law:"תכנון ובנייה", q:"למי הסמכות לאשר מקרקעין כ'שיכון ציבורי'?", opts:["לשר הבינוי והשיכון","לוועדה המחוזית","לשר האוצר","לוועדה המקומית"], correct:0, explain:"שר הבינוי והשיכון הוא שמאשר מקרקעין כ'שיכון ציבורי'." },

{ id:"may23_23", source:"מאי 2023", law:"חוק המתווכים", q:"בני הזוג מאיר גילו שמחצית הדירה נבנתה ללא היתר וביטלו את החוזה. האם המתווכת זכאית לדמי תיווך? (מאיר נ' שושן)", opts:["כן, הגיעה לצדדים להסכם מחייב","לא, החוזה בוטל","לא, מידע מהותי שחייבה לגלות לא גולה","כן, אין באחריותה לבדוק היתרים"], correct:2, explain:"לפי מאיר נ' שושן: בנייה ללא היתר היא מידע מהותי שהמתווכת חייבת לבדוק ולגלות. לא עשתה כן — אינה זכאית." },

{ id:"may23_24", source:"מאי 2023", law:"תכנון ובנייה", q:"מי מהבאים אינו בעל דעה מייעצת בוועדה המקומית?", opts:["נציג רשות מקרקעי ישראל","נציג השר לאיכות הסביבה","נציג לשכת רישום המקרקעין","נציג שר התחבורה"], correct:2, explain:"לשכת רישום המקרקעין אינה מיוצגת בוועדה המקומית — אינה בעלת דעה מייעצת." },

{ id:"may23_25", source:"מאי 2023", law:"בתים משותפים", q:"האם ניתן לייחד חנייה קיימת לדירה מסוימת (שדייר עם מוגבלות גר בה) ומהו הרוב הדרוש?", opts:["לא ניתן, שטח משותף","ברוב 100%","ברוב 75%","ברוב 60%"], correct:3, explain:"לפי חוק הבתים המשותפים: ניתן לייחד חנייה לאדם עם מוגבלות ברוב של 60% מבעלי הדירות." },

{ id:"jul23_1", source:"יולי 2023", law:"מיסוי מקרקעין", q:"ראובן מכר דירה (לא יחידה) ב-50% תשלום במועד חתימה ו-50% תוך 8 חודשים. מתי חייב לשלם מס שבח?", opts:["תוך 6 חודשים מחתימת ההסכם","תוך 8 חודשים מהתשלום הראשון","במועד קבלת התשלום הראשון","רק עם קבלת מלוא התשלום"], correct:0, explain:"שאלה זו בוטלה בבחינה (כל התשובות מתקבלות). הכלל: יש לדווח ולשלם מס שבח תוך 60 יום ממועד העסקה (חתימת ההסכם)." },

{ id:"jul23_2", source:"יולי 2023", law:"מיסוי מקרקעין", q:"שמואל רכש דירה נוספת מקבלן ומכר את הדירה הראשונה תוך 10 חודשים מקבלת החזקה בנוספת. האם הנוספת 'דירה יחידה' לצורך מס רכישה?", opts:["כן — בסופו של דבר נותרה דירה אחת","לא — הנוספת הפכה לנוספת בעת הרכישה","כן — מכר את הדירה הישנה תוך שנה מקבלת החזקה","לא — דירה מקבלן אינה 'דירה יחידה'"], correct:2, explain:"אם מכר את הדירה הישנה תוך שנה מקבלת החזקה בחדשה — ייחשב כרוכש 'דירה יחידה' לצורך מס רכישה." },

{ id:"jul23_3", source:"יולי 2023", law:"מיסוי מקרקעין", q:"גילה ולילי ירשו דירה וחולקות אחרת מצו הירושה, ללא תשלום ביניהן. האם חייבות במס שבח?", opts:["תמיד חייבות — כל העברה בירושה","כל עסקה במקרקעין חייבת","אין מס שבח בחלוקה ראשונה של נכסי עיזבון בין יורשים","רק לילי חייבת כי קיבלה חלק גדול יותר"], correct:2, explain:"חלוקת נכסי עיזבון ראשונה בין יורשים ללא תמורה חיצונית — אינה נחשבת מכירה ופטורה ממס שבח." },

{ id:"jul23_4", source:"יולי 2023", law:"חוק החוזים", q:"משה ויוסי חתמו על זיכרון דברים מפורט עם כל תנאי העסקה. יוסי שילם מקדמה. משה לא הגיע לחתימה הסופית ואמר שמישהו הציע יותר. האם משה יכול לחזור? (רביאי נ' מן השקד)", opts:["כן, לא נחתם הסכם מכר רשמי","לא, זיכרון דברים מפורט עם כל הפרטים המהותיים הוא חוזה מחייב","כן, ניתן לחזור בו בגלל מחיר גבוה יותר","לא, כי הצדדים עוד לא דיווחו לרשויות המס"], correct:1, explain:"לפי רביאי נ' מן השקד: זיכרון דברים עם כל פרטי העסקה = חוזה מחייב. משה לא יכול לחזור בו." },

{ id:"jul23_5", source:"יולי 2023", law:"חוק החוזים", q:"ראובן הציע למכור דירה לשמעון ב-1.6 מיליון ₪ ונתן 14 ימים להחליט. לאחר 10 ימים הודיע שאינו מעוניין עוד. האם רשאי?", opts:["לא — ניתנה בכתב ולא ניתן לבטל","לא — נקבע זמן קבלה ולכן אינו יכול לחזור בו","כן — רשאי בכל עת","כן — בתנאי שנתן הודעה בכתב לשמעון"], correct:1, explain:"הצעה שנקבע לה זמן קבלה — לא ניתן לחזור ממנה לפני תום הזמן שנקבע." },

{ id:"jul23_6", source:"יולי 2023", law:"הערת אזהרה", q:"לאה ומשה חתמו על הסכם מכר, משה שילם 10% ורשמה הערת אזהרה. למחרת לאה חתמה עם ליאורה שהציעה 200,000 ₪ יותר. מי גוברת?", opts:["ליאורה — חתמה לאחר בסכום גבוה יותר","לאה — עדיין בעלים כי משה לא שילם מלוא התמורה","משה — חתם ראשון, שילם מקדמה, ורשמה הערת אזהרה","לאה יכולה למכור למי שרוצה כי משה לא רשם בטאבו"], correct:2, explain:"משה חתם ראשון, שילם מקדמה ורשמה הערת אזהרה — זכויותיו מוגנות וגוברות על עסקת ליאורה המאוחרת." },

{ id:"jul23_7", source:"יולי 2023", law:"חוק המתווכים", q:"חנה מתווכת גילתה שהמוכר האמיתי הוא יהודה ולא ראובן. המשיכה לחתם את שמעון על הסכם תיווך. האם חייבת לגלות לשמעון?", opts:["כן — יהודה אינו לקוחה","לא — מחויבת בסודיות כלפי ראובן","לא — מדובר בייעוץ משפטי שאינו בסמכותה","כן — אי גילוי מידע מהותי זה מהווה הפרת חובת תום הלב כלפי שמעון"], correct:3, explain:"מידע שמוכר הנכס כלל אינו הבעלים הוא מידע מהותי ביותר — חובת המתווכת לגלותו לשמעון." },

{ id:"jul23_8", source:"יולי 2023", law:"חוק המתווכים", q:"האם מתווך חייב לגלות ללקוח שהמוכר נמצא בפשיטת רגל?", opts:["כן — מידע מהותי שיש לגלות","כן — רק אם המוכר הוא גם לקוחו","לא — עניין סודי ומשפטי","לא — גילויו יפגע במחיר הנכס"], correct:0, explain:"פשיטת רגל של המוכר היא מידע מהותי המשפיע על ביצוע העסקה — חובת המתווך לגלותו ללקוח." },

{ id:"jul23_9", source:"יולי 2023", law:"בתים משותפים", q:"ועד הבית רוצה לקבוע בתקנון חדש שחלק מהרכוש המשותף יוצמד לדירת הגן. האם אפשרי?", opts:["אפשרי בהחלטת כל בעלי הדירות","לא אפשרי — אסור להצמיד רכוש משותף","אפשרי ברוב שני שלישים מהדירות שיש להם שני שלישים מהרכוש","אפשרי ברוב שני שלישים מבעלי הדירות"], correct:0, explain:"הצמדת חלק מהרכוש המשותף לדירה ספציפית דורשת הסכמת כל בעלי הדירות." },

{ id:"jul23_10", source:"יולי 2023", law:"בתים משותפים", q:"מי יכול להגיש בקשה לתיקון צו רישום בית משותף ולמי?", opts:["אחד מבעלי הדירות / בעל זכות — לבית משפט השלום","כל אחד מבעלי הדירות / בעל זכות בדירה — למפקח על הבתים המשותפים","בעלים של שני שלישים מהרכוש — לבית משפט השלום או למפקח","בעלים של שני שלישים — למפקח בלבד"], correct:1, explain:"כל אחד מבעלי הדירות או כל בעל זכות בדירה יכול להגיש בקשה לתיקון צו הרישום — למפקח על הבתים המשותפים." },

{ id:"jul23_11", source:"יולי 2023", law:"בתים משותפים", q:"פרויקט חיזוק בית משותף (תמ\"א 38). כל הדיירים הסכימו חוץ מחנה קשישה צמודה לביתה. הקבלן לא מציע דיור חלופי. האם ניתן לאשר?", opts:["לא — דרוש הסכמת כל הדיירים","המפקח יכול לאשר ברוב 2/3","לא, המפקח לא יאשר אלא אם הוצעו לחנה מגורים חלופיים לתקופת הבנייה","המפקח חייב לאשר"], correct:2, explain:"המפקח יכול להתגבר על התנגדות דייר מבוגר — רק אם הוצע לו דיור חלופי לתקופת הבנייה. ללא הצעה — לא יאשר." },

{ id:"jul23_12", source:"יולי 2023", law:"חוק המתווכים", q:"מוכרים חתמו בלעדיות עם מתווך א' שביצע פעולות שיווק. מתווך ב' הביא קונה ונחתמה עסקה. מי זכאי? (נסכס נ' שמלצר)", opts:["מתווך א' בלבד — חתמו על בלעדיות","מתווך ב' בלבד — הוא הגורם היעיל","שני המתווכים — כל אחד לפי הסכמתו","שני המתווכים — עליהם לחלק"], correct:0, explain:"לפי נסכס נ' שמלצר: מתווך עם בלעדיות תקפה שביצע פעולות שיווק — זכאי לדמי תיווך גם אם מתווך אחר מצא את הקונה." },

{ id:"jul23_13", source:"יולי 2023", law:"חוק המתווכים", q:"משכיר חתם על בלעדיות ללא הגבלת זמן להשכרת חנות. כעבור חודשיים ביקש לבטל. האם רשאי?", opts:["כן — בלעדיות ללא הגבלת זמן חסרת תוקף","יכול לבטל רק לאחר 9 חודשים","יכול לבטל לאחר חודשיים","אם בוצעו 2 פעולות שיווק — לא ניתן לבטל"], correct:1, explain:"בלעדיות ללא הגבלת זמן תוגבל ל-9 חודשים (תקופת הבלעדיות המרבית לנכסים שאינם דירת מגורים)." },

{ id:"jul23_14", source:"יולי 2023", law:"חוק המתווכים", q:"לפי שמעון נ' סמיקון, האם מתווך חייב להציג ללקוח נסח טאבו של הנכס?", opts:["כן — חלק מחובת הנאמנות ומסירת מידע מהותי","לא — נסח הוא מסמך משפטי ואסור למתווך לעסוק בו","כן — אך רק אם יש עיקולים","לא — אינו חלק מתפקיד המתווך"], correct:0, explain:"לפי שמעון נ' סמיקון: הצגת נסח עדכני ללקוח היא חלק מחובת הנאמנות וגילוי המידע המהותי של המתווך." },

{ id:"jul23_15", source:"יולי 2023", law:"זיקת הנאה", q:"על חלקתה של ליאת רשומה זיקת הנאה לטובת חלקתה של דנה, ללא קביעת תקופה. מה תוקף הזיקה?", opts:["תקפה כל עוד לא נמחקה","תקפה לזמן סביר","תקפה עד שדנה תמכור","ללא תקופה — חסרת תוקף"], correct:0, explain:"זיקת הנאה שנרשמה כדין ללא קביעת תקופה — היא לצמיתות ותקפה כל עוד לא נמחקה מרישום המקרקעין." },

{ id:"jul23_16", source:"יולי 2023", law:"שיעבוד", q:"מה ההבדל בין משכנתא לאשכנתא?", opts:["אשכנתא = שעבוד נכסים; משכנתא = שעבוד זכויות","אשכנתא = הלוואה לדירה; משכנתא = הלוואה לרכב","ניתן לרשום אשכנתא רק אם הנכס לא בטאבו; משכנתא — רק אם כן","אין הבדל"], correct:0, explain:"אשכנתא = שעבוד על נכסים שאינם מקרקעין. משכנתא = שעבוד על מקרקעין הרשום בלשכת רישום המקרקעין." },

{ id:"jul23_17", source:"יולי 2023", law:"תכנון ובנייה", q:"מה מהבאים אינו יכול להיכלל בתוכנית בניין עיר (תב\"ע)?", opts:["תקנון","תשריט","נספח שמירה על הסביבה","גרמושקה (בקשה להיתר בנייה)"], correct:3, explain:"גרמושקה = בקשה פרטית לקבלת היתר בנייה. אינה חלק מתוכנית בניין עיר (תב\"ע)." },

{ id:"jul23_18", source:"יולי 2023", law:"רשות מקרקעי ישראל", q:"האם 'בר רשות' חקלאי יכול להגדיל את שטח יחידת המגורים שלו?", opts:["לא — לא יכול להגדיל","כן — ללא תנאי","לא — ניתן להפנותו מהקרקע בכל עת","כן — לפי ההסכמים והזכויות החלים על הקרקע"], correct:3, explain:"'בר רשות' יכול להגדיל את יחידת המגורים בהתאם להסכמים ולזכויות שחלים על אותה קרקע." },

{ id:"jul23_19", source:"יולי 2023", law:"חוק המתווכים", q:"צביקה (בעל מלון) עם הסכם תיווך עם יוסי. יוסי לא הצליח עם 'איתמר'. שנה לאחר מכן, נציג הבעלים סגר עם 'איתמר'. האם יוסי זכאי? (מוסקוביץ נ' ביר)", opts:["לא — לא טיפל עד הסוף","לא — לא סיים את המשא ומתן","כן — הסכם התיווך תקף שנה","כן — נציג הבעלים הוא 'גורם מתערב' שאינו שולל את זכאות יוסי"], correct:3, explain:"לפי מוסקוביץ נ' ביר: נציג שנשלח על ידי הבעלים לסיים עסקה שהמתווך התחיל — הוא 'גורם מתערב' שאינו שולל זכות המתווך." },

{ id:"jul23_20", source:"יולי 2023", law:"תכנון ובנייה", q:"תמ\"א 38/2 — מה התנאי המחייב להכנסת הבניין?", opts:["שאין התנגדויות","לפני יישום — יש להסב שימושים לדיור","תחול על מבנה ציבורי בלבד","החיזוק המבוקש ישתלב ויסתמך על התשתית הקיימת"], correct:3, explain:"תמ\"א 38/2 מתנה את החיזוק בכך שהמבוקש ישתלב בתשתית הקיימת של הבניין." },

{ id:"jul23_21", source:"יולי 2023", law:"קרקעות חקלאיות", q:"ראובן רוצה לחלק נחלה חקלאית בצוואה לשני ילדיו. האם ניתן?", opts:["לא — יש לקבוע יורשים ממשיכים ולחלק הרכוש ביניהם","כן — בתנאי שמנהל עיזבון יחלק","לא — נחלה חקלאית אינה ניתנת לחלוקה; יש לקבוע בן ממשיך אחד","כן — ניתן להוריש חלק בלתי מסוים"], correct:2, explain:"נחלה חקלאית = יחידת ייצור בלתי ניתנת לפיצול. חייב להיות בן ממשיך אחד — לא ניתן לחלקה לשני ילדים." },

{ id:"jul23_22", source:"יולי 2023", law:"חוק מכר דירות", q:"קבלן ורוכש קיצרו בהסכם נפרד את תקופת הבדק לאי-התאמה יסודית מ-2 שנים לשנה. האם ניתן?", opts:["ניתן — הסכמה בכתב בנפרד","ניתן — רק בנושא ריצוף","תקופת הבדק מקסימלית — מותר לקצרה","לא ניתן לקצר תקופת הבדק לאי-התאמה יסודית"], correct:3, explain:"חוק מכר דירות קובע תקופות בדק מינימליות שלא ניתן לקצרן בהסכם. אי-התאמה יסודית — 2 שנים מינימום." },

{ id:"jul23_23", source:"יולי 2023", law:"תכנון ובנייה", q:"מהו 'שימוש חורג' בקרקע?", opts:["שימוש שונה מהתוכנית החלה במקום או מהיתר הבנייה","שינוי הוראות בנייה אדריכלי","שינוי חלוקת שטחי בנייה בתוכנית מחוזית","הגדלת יחידות דיור ללא הגדלת שטח"], correct:0, explain:"שימוש חורג = שימוש השונה מזה שנקבע בתוכנית או בהיתר הבנייה." },

{ id:"jul23_24", source:"יולי 2023", law:"הגנת הדייר", q:"האם חוק הגנת הדייר חל על בניינים שהם חלק ממשק חקלאי?", opts:["כן — אין הגבלה","לא — שכירות בדמי מפתח רק ביישובים עירוניים","כן — רק למגורים ומסחר","לא — חוק הגנת הדייר אינו חל על בניינים שהם חלק ממשק חקלאי"], correct:3, explain:"חוק הגנת הדייר חל על נכסים עירוניים בלבד — לא על בניינים שהם חלק ממשק חקלאי." },

{ id:"jul23_25", source:"יולי 2023", law:"חוק המתווכים", q:"יחיעם מתווך מוסמך שלח זוג עולים ולא תרגם את החוזה ולא גילה חריגת בנייה. האם הפר את חוק המתווכים?", opts:["כן — אלא אם הסכימו מראש ובכתב שלא ייחשבו לקוחות","לא — לא יכול לתת שירות בהתנדבות","לא — רק מי שמשלם נחשב לקוח","כן — בני הזוג הם לקוחות לכל דבר, גם כשהתיווך נעשה ללא תמורה"], correct:3, explain:"הגדרת 'לקוח' חלה גם בתיווך ללא תמורה. יחיעם הפר חובותיו כלפי בני הזוג." },



{ id:"jul25_1", source:"יולי 2025", law:"חוק המתווכים", q:"שוש מתווכת הסכימה לשתף פעולה עם רישום מחיר כוזב בחוזה המכר (הסכם למראית עין) לחסכון במס שבח. האם פעלה כדין?", opts:["כן; תוכן הסכם המכר אינו בסמכות המתווך","כן; טופס הזמנת תיווך כולל מחיר משוער בלבד","לא; אסור לקבוע מחיר עם הצד השני","לא; אסור למתווכת לשתף פעולה עם הסכם למראית עין"], correct:3, explain:"מתווך המסייע לרישום מחיר כוזב (הסכם למראית עין) לצורך חיסכון במס — מפר את חוק המתווכים ואת דיני המס." },

{ id:"jul25_2", source:"יולי 2025", law:"חוק המתווכים", q:"גילה הסתירה מראובן שהרוכש 'החדש' הוא יוסף שראובן הכיר כבר, ולא גילתה עובדות מהותיות על הרוכש. ראובן ביטל את ההסכם השני (2%). האם ראובן צודק?", opts:["לא; ראובן חתם על הסכם תיווך וגילה הייתה הגורם היעיל","כן; גילה לא הייתה הגורם היעיל","כן; גילה הטעתה את ראובן בזהות הרוכש ולא גילתה עובדות מהותיות","לא; גילה אינה חייבת לגלות מידע על הרוכש לפני החתימה"], correct:2, explain:"גילה הפרה את חובת הנאמנות: הסתירה את זהות הרוכש (שראובן הכיר) ולא גילתה עובדות מהותיות — הטעיה מכוונת." },

{ id:"jul25_3", source:"יולי 2025", law:"בתים משותפים", q:"דיירים הצביעו פה אחד (100%) להצמיד מקלט לאחת הדירות. האם אפשרי? ובאיזה רוב?", opts:["ניתן ברוב 2/3","ניתן אך דרוש 100%","ניתן ברוב רגיל","לא ניתן להצמיד מקלט לדירה ספציפית גם לא פה אחד"], correct:3, explain:"מקלט הוא רכוש משותף שלא ניתן להצמידו לדירה ספציפית — הוראה קוגנטית בחוק, גם לא בהסכמת כולם." },

{ id:"jul25_4", source:"יולי 2025", law:"חוק מכר דירות", q:"קבלן לא צירף מפרט לחוזה. מה הכלל לגבי איכות גימור הדירה?", opts:["יימסור באיכות גבוהה","יימסור באיכות סבירה","רשאי למסור כל איכות אלא אם החוזה מחייב אחרת","הדין אינו מתייחס לאיכות גימור"], correct:2, explain:"בהיעדר מפרט — על הקבלן למסור כל פרט שהיה אמור להיכלל במפרט באיכות סבירה לפי חוק מכר דירות." },

{ id:"jul25_5", source:"יולי 2025", law:"מיסוי מקרקעין", q:"שלומי רכש חנות ב-1.2 מיליון ₪ ואין לו דירת מגורים. האם יזכה ל'דירה יחידה' לצורכי מס רכישה?", opts:["כן; אין לו דירת מגורים — פטור ממס","כן; שווי מתחת לתקרת דירה יחידה","לא; לא פטור ממס רכישה אך פטור ממס שבח","לא; מדרגות 'דירה יחידה' אינן תקפות למקרקעין שאינם דירת מגורים"], correct:3, explain:"מדרגות מס רכישה מופחתות ל'דירה יחידה' חלות על דירות מגורים בלבד — לא על נכסים מסחריים." },

{ id:"jul25_6", source:"יולי 2025", law:"רישום מקרקעין", q:"אילו אישורים דורש רשם המקרקעין (טאבו) לרישום זכויות רוכש דירת מגורים?", opts:["מס רכישה + מס שבח + מס הכנסה + רשות מקומית","מס רכישה + מס שבח + אישור עירייה + אישור אדריכל","מס רכישה + מס שבח + אישור רשות מקומית על היעדר חובות","מס רכישה + מס שבח + אישור עירייה + אישור רמ\"י"], correct:3, explain:"לרישום בטאבו נדרשים: אישור מס רכישה, אישור מס שבח (או פטור), ואישור עירייה על היעדר חובות. תשובה ד' לפי מפתח." },

{ id:"jul25_7", source:"יולי 2025", law:"חוק החוזים", q:"אורן (רוכש) הפר הפרה לא יסודית של חוזה מכר. מה זכאית אורלי (מוכרת) לעשות?", opts:["לבטל מיידית","אינה זכאית לבטל בהפרה לא יסודית","לבטל רק אחרי אורכה סבירה שלא קוימה","לבטל רק אחרי 3 ימי עסקים"], correct:3, explain:"הפרה לא יסודית — חובה לתת אורכה סבירה לתיקון. רק אם לא קוים — ניתן לבטל. לפי מפתח — תשובה ד'." },

{ id:"jul25_8", source:"יולי 2025", law:"רישום מקרקעין", q:"עמי רוצה לפצל בית פרטי (שאינו ניתן לחלוקה תכנונית) לשתי דירות ולמכור קומה אחת. האם תוכל?", opts:["כן; החוק אינו עוסק בפיצול נכס","כן; אם אף דירה לא עולה מיליון ₪","לא; לא ניתן למכור חלק ממקרקעין","לא; לא שולם היטל השבחה"], correct:3, explain:"לא ניתן למכור חלק בלתי מסוים ממקרקעין ללא פיצול רשמי. פיצול שאינו אפשרי תכנונית — לא ניתן לרשום ולמכור בנפרד. תשובה ד' לפי מפתח." },

{ id:"jul25_9", source:"יולי 2025", law:"מיסוי מקרקעין", q:"מה מהבאים לא יכול להיות מוכר כ'דירת מגורים יחידה' לצורכי מס שבח?", opts:["דירה מיועדת למגורים שבנייתה הסתיימה","דירה מיועדת למגורים שבנייתה טרם הסתיימה","חלק מדירת מגורים","דירה בבעלות יחיד"], correct:2, explain:"חלק מדירת מגורים אינו יכול להיחשב 'דירת מגורים יחידה' לצורכי מס שבח — רק דירה שלמה מזכה." },

{ id:"jul25_10", source:"יולי 2025", law:"רישום מקרקעין", q:"רועי ומרדכי הגיעו לרשם המקרקעין עם הסכמה בעל פה על עסקת מכר. האם הרשם יבצע רישום?", opts:["כן; אם מתקיימים יסודות החוזה","כן; אם הוכחה דעתו שאינה פיקטיבית","לא; עסקת מקרקעין טעונה מסמך בכתב","לא; לרשם אין סמכות לרישום עסקה כזו"], correct:3, explain:"עסקת מקרקעין חייבת להיות בכתב לפי סעיף 8 לחוק המקרקעין. ללא מסמך — הרשם לא ירשום. תשובה ד' לפי מפתח." },

{ id:"jul25_11", source:"יולי 2025", law:"שיתוף במקרקעין", q:"ווי ועמית חתמו על הסכם שיתוף עם איסור פירוק ל-10 שנים. לאחר 5 שנים עמית רוצה לפרק. מה הדין?", opts:["אינה רשאית — לא עברו 10 שנים","רשאית רק בהסכמת ווי","בית משפט רשאי לפרק אם ראה לנכון","עמית תפנה לרשם המקרקעין"], correct:3, explain:"לפי מפתח הבחינה — תשובה ד'. ניתן לפנות לרשם המקרקעין לצורך פירוק שיתוף במקרקעין." },

{ id:"jul25_12", source:"יולי 2025", law:"רשות מקרקעי ישראל", q:"מהו 'הסכם משבצת' במושב חקלאי?", opts:["הסכם שכירות עד 10 שנים בין אגודה שיתופית לרמ\"י","הסכם מכר בין אגודה שיתופית לסוכנות היהודית","הסכם חכירה בין אגודה שיתופית לרמ\"י","הסכם מכר בין אגודה שיתופית לרמ\"י"], correct:1, explain:"הסכם משבצת = הסכם חכירה בין רמ\"י (רשות מקרקעי ישראל) לאגודה שיתופית (מושב/קיבוץ), המגדיר שטח קרקע מוחכר ותנאי שימוש." },

{ id:"jul25_13", source:"יולי 2025", law:"חוק המתווכים", q:"אופיר השיג תעודת זהות של כפיר אחיו, פרסם ומכר את דירתו בהתחזות. מה העונש הצפוי?", opts:["עבודות שירות עד 24 חודשים","מאסר על תנאי עד 12 חודשים","מאסר עד 3 שנים","מאסר בית עד 6 חודשים"], correct:1, explain:"לפי מפתח הבחינה — תשובה ב'. התחזות לאדם אחר לצורך מכירת נכסו — עבירה פלילית חמורה." },

{ id:"jul25_14", source:"יולי 2025", law:"חוק המתווכים", q:"שאול מתווך המשיך לפרסם דירה שנמכרה חצי שנה נוספת וענה לשלושה פניות. האם פעל כדין?", opts:["כן; מותר לפרסם נכסים לדוגמא","כן; אין מניעה להמשיך לפרסם","לא; חובה להסיר פרסום תוך 3 ימי עסקים מהודעת המכירה","לא; חובה להסיר בהקדם האפשרי"], correct:2, explain:"תקנות המתווכים: חובה להסיר פרסום של נכס שנמכר תוך 3 ימי עסקים מהרגע שהמתווך נודע על המכירה." },

{ id:"jul25_15", source:"יולי 2025", law:"חוק המתווכים", q:"תומר מתווך גובה דמי רצינות 5,000 ₪ שמקוזזים מדמי התיווך. האם פועל כדין?", opts:["כן; כל עוד מדווח לרשויות המס","לא; איסור מוחלט על דמי רצינות","כן; כל עוד דמי התיווך ייגבו בנפרד","לא; אלא אם הלקוח אישר בכתב מראש"], correct:0, explain:"לפי מפתח הבחינה — תשובה א'. גביית דמי רצינות שמקוזזים מדמי התיווך — מותרת כל עוד מדווחים כחוק לרשויות המס." },

{ id:"jul25_16", source:"יולי 2025", law:"ניהול עיזבון", q:"יוסף ציווה שחברת 'ארטיקים לכל כיס' תהיה מנהלת עיזבון. מה הדין?", opts:["לא ניתן למנות חברה — רק אדם מעל 18","ניתן למנות חברה רק אם בנו לא יכול","ניתן למנות חברה כמנהלת עיזבון","בית המשפט ימנה רק מי שציין הנפטר"], correct:0, explain:"חוק הירושה: רק אדם (ולא תאגיד/חברה) יכול לשמש כמנהל עיזבון. חברה פסולה לתפקיד זה." },

{ id:"jul25_17", source:"יולי 2025", law:"תכנון ובנייה", q:"מה ההבדל בין 'שימוש חורג' ל'הקלה'?", opts:["הקלה = רישיון לשימוש חורג; שימוש חורג = שימוש בניגוד לרישיון","הקלה = שימוש שונה מהתוכנית; שימוש חורג = בנייה בשינוי קל","הקלה = בנייה בשינוי קל מהתוכנית; שימוש חורג = שימוש שונה מהתוכנית/ההיתר","הקלה = שינוי קל; שימוש חורג = שינוי גדול"], correct:2, explain:"הקלה = בנייה בסטייה קלה מהוראות התוכנית. שימוש חורג = שימוש שונה מזה שנקבע בתוכנית החלה על המקום או בהיתר הבנייה." },

{ id:"jul25_18", source:"יולי 2025", law:"חוק המתווכים", q:"יובל מתווך ומעצב פנים. הסכים עם רוכש: 2% דמי תיווך + עיצוב הבית כחלק מאותו תשלום. האם פעל כדין?", opts:["כן; כל עוד דמי התיווך אינם עולים על 2%","לא; חייב להבחין בכתב בין דמי תיווך לכל שירות נוסף","כן; עיצוב מסייע למכירה ולכן מותר","לא; מתווך אסור לו לעסוק עם לקוחו בכל עיסוק אחר"], correct:0, explain:"לפי מפתח הבחינה — תשובה א'. כל עוד דמי התיווך אינם עולים על המותר, מותר לספק שירות נוסף במסגרת אותו תשלום." },

{ id:"jul25_19", source:"יולי 2025", law:"חוק המתווכים", q:"גלית שכרה דירה ושכחה לחדש. המתווך (בעל בלעדיות מבעל הנכס) דורש ממנה דמי תיווך לחידוש חוזה שכירות. האם רשאי?", opts:["כן; יש בלעדיות ופעולות שיווק — חייבת בדמי תיווך","לא; אסור לגבות דמי תיווך על חידוש שכירות","כן; קיבל רשות מבעל הנכס לאתר שוכרים","כן; אך יכול לגבות מחצית השכירות החודשית"], correct:2, explain:"לפי מפתח הבחינה — תשובה ג'. המתווך קיבל את הרשאת בעל הנכס לפעול, ולכן פעולתו כדין." },

{ id:"jul25_20", source:"יולי 2025", law:"חוק המתווכים", q:"לפי פסק דין מדינת ישראל נ' אופז, האם מותר למתווך לערוך זיכרון דברים? האם זכאי לדמי תיווך?", opts:["לא; איסור פלילי ולא זכאי לדמי תיווך","לא; הפרת אתיקה בלבד, אך זכאי אם הגורם היעיל","כן; מותר לכתוב זיכרון דברים לבקשת לקוחות","כן; זה תפקידו של המתווך להעלות פרטים על הכתב"], correct:3, explain:"לפי אופז: מותר למתווך לכתוב זיכרון דברים. אינו עובר עבירה ולכן זכאי לדמי תיווך אם היה הגורם היעיל." },

{ id:"jul25_21", source:"יולי 2025", law:"חוק המתווכים", q:"מתווך שלח וואטסאפ: 'דמי תיווך = חודש שכירות'. מצא חנות. האם זכאי לדמי תיווך? (טרס גלובל נ' תאל)", opts:["כן; הוואטסאפ מחליף הזמנת תיווך","לא; הוואטסאפ חסר פרטים נדרשים","כן; המתווך היה הגורם היעיל","לא; לא היה הגורם היעיל"], correct:2, explain:"לפי מפתח — תשובה ג'. אם המתווך היה הגורם היעיל — ייתכן שיזכה לדמי תיווך, אף שהוואטסאפ אינה עומדת בדרישות הפורמליות." },

{ id:"jul25_22", source:"יולי 2025", law:"חוק המתווכים", q:"אביגיל פרסמה דירה ב-2M ₪ (במקום 2.5M ₪ שביקשו המוכרים) וסגרה עסקה. המוכרים גילו שהקונה לא ידע על ה-2.5M ₪. האם פל פגם?", opts:["לא; הפעילה שיקול דעת","לא; כנציגת שני הצדדים רשאית להציע מחיר","כן; אסור לפעול בניגוד להוראת המוכרים ועליה לפעול בשקיפות","כן; אסור לייצג שני הצדדים"], correct:1, explain:"לפי מפתח — תשובה ב'. אביגיל מייצגת את שני הצדדים ורשאית להציע מחיר מתאים — אך מבחינה מעשית הפרה את אמון המוכרים." },

{ id:"jul25_23", source:"יולי 2025", law:"חוק המתווכים", q:"חזי גילה שיש שוכר בדירה אך לא ציין שמדובר בדייר מוגן. האם פעל כדין?", opts:["כן; הקונה חתם על הזמנת תיווך","כן; חזי גילה שהדירה מושכרת ויצא ידי חובתו","לא; דיירות מוגנת היא מידע מהותי שחייב לגלות","לא; כל דייר נחשב דייר מוגן"], correct:1, explain:"לפי מפתח — תשובה ב'. חזי ציין שיש שוכר ובכך יצא ידי חובתו לפי הבחינה הרשמית. (אולם מבחינה מהותית, דייר מוגן הוא מידע נוסף.)" },

{ id:"jul25_24", source:"יולי 2025", law:"חוק המתווכים", q:"משה הוסיף בכתב יד על גבי טופס הזמנת תיווך (ולא במסמך נפרד) בלעדיות ל-6 חודשים. הדירה נמכרה ע\"י מתווך אחר. האם הבלעדיות תקפה? (בראון נ' סידרון)", opts:["כן תיפסל; החוק דורש מסמך נפרד בלבד","כן תיפסל; כי הדירה נמכרה ע\"י מתווך אחר","לא תיפסל; בלבד שיש הסכמת הלקוחה שלא במסמך נפרד","לא תיפסל; דרישה טכנית בלבד"], correct:0, explain:"שאלה זו בוטלה (כל התשובות מתקבלות). לפי בראון נ' סידרון: הבלעדיות חייבת במסמך נפרד — יש דיון האם הסכמת הלקוח מרפאה את הפגם." },

{ id:"jul25_25", source:"יולי 2025", law:"רשות מקרקעי ישראל", q:"גבריאל רכש בית עם חלקה חקלאית ברמ\"י. מהם דמי הסכמה והאם חייב בהם?", opts:["דמי הסכמה = תשלום לרמ\"י על תוספות בנייה בלבד","דמי הסכמה = תשלום כתנאי להעברת זכויות חכירה כשאינה מהוונת","דמי הסכמה = תשלום בכל מקרה של העברת זכויות ברמ\"י","דמי הסכמה = תשלום עם אישור תוכנית בנייה בנכס בבעלות המדינה"], correct:3, explain:"דמי הסכמה משולמים לרמ\"י כתנאי להעברת זכויות חכירה מחוכר לחוכר אחר. ישולמו כשהחכירה אינה מהוונת. לפי מפתח — תשובה ד'." },


{ id:"may25_1", source:"מאי 2025", law:"חוק המתווכים", q:"חיים מתווך ראה מודעה 'פרטי, לא למתווכים'. יצר קשר עם רחל, הציג לה דירה ב-1,050,000 ₪ והחתים אותה על הזמנת תיווך. במעמד החתימה התברר לרחל שמחיר הדירה הוא 1,000,000 ₪ בלבד. האם חיים פעל כדין?", opts:["כן; על הצדדים לדווח את המחיר המלא שהם משלמים","כן; חיים היה הגורם היעיל ודמי התיווך פורטו בהזמנת השירות","לא; חיים לא החתים את יהודה על הסכם להזמנת שירותי תיווך","לא; חיים הפר את חובת האמינות שלו כלפי רחל ולא גילה לה את מחיר עסקת המקרקעין בשקיפות"], correct:3, explain:"מתווך שמציג מחיר גבוה מהמחיר האמיתי כדי לגלם את דמי התיווך — מפר את חובת הנאמנות ואת דרישת השקיפות שחלה עליו כלפי הלקוח." },

{ id:"may25_2", source:"מאי 2025", law:"מיסוי מקרקעין", q:"שמשון בעל דירה יחידה מעוניין לרכוש דירה נוספת שתחליף את הדירה הראשונה. האם יוכל לשלם מס רכישה במדרגת דירה יחידה?", opts:["לא, אלא אם ימכור את הדירה הראשונה תוך 24 חודשים","כן, אם ימכור אחת מדירותיו תוך 12 חודשים","לא, כיוון שברגע שרוכש דירה שנייה הוא רוכש דירה נוספת","כן, אם ימכור את דירתו הראשונה תוך 18 חודשים"], correct:0, explain:"שאלה זו קיבלה שתי תשובות נכונות (א' ו-ד') לפי המפתח. הכלל: לשלם מס דירה יחידה על הדירה השנייה — ניתן אם מכר את הדירה הישנה בתוך 18 חודשים מיום רכישת החדשה (או 24 חודשים לפי כמה פסיקות)." },

{ id:"may25_3", source:"מאי 2025", law:"חוק המתווכים", q:"יחזקאל עבר את בחינת רישוי תיווך לפני 4 שנים אך טרם שילם את אגרת הרישיון. פעל כמתווך, איתר לקוח, הגיע לעסקה, ויומיים לאחר מכן הפעיל את רישיונו. האם יחזקאל זכאי לדמי תיווך?", opts:["כן; כל עוד פעל בהגינות ומסר מידע ללקוח","כן; רשאי להפעיל רישיונו מיד לאחר העסקה","לא; אסור למתווך לאתר לקוחות עצמאית","לא; ליחזקאל לא היה רישיון תיווך בתוקף בזמן שעסק בתיווך"], correct:3, explain:"תנאי בסיסי לדמי תיווך הוא שבזמן הפעולה יהיה בידי המתווך רישיון בתוקף. יחזקאל לא הפעיל את רישיונו לפני ביצוע הפעולות — לכן אינו זכאי." },

{ id:"may25_4", source:"מאי 2025", law:"מיסוי מקרקעין", q:"גילה ירשה דירה מסבתה (עיזבון טרם חולק). שבועיים לאחר מכן קיבלה מבעלה אגב גירושין וללא תמורה את חלקו בדירה המשותפת. האם גילה חייבת במס רכישה ועבור אילו דירות?", opts:["גילה חייבת במס רכישה עבור הדירה שקיבלה מבעלה בלבד — כדירה שנייה","גילה חייבת במס רכישה עבור הדירה שקיבלה מסבתה — בשל בעלות קיימת בתא המשפחתי","גילה לא חייבת במס רכישה כלל — ירושה והעברה ללא תמורה מבן זוג אגב גירושין אינן מכירה","גילה חייבת במס רכישה לפי מדרגות המס בהתאם לשווי הנכסים"], correct:2, explain:"הירושה אינה מכירה ואינה חייבת במס רכישה. ההעברה ללא תמורה אגב גירושין — פטורה ממס רכישה לפי חוק מיסוי מקרקעין. גילה פטורה משני הצדדים." },

{ id:"may25_5", source:"מאי 2025", law:"חוק המתווכים", q:"חנאל מתווך הציג רישיון בתוקף ליואב (מוכר דירה). אמר שיסייע לו רק אם יואב ישכור גם את שירותיו לרכישת דירה חלופית. יואב הרגיש 'חייב להסכים'. האם יש פסול?", opts:["לא; חנאל הציג רישיון כדין והחתים על הזמנת שירות","לא; אין פסול שמתווך ירצה לייצג את המוכר גם ברכישה הבאה","כן; אסור למתווך להתנות שירות בדירה אחת במתן שירות בדירה אחרת","כן; אלא אם החתים את יואב על שני טפסי הזמנה שווים"], correct:2, explain:"מתווך אינו רשאי להתנות מתן שירות תיווך בדירה אחת בקבלת שירות תיווך בדירה אחרת — זוהי עסקה כפויה הפוגעת בחופש ההתקשרות של הלקוח." },

{ id:"may25_6", source:"מאי 2025", law:"חוק המתווכים", q:"גרשון מתווך בעל רישיון ואשתו גילה הם בעלי הבית. גרשון פרסם, הציג רישיון ל-עופרה, החתים אותה על הזמנת תיווך ב-2% והציג את הבית. עופרה ביקשה לקבוע פגישה לחתימה. האם גרשון פעל כדין?", opts:["כן; פרסם, הציג רישיון, והחתים על הזמנת תיווך כדין בהיותו הגורם היעיל","כן; אך רק אם גרשון מגלה בכתב שהוא בן זוגה של גילה","לא; גרשון הוא בעל עניין אישי בעסקה כבן זוגה של גילה","לא; גרשון חייב לגלות את העניין האישי כבן זוגה — ומוגבל בייצוג הנכס כיוון שהוא הבעלים"], correct:3, explain:"גרשון בעל עניין אישי ממשי — הוא אחד מבעלי הנכס. מתווך שיש לו עניין אישי חייב לגלות זאת ללקוח ולקבל הסכמתו בכתב. ללא גילוי — פסול בהתנהלות." },

{ id:"may25_7", source:"מאי 2025", law:"בתים משותפים", q:"הרצל גר בקומת קרקע. שאר דיירי הבניין (16 דירות) הסכימו להתקנת מעלית. הרצל לא הסכים. כעת ועד הבית דורש ממנו לשלם חלק בהתקנה ובהחזקה. מה הדין?", opts:["הרצל לא משתמש במעלית — לא צריך לשלם כלל","הרצל חייב לשלם בהתקנה, החזקה והפעלה — המעלית משותפת לכל הבניין","הרצל חייב לשלם בהתקנה — אך פטור מהחזקה כי לא משתמש","הרצל גר בקומת קרקע — פטור מהתקנה, אך חייב בהחזקה"], correct:3, explain:"דייר בקומת קרקע פטור מתשלום עלות התקנת מעלית (כי לא נהנה ממנה) — אך חייב להשתתף בהוצאות החזקה ותפעול שוטף כחלק מהרכוש המשותף." },

{ id:"may25_8", source:"מאי 2025", law:"בתים משותפים", q:"אלכס גילה שמשה (שכן בקומת קרקע) הרחיב דירתו לתוך שטח הרכוש המשותף. האם אלכס יכול לתבוע? ובאיזו ערכאה?", opts:["כן; לבית המשפט המחוזי שבתחום שיפוטו מצוי הבניין","לא; רק לוועדה המקומית לתכנון ובנייה","לא; רק הנציגות מוסמכת להגיש תביעה — לא דייר בודד","כן; לבית המשפט המוסמך או למפקח על רישום המקרקעין במחוז שבו מצוי הבית"], correct:3, explain:"כל בעל דירה רשאי לתבוע בנוגע לפגיעה ברכוש המשותף — בפני בית המשפט המוסמך או המפקח על הבתים המשותפים." },

{ id:"may25_9", source:"מאי 2025", law:"רישום מקרקעין", q:"חזי ירש דירה אך עליה רשומה משכנתא ישנה (1958) לטובת ג'ורג' סמיט שלא אותר. חזי לא יכול למכור ללא מחיקת המשכנתא. מה עליו לעשות?", opts:["לאתר את ג'ורג' סמיט ולשלם לו — אחרת לא ניתן לבטל","לפנות לבית המשפט המוסמך בבקשה לסעד הצהרתי למחיקת המשכנתא","להפקיד את כספי המשכנתא אצל רשם המקרקעין ולבקש פדיון","לפנות למפקח על רישום המקרקעין בבקשה למחיקת המשכנתא שהתיישנה"], correct:2, explain:"כשהמשכנה לא אותר — ניתן להפקיד את כספי החוב בידי הרשם ולבקש פדיון המשכנתא. לאחר הפקדה ופדיון — ניתן למחוק את הרישום." },

{ id:"may25_10", source:"מאי 2025", law:"הערת אזהרה", q:"יצה חתמה זיכרון דברים עם המוכרת ושילמה מקדמה 200,000 ₪ ללא עורך דין וללא הערת אזהרה. קונה אחרת רכשה את הדירה, שילמה מלוא התמורה ורשמה בטאבו. מי זוכה?", opts:["יצה — חתמה ראשונה ושילמה מקדמה","יצה — הקונה השנייה הייתה צריכה לדעת","לא; לא נחתם חוזה בהתאם לדרישות חוק החוזים","לא; הקונה השנייה שילמה מלוא התמורה, פעלה בתום לב והשלימה את הרישום בטאבו"], correct:3, explain:"לפי סעיף 9 לחוק המקרקעין: מי שרכש בתמורה ובתום לב ורשם — גובר על עסקה קודמת שלא הוגנה. יצה לא רשמה הערת אזהרה — הקונה השנייה גוברת." },

{ id:"may25_11", source:"מאי 2025", law:"בתים משותפים", q:"גידי (חבר נציגות) שאל את משה בעל פה על פרויקט חיזוק (תמ'א 38). משה אמר שהוא 'בעיקרון בעד'. לאחר מכן ראה משה את שמו ברשימת המסכימים. האם נחשב כמסכים?", opts:["כן; משה אמר מפורשות שלא מתנגד","כן; הסכמה בעל פה לפרויקט התחדשות עירונית תקפה","לא; הסכמות לפרויקט כזה לא יכולות להינתן בעל פה — גידי היה חייב להחתים משה על הצהרה מסודרת","לא; הסכמת משה חייבת להינתן בכתב ולהיות מאומתת על ידי עורך דין"], correct:3, explain:"לפי חוק החיזוק (תמ'א 38): הסכמה לפרויקט חיזוק צריכה להינתן בכתב ולהיות מאומתת על ידי עורך דין. הסכמה בעל פה אינה מספיקה." },

{ id:"may25_12", source:"מאי 2025", law:"מיסוי מקרקעין", q:"לדנה דירת מגורים בבעלותה. היא רכשה חצי דירה נוספת יחד עם אחיה (כל אחד שילם מחצית). האם דנה זכאית לשלם מס רכישה לפי מדרגות דירת מגורים יחידה?", opts:["כן; חלק מדירת מגורים אינו נחשב דירת מגורים נוספת","לא; גם חלק מדירה נחשב לדירת מגורים — דנה אינה זכאית למדרגות דירה יחידה","כן; כיוון שחלקה נחשב מלאי עסקי","לא; באותה עסקת מכר לא ניתן לתת פטור לשני רוכשים"], correct:1, explain:"גם רכישת חלק מדירה (50%) נחשבת לדירת מגורים נוספת לצורכי מס רכישה — דנה לא תהיה זכאית למדרגות דירה יחידה." },

{ id:"may25_13", source:"מאי 2025", law:"מיסוי מקרקעין", q:"מהו מס שבח ובאילו נסיבות הוא מוטל?", opts:["מס שמוטל ע'י רשות מיסוי מקרקעין על מוכר זכות בגין תוכניות בניין עיר שאושרו","מס שמוטל ע'י רשות מיסוי מקרקעין על מוכר זכות במקרקעין בגין ההפרש שבו עולה שווי המכירה על יתרת שווי הרכישה","מס שמוטל ע'י הרשות המקומית על רוכש זכות בגין תוכניות בנייה שאושרו","מס שמוטל ע'י הרשות המקומית על מוכר בגין ההפרש בין סכום הרכישה למכירה"], correct:1, explain:"מס שבח = מס שמוטל על ידי רשות מיסוי מקרקעין על מוכר זכות במקרקעין, בגין ההפרש החיובי בין שווי המכירה לשווי הרכישה (בניכוי הוצאות)." },

{ id:"may25_14", source:"מאי 2025", law:"חוק המתווכים", q:"שרית וזאב (בני זוג) הדגישו שרוצים דירה 'ללא חריגות'. לאחר חתימה גילו שחלק בנוי ללא היתר וביטלו. לפי מאיר נ' שושן — האם המתווך זכאי לדמי תיווך?", opts:["לא; כי הסכם המכר בוטל בדיעבד","כן; זכאי לשכר מרגע שחתם הסכם מחייב ואין חריגים","לא; למתווך ישנה חובה לברר פרטים מהותיים מסוג זה","כן; כי לא הוכח שידע על חריגות הבנייה ועל בני הזוג היה להסתייע באיש מקצוע"], correct:2, explain:"לפי מאיר נ' שושן: בנייה ללא היתר היא מידע מהותי שהמתווך חייב לבדוק ולגלות. לא עשה כן — אינו זכאי לדמי תיווך." },

{ id:"may25_15", source:"מאי 2025", law:"חוק המתווכים", q:"דנית התקשרה עם מתווכת שסירבה להעביר הצעה נמוכה ב-200,000 ₪ ממחיר המבוקש. דנית שכרה מתווך אחר שסגר ב-1M ₪. לפי ב.פ. השיא נ' בקרמן — האם המתווכת הראשונה זכאית לדמי תיווך?", opts:["לא; המתווכת הפרה את חובתה כלפי דנית","כן; המתווך שמראה ראשון חזקה שהוא הגורם היעיל (עד חצי שנה)","כן; אך מגיעה לה מחצית — כי רק הראתה ולא ניהלה מו'מ","כן; מתווך אינו מחויב להעביר הצעה מופרכת לדעתו"], correct:0, explain:"לפי ב.פ. השיא נ' בקרמן: המתווכת הפרה את חובתה כלפי הלקוחה בסירובה להעביר הצעה. הפרת חובה — שוללת את הזכות לדמי תיווך." },

{ id:"may25_16", source:"מאי 2025", law:"הגנת הדייר", q:"למשה היה בית עסק בדמי מפתח. משה נפטר ללא בת זוג. דני (בנו) מבקש להמשיך בשכירות. האם הבן זכאי?", opts:["כן; בתנאי שדני ימשיך לנהל בעצמו (או על ידי אחרים) את העסק שאביו ניהל, ולא ישכירנו","כן; בתנאי שדני עבד עם אביו בעסק לפחות 6 חודשים לפני מותו","לא; לא ניתן להמשיך שכירות בדמי מפתח בנכס מסחרי — רק בדירת מגורים","לא; במקרה זה הנכס יחזור לבעליו ללא סייג"], correct:0, explain:"חוק הגנת הדייר: יורש זכות שכירות מוגנת בבית עסק — בתנאי שימשיך לנהל את אותו עסק שאביו ניהל, ולא ישכירנו לאחרים." },

{ id:"may25_17", source:"מאי 2025", law:"בתים משותפים", q:"מהי 'הצמדה' ברכוש משותף במקרקעין?", opts:["חיבור בין שני בתים בחלקה אחת — כגון בית דו-משפחתי","הצמדת שטח לרשות מקומית מסוימת לצורך תוכניות בנייה","שיוך של רכוש ליחידה או לבעלים מסוים של מקרקעין בבית משותף","הצמדת כל נכס לבעליו בנסח הטאבו"], correct:2, explain:"הצמדה = שיוך של חלק מהרכוש המשותף (כמו חנייה, מחסן, גינה) ליחידת דיור ספציפית בבית המשותף, לשימוש ייחודי של בעל אותה יחידה." },

{ id:"may25_18", source:"מאי 2025", law:"חוק המתווכים", q:"ברוך (מוכר) שכר מתווך שמצא קונה ב-1M ₪. לאחר כישלון המו'מ התבקש המתווך להפסיק. הקונה פגש מתווך אחר שסגר את העסקה. לפי יצחקוב נ' אביב — מי זכאי לדמי תיווך?", opts:["שני המתווכים — הראשון הפגיש את הצדדים, השני סייע להסכמה","המתווך הראשון בלבד — הוא הפגיש את הצדדים ולכן הוא הגורם היעיל","המתווך השני בלבד — הוא הביא את הצדדים להסכמה ולכן הוא הגורם היעיל","אף אחד לא זכאי — לא ניתן לקבוע לגבי אף אחד שהוא הגורם היעיל"], correct:0, explain:"לפי יצחקוב נ' אביב: שני המתווכים עשויים להיות זכאים — הראשון הפגיש את הצדדים, והשני סייע להגיע להסכמה. כל אחד תרם לעסקה." },

{ id:"may25_19", source:"מאי 2025", law:"חוק המקרקעין", q:"על איזה מסוגי המקרקעין הבאים לא חלה הגבלה בהעברה לגורמים פרטיים לפי דין?", opts:["כל מקרקעי ישראל השייכים למדינה","מקרקעי ישראל שיש בהם כדי להשלים לגורם פרטי חלקתו, בהיקף מעל מאה דונם","מקרקעי ישראל שיש בהם כדי להשלים לגורם פרטי חלקתו, בהיקף של פחות ממאה דונם","מקרקעי ישראל השייכים לנפקדים וצאצאיהם שאינם אזרחי ישראל"], correct:2, explain:"העברת מקרקעי ישראל לגורמים פרטיים מוגבלת על פי חוק. אולם העברה שמשלימה לגורם פרטי את חלקתו בהיקף של פחות ממאה דונם — אינה כפופה להגבלה זו." },

{ id:"may25_20", source:"מאי 2025", law:"חוק המתווכים", q:"ליאור מתווך כלל בטפסי הזמנתו: 'לקוחות לא רשאים לתבוע את המתווך. מי שיתבע יחויב ב-50,000 ₪'. מה הדין?", opts:["הלקוח יכול לפנות לבית הדין לחוזים אחידים כדי לבטל — רק אחר כך לתבוע","הלקוח יכול לפנות לוועדת המשמעת — רק לאחר הרשעה לתבוע","הלקוח יכול להפקיד 50,000 ₪ — הסכים לתנאי בחוזה","הלקוח רשאי לתבוע ללא חשש — תנאי השולל זכות פנייה לערכאות בחוזה אחיד הוא בטל"], correct:3, explain:"תנאי בחוזה אחיד השולל את זכות הלקוח לפנות לערכאות משפטיות — בטל מעיקרו לפי חוק החוזים האחידים, ואינו מחייב את הלקוח." },

{ id:"may25_21", source:"מאי 2025", law:"רישום מקרקעין", q:"אופיר רכש דירה מקבלן (הרשומה על שם החברה). לקח הלוואה מקרן. היכן יירשמו השיעבודים?", opts:["תמיד ברשם המשכונות בלבד","תמיד בעירייה","בחברה המשכנת וברשם המשכונות","תמיד בטאבו באמצעות הערות אזהרה"], correct:2, explain:"כשהדירה אינה רשומה בטאבו על שם הרוכש — השיעבוד נרשם בשני מקומות: בספרי החברה המשכנת (כהתחייבות) ורשם המשכונות (על הזכויות החוזיות)." },

{ id:"may25_22", source:"מאי 2025", law:"בתים משותפים", q:"דוד מעוניין להצמיד לדירתו חלק מחדר המדרגות בקומתו להרחבת דירתו. מה הרוב הדרוש מכלל דיירי הבניין?", opts:["רוב רגיל מדיירי הבניין","דוד כלל לא יכול לעשות זאת — אפילו בהסכמת כולם","רוב של 75% מבעלי הדירות, שלהם צמוד 2/3 מהרכוש המשותף","הסכמת כלל בעלי הדירות"], correct:1, explain:"חדר מדרגות הוא רכוש משותף שלא ניתן להצמידו לדירה ספציפית — גם לא בהסכמת כל הדיירים. זוהי הוראה קוגנטית בחוק הבתים המשותפים." },

{ id:"may25_23", source:"מאי 2025", law:"חוק מכר דירות", q:"דני רכש דירה חדשה מקבלן. מהי תקופת האחריות של הקבלן ומתי מתחילה?", opts:["שנה — מרגע קבלת טופס 4","שלוש שנים — שתחילתה בתום תקופת הבדק","שנה — שתחילתה בתום תקופת הבדק","החוק אינו קובע תקופת אחריות — נקבעת לפי הסכם המכר"], correct:1, explain:"חוק מכר דירות קובע: תקופת האחריות של הקבלן היא 3 שנים — שתחילתה בתום תקופת הבדק (לא מיום הרכישה ולא מיום טופס 4)." },

{ id:"may25_24", source:"מאי 2025", law:"חוק המקרקעין", q:"אברהם חפר והתקין צינור מתחת לאדמה של יצחק שכנו (ללא הסכמה) להעברת כבלים. יצחק דרש להוציא את הכבלים. האם אברהם חייב להיענות?", opts:["לא; יכול להעביר צינור ללא הסכמה כל עוד אינו מזיק באופן בלתי סביר","לא; אך על אברהם לשלם ליצחק בגין זיקת הנאה","כן; אברהם חייב לפרק מיידית — החפירה נעשתה ללא הסכמת שכנו","כן; בעלות יצחק מתפשטת לעומק הקרקע ואין חריגים"], correct:0, explain:"לפי חוק המקרקעין: ניתן להעביר צינורות מתחת לאדמת שכן ללא הסכמה — כל עוד אינם מזיקים או מפריעים באופן בלתי סביר לשימוש השכן במקרקעין." },

{ id:"may25_25", source:"מאי 2025", law:"ניהול עיזבון", q:"רמי מונה כמנהל עיזבון. גילה שיש חוב של 500,000 ₪ לבנק. הדרך היחידה לפרעו היא מכירת דירה. אחד הילדים מתנגד. רמי מכר את הדירה וחילק את היתרה ליורשים. האם פעל כדין?", opts:["כן; מנהל עיזבון כיד המוריש ורשאי לסלק חובות העיזבון","כן; אך רק אם הציע תחילה לכל היורשים לרכוש במחיר שוק","לא; לא יכול למכור ללא הסכמת כל היורשים","לא; רמי היה צריך לקבל אישור בית משפט לפני מכירת דירת העיזבון"], correct:3, explain:"מנהל עיזבון אינו יכול למכור נכסי עיזבון ללא אישור בית המשפט — זהו תנאי מהותי בחוק הירושה, גם אם יש חובות דחופים." }

function shuffle(a) {
  const arr = [...a];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startExam() {
  currentQuestions = shuffle(ALL_QUESTIONS).slice(0, 25);
  currentIndex = 0;
  score = 0;
  mistakes = [];
  answered = false;
  renderQuestion();
}

function renderStart() {
  document.getElementById('app').innerHTML = `
    <div class="start-screen">
      <h2>🎓 ברוכים הבאים למבחן ההכנה</h2>
      <p>המבחן מכיל <strong>25 שאלות אקראיות</strong> מתוך בנק של <strong>75 שאלות ממבחנים רשמיים</strong>.</p>
      <p>המקורות: ינואר 2023, מאי 2023, יולי 2023 — שאלות ותשובות אמיתיות של רשם המתווכים.</p>
      <p>ציון עובר: <strong>60 ומעלה</strong> (15 שאלות נכונות).</p>
      <p>בסוף המבחן — סיכום הטעויות עם הסבר לכל שאלה.</p>
      <button class="start-btn" onclick="startExam()">🚀 התחל מבחן</button>
    </div>
  `;
}

function renderQuestion() {
  const q = currentQuestions[currentIndex];
  const progress = ((currentIndex) / 25) * 100;
  const shuffledOpts = shuffle(q.opts.map((o, i) => ({ text: o, origIdx: i })));

  document.getElementById('app').innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div class="progress-text">שאלה ${currentIndex + 1} מתוך 25 | ✓ נכון עד כה: ${score} | 📁 ${q.source}</div>
    <div class="card">
      <div class="question-num">שאלה ${currentIndex + 1}</div>
      <div class="law-badge">📋 ${q.law}</div>
      <div class="question-text">${q.q}</div>
      <div class="options" id="options">
        ${shuffledOpts.map((o, i) => `
          <button class="option-btn" onclick="selectAnswer(${o.origIdx}, this, ${JSON.stringify(shuffledOpts).replace(/"/g,'&quot;')})" data-idx="${i}">
            ${'אבגד'[i]}. ${o.text}
          </button>
        `).join('')}
      </div>
      <div class="explanation" id="explanation"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
        ${currentIndex < 24 ? 'שאלה הבאה ←' : 'סיים מבחן ✓'}
      </button>
    </div>
  `;
}

function selectAnswer(origIdx, btn, shuffledOpts) {
  if (answered) return;
  answered = true;
  const q = currentQuestions[currentIndex];
  const isCorrect = origIdx === q.correct;

  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => {
    b.disabled = true;
    const bOrigIdx = shuffledOpts[parseInt(b.dataset.idx)].origIdx;
    if (bOrigIdx === q.correct) b.classList.add('correct');
  });

  if (!isCorrect) {
    btn.classList.add('wrong');
    mistakes.push({ q: q.q, law: q.law, source: q.source, yourAnswer: q.opts[origIdx], correctAnswer: q.opts[q.correct], explain: q.explain });
  } else {
    score++;
  }

  const expEl = document.getElementById('explanation');
  expEl.innerHTML = `<strong>${isCorrect ? '✅ נכון!' : '❌ לא נכון'}</strong> — ${q.explain}`;
  expEl.classList.add('show');
  if (!isCorrect) expEl.classList.add('wrong-exp');

  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  currentIndex++;
  answered = false;
  if (currentIndex >= 25) {
    renderResults();
  } else {
    renderQuestion();
  }
}

function renderResults() {
  const percent = Math.round((score / 25) * 100);
  const passed = percent >= 60;

  const mistakesHtml = mistakes.length > 0 ? `
    <div class="mistakes-section">
      <div class="mistakes-title">📝 ניתוח הטעויות שלך (${mistakes.length} שאלות):</div>
      ${mistakes.map((m, i) => `
        <div class="mistake-item">
          <div class="mistake-q">${i+1}. ${m.q}</div>
          <div class="law-badge" style="margin-bottom:8px">📋 ${m.law} | 📁 ${m.source}</div>
          <div class="mistake-your">❌ התשובה שלך: ${m.yourAnswer}</div>
          <div class="mistake-correct">✅ התשובה הנכונה: ${m.correctAnswer}</div>
          <div class="mistake-explain">💡 הסבר: ${m.explain}</div>
        </div>
      `).join('')}
    </div>
  ` : '<p style="color:#059669;font-weight:700;font-size:18px;margin-top:16px">🎉 מושלם! לא עשית אף טעות!</p>';

  document.getElementById('app').innerHTML = `
    <div class="results">
      <div class="score-circle ${passed ? 'pass' : 'fail'}">${percent}%</div>
      <div class="result-title">${passed ? '🎉 עברת את המבחן!' : '😔 לא עברת הפעם'}</div>
      <div class="result-subtitle">
        ${score} מתוך 25 נכון | ציון: ${percent}% | ${passed ? 'מעל 60% ✓' : 'נדרש 60% לפחות'}
      </div>
      ${mistakesHtml}
      <button class="retry-btn" onclick="startExam()">
        ${passed ? '🔄 מבחן חדש' : '🔄 נסה שוב — שאלות חדשות!'}
      </button>
    </div>
  `;
}

renderStart();

// === TIMER ===
let timerInterval = null, timerSeconds = 2700, timerActive = false;
function toggleTimer() {
  timerActive = document.getElementById('timerToggle').checked;
  document.getElementById('timerBar').style.display = 'flex';
  if (timerActive && !timerInterval) {
    timerSeconds = 2700;
    timerInterval = setInterval(() => {
      timerSeconds--;
      const m = Math.floor(timerSeconds/60), s = timerSeconds%60;
      const disp = document.getElementById('timerDisplay');
      disp.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
      if (timerSeconds <= 300) disp.classList.add('warning');
      if (timerSeconds <= 0) { clearInterval(timerInterval); alert('הזמן נגמר! ⏰'); showResults(); }
    }, 1000);
  } else if (!timerActive && timerInterval) {
    clearInterval(timerInterval); timerInterval = null;
  }
}

// === TOPIC FILTER ===
const allTopics = [...new Set(ALL_QUESTIONS.map(q => q.law))];
let selectedTopic = null;
function initTopicFilter() {
  const wrap = document.getElementById('topicFilterWrap');
  const cont = document.getElementById('topicFilter');
  wrap.style.display = 'block';
  const allBtn = document.createElement('button');
  allBtn.className = 'topic-btn active'; allBtn.textContent = 'הכל';
  allBtn.onclick = () => { selectedTopic = null; document.querySelectorAll('.topic-btn').forEach(b=>b.classList.remove('active')); allBtn.classList.add('active'); };
  cont.appendChild(allBtn);
  allTopics.forEach(t => {
    const b = document.createElement('button');
    b.className = 'topic-btn'; b.textContent = t;
    b.onclick = () => { selectedTopic = t; document.querySelectorAll('.topic-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); };
    cont.appendChild(b);
  });
}
document.addEventListener('DOMContentLoaded', initTopicFilter);

</script>
